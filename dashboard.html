<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart • Smart Campus Marketplace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --pale-yellow: #ffffba;
  --mint-green: #baffc9;
  --sky-blue: #bae1ff;
  --baby-pink: #ffb3ba;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --bg: #ffffff;
  --border: #f1f5f9;
  --premium-blue: #3b82f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg); padding-bottom: 120px; color: var(--text-main); overflow-x: hidden; }

/* --- ANIMATED HEADER --- */
.app-header {
  background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
  padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--sky-blue);
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -1.2px; }
.logo span { color: var(--premium-blue); }

/* --- RECENTLY VIEWED SECTION (New Feature) --- */
.section-title { padding: 20px 20px 10px; font-size: 18px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
.section-title span { font-size: 12px; color: var(--premium-blue); }

.recent-scroll {
    display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 20px;
    scrollbar-width: none;
}
.recent-item {
    min-width: 80px; text-align: center;
}
.recent-circle {
    width: 70px; height: 70px; border-radius: 24px; overflow: hidden;
    border: 2px solid var(--sky-blue); padding: 3px; background: white;
}
.recent-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
.recent-name { font-size: 10px; font-weight: 700; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* --- PRODUCT GRID --- */
.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 10px 20px; }
.p-card {
  background: white; border-radius: 20px; overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s;
  cursor: pointer; position: relative; border: 1px solid var(--border);
}

.price-drop-tag {
    position: absolute; top: 10px; left: 10px; z-index: 5;
    background: var(--baby-pink); color: #991b1b;
    font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px;
    display: flex; align-items: center; gap: 3px;
}

.p-img-box { width: 100%; aspect-ratio: 1; overflow: hidden; background: #f8fafc; }
.p-img { width: 100%; height: 100%; object-fit: cover; }

.p-content { padding: 14px; }
.p-meta { font-size: 10px; font-weight: 700; color: var(--premium-blue); text-transform: uppercase; }
.p-title { font-size: 14px; font-weight: 700; margin: 4px 0 8px; height: 18px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.verified-badge {
    display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: #10b981;
}

/* --- BOTTOM NAV --- */
.bottom-nav {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 92%; max-width: 450px; background: #1e293b;
  height: 75px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000;
}
.nav-item { color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.nav-item.active { color: var(--mint-green); }

/* --- MODAL --- */
#pModal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 5000; align-items: flex-end; backdrop-filter: blur(10px); }
.modal-box { background: white; width: 100%; border-radius: 35px 35px 0 0; padding: 25px; animation: slideUp 0.4s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

</style>
</head>
<body>

<header class="app-header">
    <div class="logo">Dorm<span>Kart</span></div>
    <div style="display: flex; gap: 15px;">
        <i class="material-icons-round" style="color: var(--text-muted);">notifications_none</i>
        <i class="material-icons-round" onclick="location.href='profile.html'">account_circle</i>
    </div>
</header>

<div id="recentSection" style="display:none;">
    <div class="section-title">Recently Viewed <span>Clear</span></div>
    <div class="recent-scroll" id="recentContainer"></div>
</div>

<div class="section-title">Explore Campus <span>Filter</span></div>

<main class="product-grid" id="productGrid"></main>

<div id="pModal" onclick="closeModal(event)">
    <div class="modal-box" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active"><i class="material-icons-round">home</i>Home</a>
  <a href="chats.html" class="nav-item"><i class="material-icons-round">chat_bubble</i>Chats</a>
  <a href="add_product.html" class="nav-item" style="color:var(--sky-blue)"><i class="material-icons-round" style="font-size:32px">add_circle</i></a>
  <a href="wishlist.html" class="nav-item"><i class="material-icons-round">favorite</i>Saved</a>
  <a href="profile.html" class="nav-item"><i class="material-icons-round">person</i>Me</a>
</nav>

<script>
let allProducts = [];
const RECENT_KEY = 'dormkart_recent_v2';

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return location.href = 'login-signup.html';
  
  fetchProducts();
  renderRecent();
}

async function fetchProducts() {
  const { data } = await supabaseClient.from('products').select(`*, seller:users(name, is_verified)`).eq('status', 'active');
  allProducts = data || [];
  renderCards(allProducts);
}

function renderCards(products) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  products.forEach(p => {
    const img = p.image_url ? p.image_url.split(',')[0] : 'placeholder.jpg';
    const card = document.createElement('div');
    card.className = 'p-card';
    card.innerHTML = `
      <div class="price-drop-tag"><i class="material-icons-round" style="font-size:12px;">trending_down</i> Price Drop</div>
      <div class="p-img-box"><img src="${img}" class="p-img"></div>
      <div class="p-content">
          <div class="p-meta">${p.category}</div>
          <div class="p-title">${p.title}</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
              <span style="font-weight:800; font-size:16px;">₹${p.price}</span>
              <div class="verified-badge"><i class="material-icons-round" style="font-size:12px;">verified</i> Verified</div>
          </div>
      </div>
    `;
    card.onclick = () => openProduct(p);
    grid.appendChild(card);
  });
}

function openProduct(p) {
    saveToRecent(p);
    showModal(p);
}

function saveToRecent(p) {
    let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    recent = recent.filter(item => item.id !== p.id); // Remove duplicate
    recent.unshift({ id: p.id, title: p.title, img: p.image_url.split(',')[0] }); // Add to start

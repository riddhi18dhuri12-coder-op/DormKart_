<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>DormKart - Marketplace</title>

<link rel="stylesheet" href="app.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

/* your original styles preserved */

.product-card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(15px);
border-radius:24px;
padding:15px;
box-shadow:0 8px 20px var(--shadow-color);
transition:transform .2s;
position:relative;
}

.wishlist-btn{
position:absolute;
top:10px;
right:10px;
border:none;
background:white;
border-radius:50%;
width:32px;
height:32px;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.college-tag{
font-size:12px;
color:#718096;
margin-top:4px;
}

.rating{
font-size:12px;
color:#F59E0B;
}

</style>
</head>

<body>

<div class="app-container">

<header class="app-header">
<h1 class="app-title">DormKart</h1>
</header>

<main class="content-area">

<div class="search-bar">
<input id="searchInput" placeholder="Search products or college">
</div>

<div style="display:flex;gap:10px;margin-bottom:15px">

<select id="collegeFilter" onchange="fetchProducts()">
<option value="all">All Colleges</option>
<option value="mine">My College</option>
</select>

<select id="sortSelect" onchange="fetchProducts()">
<option value="popular">Popular</option>
<option value="new">Newest</option>
<option value="priceLow">Price Low</option>
<option value="priceHigh">Price High</option>
<option value="college">College</option>
</select>

</div>

<div class="product-grid" id="productGrid"></div>

<button class="btn" style="margin-top:25px;" onclick="shuffleItems()">Shuffle Feed</button>

</main>

<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item active">
<span>Home</span>
</a>

<a href="chats.html" class="nav-item">
<span>Chats</span>
</a>

<a href="add_product.html" class="nav-item">
<span>Sell</span>
</a>

<a href="profile.html" class="nav-item">
<span>Profile</span>
</a>

</nav>

</div>

<script>

let currentUser

window.onload=init

async function init(){

const {data:{session}}=await supabaseClient.auth.getSession()

if(!session){
location="login-signup.html"
return
}

currentUser=session.user

fetchProducts()

listenRealtime()

}

async function fetchProducts(){

const {data:userData}=await supabaseClient
.from("users")
.select("college")
.eq("id",currentUser.id)
.single()

let query=supabaseClient
.from("products")
.select("*,users(college)")
.eq("status","active")

const filter=document.getElementById("collegeFilter").value

if(filter==="mine")
query=query.eq("users.college",userData.college)

const sort=document.getElementById("sortSelect").value

if(sort==="new")
query=query.order("created_at",{ascending:false})

if(sort==="priceLow")
query=query.order("price",{ascending:true})

if(sort==="priceHigh")
query=query.order("price",{ascending:false})

const {data}=await query

data.sort((a,b)=>{

const scoreA=(a.likes||0)*2+(a.views||0)
const scoreB=(b.likes||0)*2+(b.views||0)

return scoreB-scoreA

})

renderProducts(data)

}

async function renderProducts(data){

const grid=document.getElementById("productGrid")

grid.innerHTML=""

for(const item of data){

const rating=await getSellerRating(item.seller_id)

let img=`<div class="p-img">📦</div>`

if(item.image_url){
const first=item.image_url.split(",")[0]
img=`<img src="${first}" style="width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:12px">`
}

const card=document.createElement("div")

card.className="product-card"

card.innerHTML=`

<button class="wishlist-btn" onclick="toggleWishlist('${item.id}',this)">🤍</button>

${img}

<p class="p-title">${item.title}</p>

<div class="p-price">₹${Number(item.price).toFixed(2)}</div>

<div class="college-tag">🎓 ${item.users?.college||""}</div>

<div class="rating">⭐ ${rating}</div>

<div class="card-actions">

<a href="product_detail.html?id=${item.id}" class="action-icon-btn">View</a>

<button onclick="startChat('${item.id}','${item.seller_id}')" class="action-icon-btn">Chat</button>

</div>

`

grid.appendChild(card)

}

}

async function toggleWishlist(productId,btn){

const {data:existing}=await supabaseClient
.from("wishlist")
.select("*")
.eq("user_id",currentUser.id)
.eq("product_id",productId)
.single()

if(existing){

await supabaseClient
.from("wishlist")
.delete()
.eq("user_id",currentUser.id)
.eq("product_id",productId)

btn.innerHTML="🤍"

}else{

await supabaseClient
.from("wishlist")
.insert({user_id:currentUser.id,product_id:productId})

btn.innerHTML="❤️"

}

}

async function getSellerRating(sellerId){

const {data}=await supabaseClient
.from("reviews")
.select("rating")
.eq("seller_id",sellerId)

if(!data||data.length===0) return "New"

let total=0
data.forEach(r=>total+=r.rating)

return (total/data.length).toFixed(1)

}

function startChat(productId,sellerId){

location=`chat_room.html?user=${sellerId}`

}

function shuffleItems(){

const grid=document.getElementById("productGrid")

const cards=[...grid.children]

for(let i=cards.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))

;[cards[i],cards[j]]=[cards[j],cards[i]]

}

grid.innerHTML=""

cards.forEach(c=>grid.appendChild(c))

}

function listenRealtime(){

supabaseClient
.channel("products")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"products"},
payload=>{

fetchProducts()

})
.subscribe()

}

document.getElementById("searchInput")
.addEventListener("input",async function(){

const term=this.value

const {data}=await supabaseClient
.from("products")
.select("*,users(college)")
.or(`title.ilike.%${term}%,users.college.ilike.%${term}%`)
.eq("status","active")

renderProducts(data)

})

</script>

</body>
</html>

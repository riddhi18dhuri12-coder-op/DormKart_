     <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>DormKart • Campus Trade & Marketplace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #00e676;
      --primary-dark: #00c853;
      --primary-glow: rgba(0, 230, 118, 0.18);
      --trade: #7c3aed;
      --trade-light: #ede9fe;
      --text: #0d1117;
      --text-light: #5a6476;
      --bg: #f0f4f0;
      --card-bg: #ffffff;
      --border: #e3e9e3;
      --nav-height: 72px;
    }
    body.dark {
      --text: #e8f0e8;
      --text-light: #7a8c7a;
      --bg: #0a0f0a;
      --card-bg: #111811;
      --border: #1e2a1e;
      --primary-glow: rgba(0, 230, 118, 0.10);
      --trade-light: #2e1a4a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding-bottom: calc(var(--nav-height) + 20px);
      transition: background 0.3s, color 0.3s;
    }
    .app-header {
      background: var(--card-bg);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.3s, border 0.3s;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: var(--text);
    }
    .icon-btn:hover { background: var(--primary-glow); border-color: var(--primary-dark); color: var(--primary-dark); }
    .notif-wrap { position: relative; }
    .badge-dot {
      position: absolute; top: 6px; right: 6px;
      width: 10px; height: 10px;
      background: #ef4444; border-radius: 50%;
      border: 2px solid var(--card-bg);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    }
    .hero { padding: 20px 16px 8px; }
    .hero-label { font-family: 'Syne',sans-serif; font-size: 12px; font-weight: 700; color: var(--primary-dark); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .hero-title { font-family: 'Syne',sans-serif; font-size: 28px; font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
    .hero-title em { color: var(--primary-dark); font-style: normal; }
    .stats-row { display: flex; gap: 10px; margin: 10px 0 6px; flex-wrap: wrap; }
    .stat-chip {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 40px; padding: 8px 16px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500;
      transition: all 0.2s;
    }
    .stat-chip i { color: var(--primary-dark); font-size: 14px; }
    .stat-chip .stat-num { font-weight: 700; color: var(--text); }
    .search-wrap { position: relative; margin-top: 8px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; stroke: var(--text-light); fill: none; }
    .search-wrap input {
      width: 100%; padding: 14px 44px 14px 44px; border-radius: 18px;
      border: 1.5px solid var(--border); background: var(--card-bg);
      color: var(--text); font-size: 15px; outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .search-wrap input:focus { border-color: var(--primary-dark); box-shadow: 0 0 0 4px var(--primary-glow); }
    .search-clear {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-light); cursor: pointer;
      font-size: 16px; display: none; padding: 4px;
    }
    .search-clear.visible { display: block; }
    .filter-bar {
      display: flex; gap: 8px; padding: 12px 16px;
      overflow-x: auto; scrollbar-width: none; align-items: center;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-select {
      padding: 8px 14px; border: 1.5px solid var(--border);
      border-radius: 40px; background: var(--card-bg);
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; outline: none; font-family: 'DM Sans', sans-serif;
      white-space: nowrap; flex-shrink: 0;
      transition: border 0.2s;
    }
    .filter-select:focus { border-color: var(--primary-dark); }
    .filter-btn {
      padding: 8px 18px; border: 1.5px solid var(--border);
      border-radius: 40px; background: var(--card-bg);
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      font-family: 'DM Sans', sans-serif; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .filter-btn.active { background: var(--primary-dark); border-color: var(--primary-dark); color: white; }
    .filter-btn i { font-size: 12px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 12px 16px 8px;
    }
    .section-header h3 { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-header h3 i { color: var(--primary-dark); font-size: 16px; }
    .section-link { font-size: 13px; color: var(--primary-dark); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .section-link i { font-size: 11px; }
    .live-indicator {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; font-size: 12px; color: var(--text-light);
    }
    .live-dot {
      width: 8px; height: 8px; background: #ef4444; border-radius: 50%;
      animation: pulse-dot 1.5s infinite;
    }
    .live-indicator span { font-weight: 500; }
    .trade-spotlight {
      background: linear-gradient(135deg, var(--trade-light), rgba(124,58,237,0.15));
      margin: 8px 16px 16px; padding: 16px 18px;
      border-radius: 24px; border: 1px solid rgba(124,58,237,0.3);
      display: flex; align-items: center; justify-content: space-between; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .trade-spotlight::before {
      content: '';
      position: absolute; top: -50%; right: -20%;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(124,58,237,0.15), transparent);
      border-radius: 50%;
    }
    .trade-spotlight:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
    .ts-left { display: flex; align-items: center; gap: 12px; z-index: 1; }
    .ts-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: var(--trade); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .ts-title { font-weight: 700; color: var(--trade); font-family: 'Syne',sans-serif; font-size: 16px; }
    .ts-sub { color: var(--text-light); font-size: 13px; margin-top: 2px; }
    .ts-arrow { font-size: 20px; color: var(--trade); z-index: 1; transition: transform 0.2s; }
    .trade-spotlight:hover .ts-arrow { transform: translateX(4px); }
    .product-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px; padding: 0 16px 16px;
    }
    @media (min-width: 500px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    .product-card {
      background: var(--card-bg); border-radius: 20px; overflow: hidden;
      border: 1px solid var(--border); cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s; position: relative;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.08); }
    .p-img-wrap { aspect-ratio: 1/1; background: var(--bg); overflow: hidden; position: relative; }
    .p-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .product-card:hover .p-img-wrap img { transform: scale(1.04); }
    .trade-badge {
      position: absolute; top: 8px; right: 8px; background: var(--trade);
      color: white; font-size: 10px; font-weight: 800; padding: 4px 10px;
      border-radius: 30px; font-family: 'Syne',sans-serif;
      display: flex; align-items: center; gap: 4px;
      backdrop-filter: blur(8px);
    }
    .trade-badge i { font-size: 10px; }
    .cond-badge {
      position: absolute; bottom: 8px; left: 8px; background: rgba(0,200,83,0.9);
      color: white; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600;
      backdrop-filter: blur(8px);
    }
    .p-wishlist-btn {
      position: absolute; top: 8px; left: 8px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.85); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; color: var(--text-light);
      transition: all 0.2s; backdrop-filter: blur(8px); z-index: 2;
    }
    .p-wishlist-btn:hover { background: white; color: #ef4444; transform: scale(1.1); }
    .p-wishlist-btn.saved { color: #ef4444; }
    .p-wishlist-btn.saved i::before { content: "\f004"; font-weight: 900; }
    .p-info { padding: 10px 12px 12px; }
    .p-price { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
    .p-price .p-og-price {
      font-size: 12px; font-weight: 400; color: var(--text-light);
      text-decoration: line-through; margin-left: 6px;
    }
    .p-title { font-size: 13px; color: var(--text-light); margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-meta { font-size: 11px; color: var(--text-light); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .p-meta i { font-size: 10px; }
    .trade-chip { background: var(--trade-light); color: var(--trade); font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .p-rating { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
    .p-rating i { font-size: 10px; color: #f59e0b; }
    .p-rating span { font-size: 11px; color: var(--text-light); }
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px;
    }
    .skel-card { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
    .skel-img { aspect-ratio: 1/1; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-state .e-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { font-size: 15px; margin-bottom: 8px; }
    .empty-state .e-sub { font-size: 13px; opacity: 0.7; }
    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; z-index: 3000; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card-bg); width: 100%; max-width: 600px;
      border-radius: 28px 28px 0 0; max-height: 92vh;
      overflow-y: auto; animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-drag { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 12px auto 0; }
    .slider-wrap { position: relative; height: 300px; background: var(--bg); overflow: hidden; }
    .slides { display: flex; height: 100%; transition: transform 0.35s ease; }
    .slides img { min-width: 100%; height: 100%; object-fit: contain; flex-shrink: 0; }
    .slide-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.45); border: none; color: white;
      width: 34px; height: 34px; border-radius: 50%; font-size: 18px;
      cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .slide-btn:hover { background: rgba(0,0,0,0.65); }
    .slide-btn.prev { left: 10px; }
    .slide-btn.next { right: 10px; }
    .close-btn {
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.5); border: none;
      width: 36px; height: 36px; border-radius: 50%;
      color: white; font-size: 16px; cursor: pointer; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .close-btn:hover { background: rgba(0,0,0,0.7); }
    .share-btn {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.5); border: none;
      width: 36px; height: 36px; border-radius: 50%;
      color: white; font-size: 15px; cursor: pointer; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .share-btn:hover { background: rgba(0,0,0,0.7); }
    .img-counter {
      position: absolute; bottom: 12px; right: 12px;
      background: rgba(0,0,0,0.5); color: white; padding: 4px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 10;
    }
    .slide-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: background 0.2s; }
    .dot.active { background: white; }
    .modal-body { padding: 16px 20px 0; }
    .price-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0 4px; flex-wrap: wrap; gap: 8px; }
    .modal-price { font-family: 'Syne',sans-serif; font-size: 28px; font-weight: 800; }
    .modal-price .modal-og-price { font-size: 16px; font-weight: 400; color: var(--text-light); text-decoration: line-through; margin-left: 8px; }
    .modal-price .modal-discount { font-size: 13px; font-weight: 700; color: #ef4444; margin-left: 6px; }
    .verified-badge { background: #dcfce7; color: #166534; padding: 5px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .cond-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); padding: 5px 12px; border-radius: 30px; font-size: 12px; }
    .cond-tag i { font-size: 11px; color: var(--primary-dark); }
    .cat-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg); padding: 5px 12px; border-radius: 30px; font-size: 12px; }
    .cat-tag i { font-size: 11px; color: var(--trade); }
    .modal-stats { display: flex; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
    .modal-stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-light); }
    .modal-stat i { font-size: 14px; }
    .modal-stat .modal-stat-val { font-weight: 600; color: var(--text); }
    .trade-box {
      background: linear-gradient(135deg, var(--trade-light), rgba(124,58,237,0.08));
      border-radius: 20px; padding: 16px;
      margin: 12px 0; border: 1px dashed rgba(124,58,237,0.5);
    }
    .trade-box-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .trade-box-hd i { font-size: 20px; color: var(--trade); }
    .trade-box-hd strong { font-weight: 700; font-family: 'Syne',sans-serif; color: var(--trade); }
    .trade-box p { font-size: 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 6px; }
    .trade-box p i { margin-top: 3px; font-size: 12px; color: var(--trade); }
    .trade-input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 14px; background: var(--card-bg); color: var(--text);
      font-size: 14px; outline: none; margin: 6px 0;
      font-family: 'DM Sans',sans-serif;
    }
    .trade-input:focus { border-color: var(--trade); box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }
    .no-trade { padding: 12px 16px; background: var(--bg); border-radius: 18px; margin: 12px 0; color: var(--text-light); font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .no-trade i { font-size: 16px; }
    .desc-sec { margin: 12px 0; }
    .desc-sec h4 { font-family: 'Syne',sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .desc-sec h4 i { font-size: 14px; color: var(--text-light); }
    .desc-sec p { font-size: 14px; color: var(--text-light); line-height: 1.6; white-space: pre-wrap; }
    .seller-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; background: var(--bg); border-radius: 20px;
      margin: 16px 0; cursor: pointer; transition: all 0.2s;
    }
    .seller-row:hover { background: var(--border); }
    .seller-av {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--primary-dark); display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 700;
      font-size: 18px; flex-shrink: 0;
      position: relative;
    }
    .seller-av img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .seller-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #22c55e; border: 2px solid var(--bg);
    }
    .seller-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; }
    .seller-name .verified-sm { color: var(--primary-dark); font-size: 13px; }
    .seller-col { font-size: 12px; color: var(--text-light); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .seller-col i { font-size: 10px; }
    .btn-row {
      display: flex; flex-direction: column; gap: 10px;
      padding: 16px 20px 20px; background: var(--card-bg);
      border-top: 1px solid var(--border); position: sticky; bottom: 0;
    }
    .btn-inline { display: flex; gap: 8px; }
    .btn {
      padding: 14px 12px; border-radius: 18px; border: none;
      font-weight: 700; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'DM Sans',sans-serif;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary { background: var(--primary-dark); color: white; width: 100%; box-shadow: 0 4px 16px rgba(0,200,83,0.3); }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(0,200,83,0.4); }
    .btn-trade { background: var(--trade); color: white; width: 100%; margin-top: 4px; box-shadow: 0 4px 16px rgba(124,58,237,0.3); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); flex: 1; }
    .btn-outline:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
    .btn-msg { background: transparent; border: 1.5px solid var(--border); color: var(--text); width: 100%; }
    .btn-msg:hover { border-color: var(--primary-dark); color: var(--primary-dark); }
    .btn i { font-size: 15px; }
    /* UPI */
    .upi-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; z-index: 4000;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .upi-overlay.open { display: flex; }
    .upi-box {
      background: var(--card-bg); width: 340px; border-radius: 28px;
      padding: 28px; text-align: center;
      animation: scaleIn 0.25s ease-out;
    }
    @keyframes scaleIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
    .upi-icon { font-size: 40px; margin-bottom: 12px; }
    .upi-title { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .upi-title i { color: var(--primary-dark); }
    .upi-amt { font-family: 'Syne',sans-serif; font-size: 30px; font-weight: 800; color: var(--primary-dark); margin: 12px 0; }
    .upi-hint { font-size: 13px; color: var(--text-light); margin: 8px 0 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .upi-hint i { font-size: 14px; }
    .upi-btns { display: flex; gap: 10px; }
    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-height); background: var(--card-bg);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center;
      z-index: 2000; padding-bottom: env(safe-area-inset-bottom, 0px);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.3s, border 0.3s;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      color: var(--text-light); text-decoration: none;
      font-size: 10px; font-weight: 600; gap: 3px;
      transition: color 0.2s;
      position: relative;
    }
    .nav-item.active { color: var(--primary-dark); }
    .nav-item.active::before {
      content: '';
      position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
      width: 24px; height: 3px; background: var(--primary-dark); border-radius: 0 0 4px 4px;
    }
    .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-sell {
      background: var(--primary-dark); width: 54px; height: 54px;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin-top: -30px;
      border: 4px solid var(--bg);
      box-shadow: 0 4px 16px rgba(0,200,83,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .nav-sell:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,200,83,0.45); }
    .nav-sell svg { stroke: white; }
    /* TOAST */
    .toast {
      position: fixed; bottom: calc(var(--nav-height) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a; color: white; padding: 12px 20px;
      border-radius: 30px; font-size: 14px; font-weight: 500;
      z-index: 5000; opacity: 0; transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap; pointer-events: none;
      display: flex; align-items: center; gap: 8px;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast i { font-size: 16px; }
    .toast.success i { color: #00e676; }
    .toast.error i { color: #ef4444; }
    .toast.info i { color: #60a5fa; }
    /* SCROLL TO TOP */
    .scroll-top-btn {
      position: fixed; bottom: calc(var(--nav-height) + 16px); right: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--primary-dark); color: white; border: none;
      font-size: 18px; cursor: pointer; z-index: 1500;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,200,83,0.35);
      transition: all 0.2s;
    }
    .scroll-top-btn.visible { display: flex; }
    .scroll-top-btn:hover { transform: translateY(-2px); }
    /* RESULT COUNT */
    .result-count {
      padding: 4px 16px 8px; font-size: 12px; color: var(--text-light);
      display: flex; align-items: center; gap: 6px;
    }
    .result-count i { font-size: 12px; }
    .result-count strong { color: var(--text); }
    /* RECENTLY VIEWED */
    .recently-viewed {
      display: flex; gap: 10px; padding: 8px 16px 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .recently-viewed::-webkit-scrollbar { display: none; }
    .recent-item {
      flex-shrink: 0; width: 100px; cursor: pointer;
      transition: transform 0.2s;
    }
    .recent-item:hover { transform: translateY(-2px); }
    .recent-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 14px; border: 1px solid var(--border); }
    .recent-item .recent-title { font-size: 11px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-light); }
    .recent-item .recent-price { font-size: 13px; font-weight: 700; font-family: 'Syne',sans-serif; }
  </style>
</head>

    <div class="skel-card"><div class="skeleton skel-img"></div><div class="skeleton" style="height:14px;margin:10px;"></div></div>

<script>


// ── STATE ──
let allProducts    = [];
let currentImgs    = [];
let currentImgIdx  = 0;
let tradeOnly      = false;
let session        = null;
let recentlyViewed = JSON.parse(localStorage.getItem('dk_recent') || '[]');
let wishlistSet    = new Set(JSON.parse(localStorage.getItem('dk_wishlist') || '[]'));

// ── INIT ──
async function init() {
  applySavedTheme();
  try {
    const { data, error } = await supabaseClient.auth.getSession();
    if (error || !data.session) { window.location.href = 'login-signup.html'; return; }
    session = data.session;
    await loadWishlist();
  } catch (e) {
    console.warn('Auth unavailable — running in preview mode');
  }
  await fetchProducts();
  renderRecentlyViewed();
}

// ── WISHLIST SYNC ──
async function loadWishlist() {
  if (!session) return;
  try {
    const { data } = await supabaseClient.from('wishlist').select('product_id').eq('user_id', session.user.id);
    if (data) {
      wishlistSet = new Set(data.map(d => d.product_id));
      localStorage.setItem('dk_wishlist', JSON.stringify([...wishlistSet]));
    }
  } catch(e) {}
}

// ── FETCH ──
async function fetchProducts() {
  try {
    const { data, error } = await supabaseClient
      .from('products')
      .select('*, seller:users(id, name, college, is_verified, avatar_url, upi_id)')
      .eq('status', 'active')
      .order('created_at', { ascending: false });
    if (error) throw error;
    allProducts = data || [];
  } catch (e) {
    console.error('Fetch error:', e);
    allProducts = [];
    showToast('Could not load products', 'error');
  }
  updateStats();
  applyFilters();
}

// ── UPDATE STATS ──
function updateStats() {
  document.getElementById('statProducts').textContent = allProducts.length;
  const tradeCount = allProducts.filter(p => Boolean(p.swap_enabled)).length;
  document.getElementById('statTrades').textContent = tradeCount > 999 ? (tradeCount / 1000).toFixed(1) + 'k' : tradeCount;
  const campuses = new Set(allProducts.map(p => p.seller?.college).filter(Boolean));
  document.getElementById('statCampuses').textContent = campuses.size || '8';
}

// ── RENDER ──
function renderGrid(products) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  const rc = document.getElementById('resultCount');
  const rn = document.getElementById('resultNum');

  // Show result count only when filtering
  const q = document.getElementById('searchInput').value.trim();
  const cat = document.getElementById('categoryFilter').value;
  const srt = document.getElementById('priceSort').value;
  if (q || cat || tradeOnly || srt) {
    rc.style.display = 'flex';
    rn.textContent = products.length;
  } else {
    rc.style.display = 'none';
  }

  if (!products.length) {
    grid.innerHTML = '<div class="empty-state"><div class="e-icon"><i class="fas fa-box-open" style="font-size:56px;color:var(--text-light);opacity:0.4;"></i></div><p>No items found</p><p class="e-sub">Try adjusting your search or filters</p></div>';
    return;
  }
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    const img  = (p.image_url ? p.image_url.split(',')[0].trim() : '') || 'placeholder.jpg';
    const swap = Boolean(p.swap_enabled);
    const price = Math.floor(p.price || 0).toLocaleString('en-IN');
    const isSaved = wishlistSet.has(p.id);
    const ogPrice = p.original_price ? Math.floor(p.original_price).toLocaleString('en-IN') : '';
    const catIcon = getCategoryIcon(p.category);

    card.innerHTML = `
      <div class="p-img-wrap">
        <button class="p-wishlist-btn ${isSaved ? 'saved' : ''}" onclick="event.stopPropagation(); toggleWishlistQuick('${p.id}', this)">
          <i class="${isSaved ? 'fas' : 'far'} fa-heart"></i>
        </button>
        <img src="${img}" loading="lazy" alt="${eh(p.title)}" onerror="this.src='placeholder.jpg'">
        ${swap ? '<div class="trade-badge"><i class="fas fa-arrows-rotate"></i> TRADE</div>' : ''}
        ${p.condition ? `<div class="cond-badge"><i class="fas fa-tag" style="font-size:8px;"></i> ${eh(p.condition)}</div>` : ''}
      </div>
      <div class="p-info">
        <div class="p-price">₹${price}${ogPrice ? `<span class="p-og-price">₹${ogPrice}</span>` : ''}</div>
        <div class="p-title">${eh(p.title)}</div>
        <div class="p-meta">
          <span><i class="fas fa-location-dot"></i> ${eh(p.seller?.college || 'Campus')}</span>
          ${swap ? '<span class="trade-chip"><i class="fas fa-shuffle" style="font-size:8px;"></i> Swap</span>' : ''}
        </div>
      </div>`;
    card.addEventListener('click', () => openDetail(p));
    grid.appendChild(card);
  });
}

// ── CATEGORY ICON HELPER ──
function getCategoryIcon(cat) {
  const icons = {
    'Electronics': 'fa-microchip',
    'Books': 'fa-book',
    'Dorm Essentials': 'fa-couch',
    'Fashion': 'fa-shirt'
  };
  return icons[cat] || 'fa-box';
}

// ── QUICK WISHLIST TOGGLE ──
async function toggleWishlistQuick(pid, btn) {
  if (!session) { showToast('Please log in first', 'info'); return; }
  if (wishlistSet.has(pid)) {
    wishlistSet.delete(pid);
    btn.classList.remove('saved');
    btn.querySelector('i').className = 'far fa-heart';
    try { await supabaseClient.from('wishlist').delete().eq('user_id', session.user.id).eq('product_id', pid); } catch(e) {}
    showToast('Removed from wishlist', 'info');
  } else {
    wishlistSet.add(pid);
    btn.classList.add('saved');
    btn.querySelector('i').className = 'fas fa-heart';
    btn.style.transform = 'scale(1.3)';
    setTimeout(() => btn.style.transform = '', 200);
    try { await supabaseClient.from('wishlist').insert({ user_id: session.user.id, product_id: pid }); } catch(e) {}
    showToast('Added to wishlist', 'success');
  }
  localStorage.setItem('dk_wishlist', JSON.stringify([...wishlistSet]));
}

// ── FILTERS ──
function applyFilters() {
  let f = [...allProducts];
  const q  = document.getElementById('searchInput').value.toLowerCase().trim();const cat = document.getElementById('categoryFilter').value;
  const srt = document.getElementById('priceSort').value;
  if (q)    f = f.filter(p => (p.title||'').toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q));
  if (cat)  f = f.filter(p => p.category === cat);
  if (tradeOnly) f = f.filter(p => Boolean(p.swap_enabled));
  if (srt === 'low')    f.sort((a,b) => (a.price||0) - (b.price||0));
  if (srt === 'high')   f.sort((a,b) => (b.price||0) - (a.price||0));
  if (srt === 'newest') f.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  if (srt === 'oldest') f.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  renderGrid(f);
}

function toggleTradeFilter() {
  tradeOnly = !tradeOnly;
  document.getElementById('tradeFilterBtn').classList.toggle('active', tradeOnly);
  applyFilters();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  applyFilters();
}

document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('searchClear').classList.toggle('visible', this.value.length > 0);
  applyFilters();
});
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('priceSort').addEventListener('change', applyFilters);

// ── RECENTLY VIEWED ──
function addToRecentlyViewed(product) {
  recentlyViewed = recentlyViewed.filter(r => r.id !== product.id);
  recentlyViewed.unshift({
    id: product.id,
    title: product.title,
    price: product.price,
    image: (product.image_url ? product.image_url.split(',')[0].trim() : '') || 'placeholder.jpg'
  });
  if (recentlyViewed.length > 10) recentlyViewed = recentlyViewed.slice(0, 10);
  localStorage.setItem('dk_recent', JSON.stringify(recentlyViewed));
  renderRecentlyViewed();
}

function renderRecentlyViewed() {
  const section = document.getElementById('recentlyViewedSection');
  const container = document.getElementById('recentlyViewed');
  if (!recentlyViewed.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  container.innerHTML = recentlyViewed.map(r => `
    <div class="recent-item" onclick="openDetailById('${r.id}')">
      <img src="${r.image}" alt="${eh(r.title)}" onerror="this.src='placeholder.jpg'" loading="lazy">
      <div class="recent-price">₹${Math.floor(r.price||0).toLocaleString('en-IN')}</div>
      <div class="recent-title">${eh(r.title)}</div>
    </div>
  `).join('');
}

function clearRecentlyViewed() {
  recentlyViewed = [];
  localStorage.removeItem('dk_recent');
  renderRecentlyViewed();
  showToast('History cleared', 'info');
}

async function openDetailById(pid) {
  const p = allProducts.find(x => x.id === pid);
  if (p) openDetail(p);
}

// ── DETAIL MODAL ──
function openDetail(p) {
  addToRecentlyViewed(p);
  currentImgIdx = 0;
  currentImgs = (p.image_url ? p.image_url.split(',').map(s => s.trim()) : []).filter(Boolean);
  if (!currentImgs.length) currentImgs = ['placeholder.jpg'];

  const swap     = Boolean(p.swap_enabled);
  const price    = Math.floor(p.price || 0).toLocaleString('en-IN');
  const ogPrice  = p.original_price ? Math.floor(p.original_price).toLocaleString('en-IN') : '';
  const discount = p.original_price && p.price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
  const initial  = (p.seller?.name || 'S').charAt(0).toUpperCase();
  const multi    = currentImgs.length > 1;
  const catIcon  = getCategoryIcon(p.category);
  const isSaved  = wishlistSet.has(p.id);
  const timeAgo  = getTimeAgo(p.created_at);

  const slides = currentImgs.map(u => `<img src="${u}" alt="product" onerror="this.src='placeholder.jpg'">`).join('');
  const dots   = multi ? currentImgs.map((_,i) => `<div class="dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('') : '';

  const sellerAvatar = p.seller?.avatar_url
    ? `<img src="${eh(p.seller.avatar_url)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><span style="display:none;">${initial}</span>`
    : initial;

  document.getElementById('modalBox').innerHTML = `
    <div class="modal-drag"></div>
    <div class="slider-wrap">
      <button class="close-btn" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
      <button class="share-btn" onclick="shareProduct('${p.id}')"><i class="fas fa-share-nodes"></i></button>
      ${multi ? '<button class="slide-btn prev" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button><button class="slide-btn next" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>' : ''}
      <div class="slides" id="slides">${slides}</div>
      ${multi ? `<div class="slide-dots">${dots}</div>` : ''}
      ${multi ? `<div class="img-counter">${currentImgIdx + 1} / ${currentImgs.length}</div>` : ''}
    </div>
    <div class="modal-body">
      <div class="price-row">
        <div class="modal-price">₹${price}${ogPrice ? `<span class="modal-og-price">₹${ogPrice}</span>` : ''}${discount > 0 ? `<span class="modal-discount">${discount}% off</span>` : ''}</div>
        ${p.seller?.is_verified ? '<span class="verified-badge"><i class="fas fa-circle-check"></i> Verified</span>' : ''}
      </div>
      <div class="modal-title">${eh(p.title)}</div>
      <div class="modal-tags">
        ${p.condition ? `<span class="cond-tag"><i class="fas fa-tag"></i> ${eh(p.condition)}</span>` : ''}
        ${p.category ? `<span class="cat-tag"><i class="fas ${catIcon}"></i> ${eh(p.category)}</span>` : ''}
      </div>
      <div class="modal-stats">
        <div class="modal-stat"><i class="far fa-clock"></i> <span class="modal-stat-val">${timeAgo}</span></div>
        <div class="modal-stat"><i class="far fa-eye"></i> <span class="modal-stat-val">${Math.floor(Math.random() * 200 + 20)} views</span></div>
        <div class="modal-stat"><i class="far fa-heart"></i> <span class="modal-stat-val">${Math.floor(Math.random() * 30 + 5)} saves</span></div>
      </div>
      ${swap ? `
      <div class="trade-box">
        <div class="trade-box-hd"><i class="fas fa-shuffle"></i><strong>Trade option available</strong></div>
        <p><i class="fas fa-hand-holding-heart"></i> <strong>Seller wants:</strong> ${eh(p.swap_item || 'Open to offers')}</p>
        <input type="text" class="trade-input" id="tradeInput" placeholder="What do you offer in exchange?">
        <button class="btn btn-trade" id="tradeSendBtn"><i class="fas fa-paper-plane"></i> Propose Trade</button>
        <p style="font-size:12px;color:var(--text-light);margin-top:10px;display:flex;align-items:center;gap:4px;"><i class="fas fa-circle-info"></i> You can also negotiate in chat.</p>
      </div>` : `<div class="no-trade"><i class="fas fa-rotate-left"></i> Seller has not enabled trade for this item.</div>`}
      <div class="desc-sec">
        <h4><i class="fas fa-align-left"></i> Description</h4>
        <p>${eh(p.description || 'No description provided.')}</p>
      </div>
      <div class="seller-row" onclick="window.location.href='profile.html?id=${p.seller_id}'">
        <div class="seller-av">${sellerAvatar}<div class="seller-online"></div></div>
        <div>
          <div class="seller-name">${eh(p.seller?.name || 'Seller')} ${p.seller?.is_verified ? '<i class="fas fa-circle-check verified-sm"></i>' : ''}</div>
          <div class="seller-col"><i class="fas fa-location-dot"></i> ${eh(p.seller?.college || '')}</div>
        </div>
        <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--text-light);font-size:14px;"></i>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="openUPI(${p.price||0},'${ea(p.seller?.upi_id||'')}')"><i class="fas fa-bolt"></i> Buy Now</button>
      <div class="btn-inline">
        <button class="btn btn-outline" onclick="addToCart('${p.id}')"><i class="fas fa-cart-plus"></i> Cart</button>
        <button class="btn btn-outline" onclick="makeOffer('${p.id}','${p.seller_id}')"><i class="fas fa-hand-holding-dollar"></i> Offer</button>
        <button class="btn btn-outline" onclick="addToWishlist('${p.id}')" style="${isSaved ? 'color:#ef4444;border-color:#ef4444;' : ''}"><i class="${isSaved ? 'fas' : 'far'} fa-heart"></i></button>
      </div>
      <button class="btn btn-msg" onclick="window.location.href='chats.html?id=${p.seller_id}'"><i class="fas fa-comment-dots"></i> Message Seller</button>
    </div>`;

  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (swap) {
    const btn = document.getElementById('tradeSendBtn');
    if (btn) btn.addEventListener('click', async () => {
      const inp = document.getElementById('tradeInput');
      const txt = inp ? inp.value.trim() : '';
      if (!txt) { showToast('Please describe what you offer', 'error'); return; }
      await sendTrade(p.id, p.seller_id, txt);
    });
  }
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
}
function onModalBgClick(e) { if (e.target.id === 'productModal') closeModal(); }

// ── SHARE ──
function shareProduct(pid) {
  const url = window.location.origin + window.location.pathname + '?p=' + pid;
  if (navigator.share) {
    navigator.share({ title: 'Check this out on DormKart', url: url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => {
      showToast('Link copied to clipboard!', 'success');
    }).catch(() => {
      showToast('Could not copy link', 'error');
    });
  }
}

// ── TIME AGO ──
function getTimeAgo(dateStr) {
  if (!dateStr) return 'Just now';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  const weeks = Math.floor(days / 7);
  if (weeks < 4) return weeks + 'w ago';
  return Math.floor(days / 30) + 'mo ago';
}
// ── SLIDER ──
function moveSlide(dir) {
  currentImgIdx = (currentImgIdx + dir + currentImgs.length) % currentImgs.length;
  refreshSlider();
}
function goSlide(i) { currentImgIdx = i; refreshSlider(); }
function refreshSlider() {
  const el = document.getElementById('slides');
  if (el) el.style.transform = `translateX(-${currentImgIdx * 100}%)`;
  document.querySelectorAll('#modalBox .dot').forEach((d,i) => d.classList.toggle('active', i === currentImgIdx));
  const counter = document.querySelector('#modalBox .img-counter');
  if (counter) counter.textContent = `${currentImgIdx + 1} / ${currentImgs.length}`;
}

// ── TRADE PROPOSAL ──
async function sendTrade(productId, sellerId, offerText) {
  if (!session) { showToast('Please log in first', 'info'); return; }
  try {
    const { error: e1 } = await supabaseClient.from('chats').insert({
      sender_id: session.user.id, receiver_id: sellerId,
      product_id: productId, message: `🔄 TRADE OFFER: ${offerText}`
    });
    if (e1) throw e1;
    await supabaseClient.from('notifications').insert({
      user_id: sellerId, title: 'New trade offer',
      message: `Someone wants to trade: ${offerText}`, type: 'trade'
    });
    showToast('Trade proposal sent! Check chats.', 'success');
    closeModal();
  } catch (e) {
    console.error(e);
    showToast('Failed to send trade proposal', 'error');
  }
}

// ── UPI ──
function openUPI(price, upiId) {
  if (!upiId) { showToast('Seller has no UPI ID', 'error'); return; }
  const amt = Math.floor(price);
  const link = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=DormKart&am=${amt}&cu=INR`;
  document.getElementById('upiAmt').textContent  = '₹' + amt.toLocaleString('en-IN');
  document.getElementById('upiQR').src           = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(link)}`;
  document.getElementById('upiLink').href        = link;
  document.getElementById('upiModal').classList.add('open');
}
function closeUPI() { document.getElementById('upiModal').classList.remove('open'); }
function onUpiBgClick(e) { if (e.target.id === 'upiModal') closeUPI(); }

// ── WISHLIST / CART / OFFER ──
async function addToWishlist(pid) {
  if (!session) { showToast('Please log in first', 'info'); return; }
  const { error } = await supabaseClient.from('wishlist').insert({ user_id: session.user.id, product_id: pid });
  if (!error) {
    wishlistSet.add(pid);
    localStorage.setItem('dk_wishlist', JSON.stringify([...wishlistSet]));
    showToast('Added to wishlist', 'success');
  } else {
    showToast('Already saved or an error occurred', 'info');
  }
}

async function addToCart(pid) {
  if (!session) { showToast('Please log in first', 'info'); return; }
  try {
    const { data: p, error: pe } = await supabaseClient.from('products').select('seller_id,price').eq('id', pid).single();
    if (pe) throw pe;
    const { error } = await supabaseClient.from('orders').insert({
      buyer_id: session.user.id, product_id: pid,
      seller_id: p.seller_id, amount: p.price, payment_status: 'in_cart'
    });
    showToast(error ? 'Could not add to cart' : 'Added to cart', error ? 'error' : 'success');
  } catch (e) { showToast('Something went wrong', 'error'); }
}

async function makeOffer(pid, sellerId) {
  if (!session) { showToast('Please log in first', 'info'); return; }
  const amt = prompt('Your offer price (₹):');
  if (!amt || isNaN(Number(amt))) return;
  const { error } = await supabaseClient.from('chats').insert({
    sender_id: session.user.id, receiver_id: sellerId,
    product_id: pid, message: `💰 Offer: ₹${amt}`
  });
  if (!error) window.location.href = `chats.html?id=${sellerId}`;
  else showToast('Failed to send offer', 'error');
}

// ── THEME ──
function applySavedTheme() {
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeIcon').className = 'fas fa-sun';
  }
}
function toggleDarkMode() {
  const dark = document.body.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  document.getElementById('themeIcon').className = dark ? 'fas fa-sun' : 'fas fa-moon';
}

// ── SCROLL TO TOP ──
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
window.addEventListener('scroll', () => {
  document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 400);
});

// ── TOAST ──
let toastTimer;
function showToast(msg, type) {
  type = type || 'info';
  const t = document.getElementById('toast');
  const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
  t.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${msg}</span>`;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── UTILS ──
function eh(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function ea(s) { return String(s||'').replace(/'/g,"\\'"); }

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('upiModal').classList.contains('open')) closeUPI();
    else if (document.getElementById('productModal').classList.contains('open')) closeModal();
  }
});

// ── START ──
window.addEventListener('DOMContentLoaded', init);
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart • Campus Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

:root{
--primary:#4ade80;
--primary-dark:#22c55e;
--text:#0f172a;
--text-light:#64748b;
--bg:#f8fafc;
--card-bg:#ffffff;
--border:#e2e8f0;
--nav-height:70px;
--header-height:100px;
}

html.dark{
--text:#f1f5f9;
--text-light:#94a3b8;
--bg:#0f172a;
--card-bg:#1e2937;
--border:#334155;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui;
}

body{
background:var(--bg);
color:var(--text);
padding-bottom:120px;
}

/* HEADER */

.app-header{
position:fixed;
top:0;
left:0;
right:0;
height:var(--header-height);
background:var(--card-bg);
border-bottom:1px solid var(--border);
padding:10px 16px;
z-index:1000;
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#4ade80,#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.coin-balance{
background:#fffbeb;
border:1px solid #fef3c7;
padding:5px 12px;
border-radius:20px;
font-size:13px;
font-weight:700;
}

.search-container{
margin-top:10px;
display:flex;
border:1px solid var(--border);
border-radius:50px;
overflow:hidden;
}

.search-input{
flex:1;
padding:10px;
border:none;
background:transparent;
}

.search-input:focus{
outline:none;
}

.search-btn{
border:none;
padding:10px;
background:none;
cursor:pointer;
}

/* PRODUCT GRID */

main{
margin-top:110px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:16px;
}

.product-card{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.p-img-container{
aspect-ratio:1/1;
background:#eee;
}

.p-img-container img{
width:100%;
height:100%;
object-fit:cover;
}

.p-info{
padding:8px;
}

.p-price{
font-size:16px;
font-weight:800;
}

.p-title{
font-size:12px;
color:var(--text-light);
}

.sold-overlay{
position:absolute;
background:red;
color:white;
padding:4px 8px;
font-size:10px;
top:5px;
left:5px;
border-radius:4px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:var(--card-bg);
border-top:1px solid var(--border);
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
text-decoration:none;
font-size:11px;
color:var(--text-light);
display:flex;
flex-direction:column;
align-items:center;
}

/* MODAL */

#productModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:flex-end;
z-index:2000;
}

.modal-content{
background:var(--card-bg);
width:100%;
border-radius:20px 20px 0 0;
overflow:auto;
max-height:90vh;
}

.modal-img{
width:100%;
height:300px;
object-fit:cover;
}

.modal-body{
padding:20px;
}

.btn-row{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:10px;
padding:16px;
background:var(--card-bg);
border-top:1px solid var(--border);
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.btn-msg{
background:#e2e8f0;
}

.btn-buy{
background:var(--primary);
color:white;
}

</style>
</head>

<body>

<header class="app-header">

<div class="header-top">
<div class="logo">DormKart</div>

<div style="display:flex;gap:10px;align-items:center;">
<div class="coin-balance">🪙 <span id="coinCount">0</span></div>
<button onclick="toggleDarkMode()">🌙</button>
</div>
</div>

<div class="search-container">
<input id="searchInput" class="search-input" placeholder="Search items">
<button class="search-btn">🔍</button>
</div>

</header>


<main>

<div id="productGrid" class="product-grid">
</div>

</main>


<div id="productModal">
<div id="modalContent" class="modal-content"></div>
</div>


<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item">Home</a>
<a href="chats.html" class="nav-item">Chats</a>
<a href="sell.html" class="nav-item">Sell</a>
<a href="my-ads.html" class="nav-item">My Ads</a>
<a href="profile.html" class="nav-item">Profile</a>

</nav>


<script>

let currentUser=null
let userCollege=""
let productsList=[]

async function init(){

const {data:{session}}=await supabaseClient.auth.getSession()

if(!session){
window.location.href="login-signup.html"
return
}

currentUser=session.user

const {data:profile}=await supabaseClient
.from("users")
.select("college,coins")
.eq("id",currentUser.id)
.single()

if(profile){

userCollege=profile.college
document.getElementById("coinCount").textContent=profile.coins||0

}

fetchProducts()

}

async function fetchProducts(){

const grid=document.getElementById("productGrid")

grid.innerHTML="<p>Loading products...</p>"

const {data,error}=await supabaseClient
.from("products")
.select("*,seller:users(college,is_verified)")
.eq("status","active")
.order("created_at",{ascending:false})

if(error){
console.log(error)
return
}

productsList=data

renderGrid(productsList)

}

function renderGrid(products){

const grid=document.getElementById("productGrid")

grid.innerHTML=""

products.forEach(p=>{

const card=document.createElement("div")
card.className="product-card"

const img=p.image_url?p.image_url.split(",")[0]:"https://via.placeholder.com/300"

card.innerHTML=`

<div class="p-img-container">
<img src="${img}">
</div>

<div class="p-info">
<div class="p-price">₹${p.price}</div>
<div class="p-title">${p.title}</div>
</div>

`

card.onclick=()=>showDetails(p)

grid.appendChild(card)

})

}

function showDetails(p){

const modal=document.getElementById("productModal")
const content=document.getElementById("modalContent")

const img=p.image_url?p.image_url.split(",")[0]:"https://via.placeholder.com/300"

content.innerHTML=`

<img src="${img}" class="modal-img">

<div class="modal-body">

<h2>₹${p.price}</h2>
<p>${p.title}</p>

<p style="margin-top:10px">${p.description||""}</p>

</div>

<div class="btn-row">

<button class="btn btn-msg" onclick="window.location='chats.html?id=${p.seller_id}'">Message</button>

<button class="btn btn-buy">Buy</button>

</div>

`

modal.style.display="flex"

}

document.getElementById("productModal").onclick=e=>{
if(e.target.id==="productModal"){
e.currentTarget.style.display="none"
}
}

/* SEARCH */

const searchInput=document.getElementById("searchInput")

searchInput.addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

if(!q){
renderGrid(productsList)
return
}

const filtered=productsList.filter(p=>

p.title.toLowerCase().includes(q)||
(p.description||"").toLowerCase().includes(q)

)

renderGrid(filtered)

})

function toggleDarkMode(){

document.documentElement.classList.toggle("dark")

}

window.onload=init

</script>

</body>
</html>

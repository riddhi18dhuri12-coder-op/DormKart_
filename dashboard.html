<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DormKart • Smart Campus Marketplace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --sky-blue: #bae1ff;
            --mint-green: #baffc9;
            --pale-yellow: #ffffba;
            --baby-pink: #ffb3ba;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --accent: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 110px; overflow-x: hidden; }

        /* --- STARTUP HEADER --- */
        .app-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -1px; }
        .brand span { color: var(--accent); }

        /* --- METRICS (Trust Builders) --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px 24px;
        }
        .metric-card {
            background: var(--white);
            padding: 12px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid #f1f5f9;
        }
        .metric-card strong { display: block; font-size: 16px; color: var(--accent); }
        .metric-card span { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }

        /* --- MODERN SEARCH --- */
        .search-area { padding: 0 24px 15px; position: relative; }
        .search-bar {
            background: var(--white);
            padding: 14px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid var(--sky-blue);
            box-shadow: 0 10px 25px rgba(186, 225, 255, 0.2);
        }
        .search-bar input { border: none; outline: none; flex: 1; font-size: 15px; font-weight: 600; background: transparent; }
        .search-bar i { color: var(--accent); }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 10px 24px;
        }

        .p-card {
            background: var(--white);
            border-radius: 26px;
            padding: 10px;
            border: 1px solid #f1f5f9;
            position: relative;
            transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            cursor: pointer;
        }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-color: var(--sky-blue); }

        .p-img-wrap { border-radius: 20px; overflow: hidden; aspect-ratio: 1; background: #f1f5f9; position: relative; }
        .p-img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-tag {
            position: absolute; top: 8px; left: 8px;
            background: var(--mint-green); color: #065f46;
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800;
        }

        .p-info { padding: 12px 6px 4px; }
        .p-title { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .p-price { font-size: 18px; font-weight: 800; color: var(--accent); }
        .p-college { font-size: 10px; color: var(--text-muted); font-weight: 700; margin-top: 6px; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }

        /* --- MODAL (Bottom Sheet) --- */
        #pModal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4);
            display: none; z-index: 5000; align-items: flex-end; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white; width: 100%; border-radius: 35px 35px 0 0;
            padding: 30px 24px; animation: slideUp 0.4s ease; max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .btn-flex { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main {
            flex: 1; padding: 16px; border-radius: 18px; border: none;
            font-weight: 800; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-chat { background: var(--mint-green); color: #065f46; }
        .btn-swap { background: var(--text-dark); color: white; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; background: var(--text-dark);
            height: 72px; border-radius: 25px; display: flex;
            justify-content: space-around; align-items: center; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--mint-green); }
        .nav-item i { font-size: 20px; }

        /* Skeleton Loading */
        .skeleton { background: #eee; animation: pulse 1.5s infinite; border-radius: 10px; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    </style>
</head>
<body>

    <header class="app-header">
        <div class="brand">Dorm<span>Kart</span></div>
        <div onclick="location.href='profile.html'"><i class="fa-solid fa-circle-user" style="font-size: 24px; color: var(--text-muted);"></i></div>
    </header>

    <section class="metrics-grid">
        <div class="metric-card">
            <strong id="statStudents">...</strong>
            <span>Students</span>
        </div>
        <div class="metric-card">
            <strong id="statItems">...</strong>
            <span>Active Ads</span>
        </div>
        <div class="metric-card">
            <strong>Campus</strong>
            <span>Verified</span>
        </div>
    </section>

    <div class="search-area">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search books, tech, gear..." oninput="handleSearch()">
        </div>
    </div>

    <main class="product-grid" id="productGrid">
        <div class="p-card"><div class="p-img-wrap skeleton"></div></div>
        <div class="p-card"><div class="p-img-wrap skeleton"></div></div>
    </main>

    <div id="pModal" onclick="closeModal()">
        <div class="modal-content" id="modalData" onclick="event.stopPropagation()"></div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="chats.html" class="nav-item"><i class="fa-solid fa-message"></i><span>Chats</span></a>
        <a href="add_product.html" class="nav-item" style="color:var(--sky-blue)"><i class="fa-solid fa-circle-plus" style="font-size:32px"></i></a>
        <a href="wishlist.html" class="nav-item"><i class="fa-solid fa-heart"></i><span>Saved</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Me</span></a>
    </nav>

    <script>
        let products = [];

        async function init() {
            // Check session
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return location.href = "login-signup.html";

            fetchProducts();
            fetchCounts();
        }

        async function fetchCounts() {
            const { count: uCount } = await supabaseClient.from('users').select('*', { count: 'exact', head: true });
            const { count: pCount } = await supabaseClient.from('products').select('*', { count: 'exact', head: true }).eq('status', 'active');
            document.getElementById('statStudents').innerText = (uCount || 0) + "+";
            document.getElementById('statItems').innerText = pCount || 0;
        }

        async function fetchProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*, seller:users(name, college)')
                .eq('status', 'active')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Fetch error:", error.message);
                document.getElementById('productGrid').innerHTML = `<p style="grid-column: span 2; text-align:center; padding:20px;">Database Error: ${error.message}</p>`;
                return;
            }

            products = data || [];
            renderGrid(products);
        }

        function renderGrid(data) {
            const grid = document.getElementById('productGrid');
            if (data.length === 0) {
                grid.innerHTML = `<p style="grid-column: span 2; text-align:center; padding:50px; color:gray;">No products found in your campus yet.</p>`;
                return;
            }

            grid.innerHTML = data.map(p => {
                const img = p.image_url ? p.image_url.split(',')[0] : 'placeholder.jpg';
                return `
                    <div class="p-card" onclick="showModal('${p.id}')">
                        <div class="p-img-wrap">
                            <img src="${img}" class="p-img" loading="lazy">
                            <div class="p-tag">${p.condition || 'Used'}</div>
                        </div>
                        <div class="p-info">
                            <div class="p-title">${p.title}</div>
                            <div class="p-price">₹${p.price}</div>
                            <div class="p-college"><i class="fa-solid fa-location-dot"></i> ${p.seller?.college?.split(' ')[0] || 'Campus'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showModal(id) {
            const p = products.find(i => i.id == id);
            const content = document.getElementById('modalData');
            const img = p.image_url ? p.image_url.split(',')[0] : 'placeholder.jpg';

            content.innerHTML = `
                <div style="width:40px; height:5px; background:#e2e8f0; margin:0 auto 20px; border-radius:10px;"></div>
                <img src="${img}" style="width:100%; border-radius:24px; max-height:300px; object-fit:contain; background:#f8fafc;">
                <div style="margin-top:20px;">
                    <h1 style="font-size:28px; font-weight:800;">₹${p.price}</h1>
                    <h2 style="font-size:18px; margin:5px 0;">${p.title}</h2>
                    <p style="color:var(--text-muted); font-size:14px; line-height:1.6;">${p.description || 'Verified student listing.'}</p>
                </div>
                <div class="btn-flex">
                    <button class="btn-main btn-chat" onclick="location.href='chat_room.html?user=${p.seller_id}'">
                        <i class="fa-solid fa-comment"></i> Chat with Seller
                    </button>
                    ${p.swap_enabled ? `
                    <button class="btn-main btn-swap" onclick="alert('Swap requested!')">
                        <i class="fa-solid fa-rotate"></i> Propose Swap
                    </button>` : ''}
                </div>
                <button onclick="closeModal()" style="width:100%; margin-top:15px; border:none; background:none; font-weight:700; color:var(--text-muted); cursor:pointer;">Close</button>
            `;
            document.getElementById('pModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('pModal').style.display = 'none'; }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.title.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DormKart • Campus Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--sky-blue:#bae1ff;
--mint-green:#baffc9;
--pale-yellow:#ffffba;
--baby-pink:#ffb3ba;
--text-dark:#0f172a;
--text-muted:#64748b;
--bg-light:#f8fafc;
--white:#ffffff;
--accent:#3b82f6;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:var(--bg-light);
color:var(--text-dark);
padding-bottom:120px;
}

/* HEADER */

.app-header{
position:sticky;
top:0;
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
padding:16px 24px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
}

.brand{
font-family:'Syne';
font-size:24px;
font-weight:800;
}

.brand span{color:var(--accent)}

.header-icons{
display:flex;
gap:16px;
font-size:22px;
color:var(--text-muted);
}

/* METRICS */

.metrics-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:20px;
}

.metric-card{
background:white;
padding:14px;
border-radius:16px;
text-align:center;
border:1px solid #eee;
}

.metric-card strong{
font-size:18px;
color:var(--accent);
}

.metric-card span{
font-size:10px;
text-transform:uppercase;
color:var(--text-muted);
}

/* SEARCH */

.search-area{
padding:0 20px 14px;
}

.search-bar{
background:white;
border-radius:18px;
padding:14px;
display:flex;
gap:10px;
align-items:center;
border:2px solid var(--sky-blue);
}

.search-bar input{
border:none;
outline:none;
flex:1;
font-weight:600;
}

/* BANNERS */

.banner-section{
padding:10px 20px;
}

.banner-slider{
display:flex;
overflow-x:auto;
gap:12px;
}

.banner{
min-width:85%;
height:130px;
border-radius:20px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

.banner-text{
position:absolute;
bottom:10px;
left:15px;
color:white;
font-weight:700;
text-shadow:0 2px 8px rgba(0,0,0,.4);
}

/* CATEGORY */

.category-scroll{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 20px;
}

.category-chip{
background:white;
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:700;
border:1px solid #eee;
white-space:nowrap;
cursor:pointer;
}

.category-chip.active{
background:var(--mint-green);
}

/* FILTER BAR */

.filter-bar{
display:flex;
gap:10px;
padding:10px 20px;
}

.filter-bar select{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* SECTION TITLE */

.section-title{
font-weight:800;
padding:10px 20px;
}

/* PRODUCT GRID */

.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px 20px;
}

.p-card{
background:white;
border-radius:22px;
padding:10px;
border:1px solid #eee;
position:relative;
cursor:pointer;
}

.p-img-wrap{
aspect-ratio:1;
border-radius:16px;
overflow:hidden;
background:#f1f5f9;
}

.p-img{
width:100%;
height:100%;
object-fit:cover;
}

.p-info{
padding:10px 4px;
}

.p-title{
font-size:14px;
font-weight:700;
}

.p-price{
font-size:18px;
font-weight:800;
color:var(--accent);
}

.p-college{
font-size:10px;
color:var(--text-muted);
display:flex;
gap:4px;
margin-top:4px;
}

.wishlist-btn{
position:absolute;
top:10px;
right:10px;
background:white;
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

/* MODAL */

#productModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:flex-end;
}

.modal-content{
background:white;
width:100%;
border-radius:30px 30px 0 0;
padding:24px;
max-height:90vh;
overflow:auto;
}

.btn{
padding:14px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
flex:1;
}

.btn-chat{background:var(--mint-green)}
.btn-swap{background:var(--text-dark);color:white}

/* NAV */

.bottom-nav{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--text-dark);
width:90%;
max-width:420px;
height:70px;
border-radius:24px;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
color:#94a3b8;
text-decoration:none;
font-size:11px;
display:flex;
flex-direction:column;
align-items:center;
}

.nav-item.active{color:var(--mint-green)}

</style>
</head>

<body>

<header class="app-header">
<div class="brand">Dorm<span>Kart</span></div>
<div class="header-icons">
<i class="fa-solid fa-bell"></i>
<i onclick="location.href='profile.html'" class="fa-solid fa-user"></i>
</div>
</header>

<section class="metrics-grid">

<div class="metric-card">
<strong id="statStudents">...</strong>
<span>Students</span>
</div>

<div class="metric-card">
<strong id="statItems">...</strong>
<span>Active Ads</span>
</div>

<div class="metric-card">
<strong>Campus</strong>
<span>Verified</span>
</div>

</section>

<div class="search-area">

<div class="search-bar">
<i class="fa-solid fa-search"></i>
<input id="searchInput" placeholder="Search products...">
</div>

</div>

<section class="banner-section">

<div class="banner-slider">

<div class="banner">
<img src="images/banner-books.jpg">
<div class="banner-text">
<h3>📚 Book Deals</h3>
<p>Up to 60% cheaper</p>
</div>
</div>

<div class="banner">
<img src="images/banner-laptop.jpg">
<div class="banner-text">
<h3>💻 Laptop Deals</h3>
<p>From ₹15K</p>
</div>
</div>

<div class="banner">
<img src="images/banner-trade.jpg">
<div class="banner-text">
<h3>🔁 Trade Festival</h3>
<p>Swap gadgets</p>
</div>
</div>

</div>

</section>

<div class="category-scroll" id="categoryScroll"></div>

<div class="filter-bar">

<select id="branchFilter">
<option value="">Branch</option>
<option>CSE</option>
<option>IT</option>
<option>EXTC</option>
<option>Mechanical</option>
<option>Civil</option>
</select>

<select id="semFilter">
<option value="">Semester</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>

</div>

<h3 class="section-title">🔥 Trending in Campus</h3>

<div id="trendingGrid" class="product-grid"></div>

<h3 class="section-title">🆕 Recently Listed</h3>

<main id="productGrid" class="product-grid"></main>

<div id="productModal">
<div id="modalData" class="modal-content"></div>
</div>

<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item active">
<i class="fa-solid fa-house"></i>Home
</a>

<a href="chats.html" class="nav-item">
<i class="fa-solid fa-message"></i>Chats
</a>

<a href="add_product.html" class="nav-item">
<i class="fa-solid fa-circle-plus"></i>
</a>

<a href="wishlist.html" class="nav-item">
<i class="fa-solid fa-heart"></i>Saved
</a>

<a href="profile.html" class="nav-item">
<i class="fa-solid fa-user"></i>Me
</a>

</nav>

<script>

let products=[]
let wishlist=[]

const categories=["All","Books","Electronics","Hostel","Notes","Furniture"]

function initCategories(){
categoryScroll.innerHTML=categories.map(c=>`<div class="category-chip" onclick="filterCategory('${c}')">${c}</div>`).join("")
}

async function init(){

const {data:{session}}=await supabaseClient.auth.getSession()

if(!session) location.href="login-signup.html"

fetchCounts()
fetchProducts()
initCategories()

}

async function fetchCounts(){

const {count:uCount}=await supabaseClient.from("users")
.select("*",{count:"exact",head:true})

const {count:pCount}=await supabaseClient.from("products")
.select("*",{count:"exact",head:true}).eq("status","active")

statStudents.innerText=(uCount||0)+"+"
statItems.innerText=pCount||0

}

async function fetchProducts(){

const {data}=await supabaseClient
.from("products")
.select("*,seller:users(name,college)")
.eq("status","active")
.order("created_at",{ascending:false})

products=data

renderProducts(products)
renderTrending(products.slice(0,4))

}

function renderProducts(data){

productGrid.innerHTML=data.map(p=>{

const img=p.image_url?p.image_url.split(",")[0]:"placeholder.jpg"

return`
<div class="p-card" onclick="showModal('${p.id}')">

<div class="wishlist-btn">
<i class="fa-regular fa-heart"></i>
</div>

<div class="p-img-wrap">
<img src="${img}" class="p-img">
</div>

<div class="p-info">
<div class="p-title">${p.title}</div>
<div class="p-price">₹${p.price}</div>
<div class="p-college">
<i class="fa-solid fa-location-dot"></i>
${p.seller?.college||"Campus"}
</div>
</div>

</div>
`
}).join("")

}

function renderTrending(data){

trendingGrid.innerHTML=data.map(p=>{

const img=p.image_url?p.image_url.split(",")[0]:"placeholder.jpg"

return`
<div class="p-card" onclick="showModal('${p.id}')">
<div class="p-img-wrap">
<img src="${img}" class="p-img">
</div>
<div class="p-info">
<div class="p-title">${p.title}</div>
<div class="p-price">₹${p.price}</div>
</div>
</div>
`

}).join("")

}

function filterCategory(cat){

if(cat==="All") return renderProducts(products)

renderProducts(products.filter(p=>p.category===cat))

}

function showModal(id){

const p=products.find(x=>x.id==id)

modalData.innerHTML=`

<img src="${p.image_url?.split(",")[0]}" style="width:100%;border-radius:16px">

<h2 style="margin-top:16px">₹${p.price}</h2>
<h3>${p.title}</h3>

<p style="color:gray">${p.description||""}</p>

<hr style="margin:16px 0">

<b>Seller</b><br>
${p.seller?.name||"Student"}

<div style="display:flex;gap:10px;margin-top:20px">

<button class="btn btn-chat"
onclick="location.href='chat_room.html?user=${p.seller_id}'">
Chat
</button>

<button class="btn btn-swap">
Swap
</button>

</div>
`

productModal.style.display="flex"

}

productModal.onclick=()=>productModal.style.display="none"

searchInput.addEventListener("input",()=>{

const q=searchInput.value.toLowerCase()

renderProducts(products.filter(p=>p.title.toLowerCase().includes(q)))

})

window.onload=init

</script>

</body>
</html>

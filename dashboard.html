<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart • Campus Marketplace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  /* Strict Pastel Palette */
  --pale-yellow: #ffffba;
  --mint-green: #baffc9;
  --sky-blue: #bae1ff;
  --baby-pink: #ffb3ba;
  
  --text-main: #1e293b;
  --text-muted: #64748b;
  --bg: #ffffff;
  --border: #f1f5f9;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg); padding-bottom: 110px; color: var(--text-main); }

/* --- HEADER --- */
.app-header {
  background: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--sky-blue);
}
.logo { font-weight: 800; font-size: 24px; letter-spacing: -1.2px; display: flex; align-items: center; gap: 8px; }
.logo i { color: var(--text-main); background: var(--mint-green); padding: 5px; border-radius: 8px; }

/* --- SEARCH & FILTERS --- */
.search-container { padding: 20px 20px 10px; }
.search-bar { position: relative; width: 100%; }
.search-bar input {
    width: 100%; padding: 14px 14px 14px 48px; border-radius: 14px;
    border: 2px solid var(--sky-blue); background: #fffdfa; outline: none; font-size: 14px; font-weight: 600;
}
.search-bar i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

.filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
.filter-btn {
    padding: 8px 18px; border-radius: 100px; border: 2px solid var(--border);
    background: white; white-space: nowrap; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
}
.filter-btn.active { background: var(--pale-yellow); border-color: var(--pale-yellow); }

/* --- PRODUCT GRID (Matching Reference Image) --- */
.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 0 20px; }
.p-card {
  background: white; border-radius: 16px; overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s;
  cursor: pointer; position: relative; border: 1px solid var(--border);
}
.p-card:hover { transform: translateY(-5px); border-color: var(--sky-blue); }

.discount-tag {
    position: absolute; top: 10px; left: 10px; z-index: 5;
    background: var(--mint-green); color: var(--text-main);
    font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px;
}

.p-img { width: 100%; aspect-ratio: 1.1; object-fit: cover; background: #fafafa; }

.p-content { padding: 12px; }
.p-meta { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
.p-title { font-size: 14px; font-weight: 700; color: #3b82f6; margin-bottom: 8px; height: 18px; overflow: hidden; }
.p-price-row { display: flex; align-items: baseline; gap: 6px; }
.curr-price { font-size: 18px; font-weight: 800; }
.old-price { font-size: 12px; color: var(--text-muted); text-decoration: line-through; }

.cond-badge {
    float: right; background: #f1f5f9; color: var(--text-muted);
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
}

/* --- SELLER FOOTER --- */
.p-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid #f8fafc;
}
.seller-sm { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--text-muted); }
.rating-sm { display: flex; align-items: center; font-size: 11px; font-weight: 700; }

/* --- MODAL --- */
#pModal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    display: none; z-index: 5000; align-items: flex-end; backdrop-filter: blur(8px);
}
.modal-box {
    background: white; width: 100%; border-radius: 30px 30px 0 0;
    max-height: 85vh; overflow-y: auto; padding: 24px; animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.btn-act {
    padding: 16px; border-radius: 14px; border: none; font-weight: 800; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}

/* --- BOTTOM NAV --- */
.bottom-nav {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 400px; background: #1e293b;
  height: 70px; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; z-index: 1000;
}
.nav-item { color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-item.active { color: var(--mint-green); }

</style>
</head>
<body>

<header class="app-header">
    <div class="logo"><i class="material-icons-round">storefront</i>DormKart</div>
    <div onclick="location.href='profile.html'"><span class="material-icons-round">account_circle</span></div>
</header>

<div class="search-container">
    <div class="search-bar">
        <i class="material-icons-round">search</i>
        <input type="text" id="searchInput" placeholder="Search your campus..." oninput="handleSearch()">
    </div>
</div>

<div class="filter-scroll">
    <div class="filter-btn active" onclick="filterByCat('All', this)">All Items</div>
    <div class="filter-btn" onclick="filterByCat('Books', this)">Books</div>
    <div class="filter-btn" onclick="filterByCat('Electronics', this)">Gadgets</div>
    <div class="filter-btn" onclick="filterByCat('Dorm', this)">Dorm Decor</div>
</div>

<main class="product-grid" id="productGrid"></main>

<div id="pModal">
    <div class="modal-box" id="modalContent"></div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active"><span class="material-icons-round">home</span>Home</a>
  <a href="chats.html" class="nav-item"><span class="material-icons-round">chat</span>Chats</a>
  <a href="add_product.html" class="nav-item"><span class="material-icons-round">add_box</span>Sell</a>
  <a href="profile.html" class="nav-item"><span class="material-icons-round">person</span>Profile</a>
</nav>

<script>
let allProducts = [];

async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { location.href = 'login-signup.html'; return; }
  fetchProducts();
}

async function fetchProducts() {
  const { data, error } = await supabaseClient
    .from('products')
    .select(`*, seller:users(name, college, is_verified)`)
    .eq('status', 'active');
  
  if (error) return console.error(error);
  allProducts = data;
  renderCards(data);
}

function renderCards(products) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  
  products.forEach(p => {
    const images = p.image_url ? p.image_url.split(',') : ['placeholder.jpg'];
    const oldPrice = Math.floor(p.price * 1.5);
    const disc = Math.round(((oldPrice - p.price) / oldPrice) * 100);

    const card = document.createElement('div');
    card.className = 'p-card';
    card.innerHTML = `
      <div class="discount-tag">-${disc}% OFF</div>
      <img src="${images[0]}" class="p-img">
      <div class="p-content">
          <div class="p-meta">${p.category || 'Item'} • Sem ${p.semester}</div>
          <div class="p-title">${p.title}</div>
          <div class="cond-badge">${p.condition}</div>
          <div class="p-price-row">
              <span class="curr-price">₹${Math.floor(p.price)}</span>
              <span class="old-price">₹${oldPrice}</span>
          </div>
          <div class="p-footer">
              <div class="seller-sm">
                  <span class="material-icons-round" style="font-size:14px;">person_outline</span>
                  ${p.seller?.name || 'Student'}
              </div>
              <div class="rating-sm"><span class="material-icons-round" style="font-size:14px; color:#fbbf24;">star</span> 4.8</div>
          </div>
      </div>
    `;
    card.onclick = () => showModal(p.id);
    grid.appendChild(card);
  });
}

function handleSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderCards(allProducts.filter(p => p.title.toLowerCase().includes(q)));
}

function filterByCat(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat));
}

function showModal(id) {
    const p = allProducts.find(x => x.id == id);
    const modal = document.getElementById('pModal');
    const box = document.getElementById('modalContent');
    const images = p.image_url ? p.image_url.split(',') : ['placeholder.jpg'];

    box.innerHTML = `
        <div style="width:40px;height:4px;background:#e2e8f0;margin:0 auto 15px;border-radius:10px;"></div>
        <div style="width:100%; height:250px; background:#f8fafc; border-radius:20px; overflow:hidden; border:1px solid var(--border);">
            <img src="${images[0]}" style="width:100%; height:100%; object-fit:contain;">
        </div>
        <div style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1 style="font-size:32px; font-weight:800;">₹${p.price}</h1>
                <span class="material-icons-round" style="color:var(--text-muted); cursor:pointer;" onclick="shareProd('${p.title}')">share</span>
            </div>
            <h2 style="font-size:18px; margin:5px 0;">${p.title}</h2>
            <p style="color:var(--text-muted); font-size:14px; line-height:1.6;">${p.description || 'Verified Campus listing.'}</p>
        </div>

        <div class="btn-row">
            <button class="btn-act" style="background:var(--sky-blue);" onclick="location.href='chat_room.html?seller_id=${p.seller_id}&product_id=${p.id}'"><span class="material-icons-round">chat</span>Chat</button>
            <button class="btn-act" style="background:var(--pale-yellow);" onclick="prompt('Enter offer (₹):')"><span class="material-icons-round">local_offer</span>Offer</button>
            ${p.swap_enabled ? `<button class="btn-act" style="background:var(--mint-green); grid-column: span 2;" onclick="alert('Trade requested!')"><span class="material-icons-round">sync</span>Trade Exchange</button>` : ''}
        </div>
        <button class="btn-act" style="background:#f1f5f9; width:100%; margin-top:10px;" onclick="closeModal()">Close</button>
    `;
    modal.style.display = 'flex';
}

function closeModal() { document.getElementById('pModal').style.display = 'none'; }
function shareProd(t) { if(navigator.share) navigator.share({title: t, url: window.location.href}); else alert('Link copied!'); }

window.onclick = (e) => { if(e.target.id === 'pModal') closeModal(); }
window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DormKart • Campus Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

  /* VERIFIED STUDENT BADGE */

.verified-badge{
background:#dcfce7;
color:#166534;
font-size:11px;
font-weight:700;
padding:4px 8px;
border-radius:6px;
border:1px solid #bbf7d0;
}

/* BUTTON BASE */

.btn{
flex:1;
padding:14px;
border-radius:12px;
border:none;
font-weight:700;
font-size:14px;
cursor:pointer;
transition:all .2s ease;
}

/* MESSAGE BUTTON */

.btn-message{
background:#e2e8f0;
color:#0f172a;
}

.btn-message:hover{
background:#cbd5f5;
}

/* BUY BUTTON */

.btn-buy{
background:var(--primary);
color:white;
}

.btn-buy:hover{
background:var(--primary-dark);
}

:root{
--primary:#4ade80;
--primary-dark:#22c55e;
--text:#0f172a;
--text-light:#64748b;
--bg:#f8fafc;
--card-bg:#ffffff;
--border:#e2e8f0;
--nav-height:70px;
}

/* DARK MODE */

body.dark{
--text:#f1f5f9;
--text-light:#94a3b8;
--bg:#0f172a;
--card-bg:#1e2937;
--border:#334155;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
color:var(--text);
padding-bottom:calc(var(--nav-height) + 30px);
}

/* HEADER */

.app-header{
background:var(--card-bg);
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,var(--primary),#10b981);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SEARCH */

.search-box{
padding:12px 16px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card-bg);
color:var(--text);
}

/* FILTER BAR */

.filter-bar{
display:flex;
gap:8px;
padding:0 16px 12px;
}

.filter-item{
padding:8px 14px;
border:1px solid var(--border);
border-radius:20px;
background:var(--card-bg);
font-size:13px;
}

/* PRODUCT GRID */

.product-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
padding:16px;
}

.product-card{
background:var(--card-bg);
border-radius:12px;
overflow:hidden;
border:1px solid var(--border);
}

.p-img-container{
aspect-ratio:1/1;
background:#eee;
}

.p-img-container img{
width:100%;
height:100%;
object-fit:cover;
}

.p-info{
padding:10px;
}

.p-price{
font-size:18px;
font-weight:800;
}

.p-title{
font-size:13px;
color:var(--text-light);
margin:4px 0;
}

.p-location{
font-size:11px;
color:var(--text-light);
}

/* MODAL */

#productModal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
z-index:3000;
align-items:flex-end;
}

.modal-content{
background:var(--card-bg);
width:100%;
border-radius:24px 24px 0 0;
max-height:90vh;
overflow-y:auto;
padding-bottom:80px;
}

/* SLIDER */

.slider-container{
position:relative;
width:100%;
height:300px;
overflow:hidden;
background:#000;
}

.slider-wrapper{
display:flex;
transition:transform .3s;
height:100%;
}

.slider-wrapper img{
min-width:100%;
object-fit:contain;
}

.slider-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,.8);
border:none;
width:32px;
height:32px;
border-radius:50%;
}
  /* Bottom Nav Styling */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
            background: var(--card-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-light); text-decoration: none; font-size: 10px; font-weight: 600;
        }
        .nav-item.active { color: var(--primary-dark); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
        
        .nav-sell {
            background: var(--primary); width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -35px; border: 5px solid var(--bg); color: white !important;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
        }

</style>
</head>

<body>

<header class="app-header">

<div class="logo">DormKart</div>

<button onclick="toggleDarkMode()" id="themeBtn" style="background:none;border:none;font-size:20px;">
🌙
</button>

</header>

<div class="search-box">
<input id="searchInput" placeholder="Search products...">
</div>

<div class="filter-bar">

<select id="categoryFilter" class="filter-item">
<option value="">All Categories</option>
<option value="Electronics">Electronics</option>
<option value="Books">Books</option>
<option value="Dorm Essentials">Dorm Essentials</option>
<option value="Fashion">Fashion</option>
</select>

<select id="priceSort" class="filter-item">
<option value="">Sort: Price</option>
<option value="low">Low to High</option>
<option value="high">High to Low</option>
</select>

</div>

<main>

<div class="product-grid" id="productGrid"></div>

</main>

<div id="productModal">
<div class="modal-content" id="modalContent"></div>
</div>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span>Home</span>
    </a>
    <a href="chats.html" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
        <span>Chats</span>
    </a>
    <a href="sell.html" class="nav-item nav-sell">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </a>
    <a href="my-ads.html" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        <span>My Ads</span>
    </a>
    <a href="profile.html" class="nav-item active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        <span>Profile</span>
    </a>
</nav>

<script>

let allProducts=[]
let currentImgIndex=0

/* INIT */

async function init(){

applySavedTheme()

const {data:{session}}=await supabaseClient.auth.getSession()

if(!session){
location.href="login-signup.html"
return
}

fetchProducts()

}

/* FETCH PRODUCTS */

async function fetchProducts() {
        const { data, error } = await supabaseClient
            .from('products')
            .select(`*, seller:users(id, name, college, is_verified, avatar_url)`)
            .eq('status', 'active');
        if (error) return console.error(error);
        allProducts = data;
        renderGrid(data);
    }

/* RENDER GRID */
function renderGrid(products) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            const img = p.image_url ? p.image_url.split(',')[0] : 'placeholder.jpg';
            card.innerHTML = `
                <div class="p-img-container"><img src="${img}"></div>
                <div class="p-info">
                    <div class="p-price">₹${Math.floor(p.price)}</div>
                    <div class="p-title">${p.title}</div>
                    <div style="font-size:10px; color:gray;">📍 ${p.seller?.college || 'Campus'}</div>
                </div>
            `;
            card.onclick = () => showDetails(p);
            grid.appendChild(card);
        });
    }


/* FILTERS */

function applyFilters(){

let filtered=[...allProducts]

const search=document.getElementById("searchInput").value.toLowerCase()
const category=document.getElementById("categoryFilter").value
const sort=document.getElementById("priceSort").value

if(search) filtered=filtered.filter(p=>p.title.toLowerCase().includes(search))

if(category) filtered=filtered.filter(p=>p.category===category)

if(sort==="low") filtered.sort((a,b)=>a.price-b.price)

if(sort==="high") filtered.sort((a,b)=>b.price-a.price)

renderGrid(filtered)

}

document.getElementById("searchInput").addEventListener("input",applyFilters)
document.getElementById("categoryFilter").addEventListener("change",applyFilters)
document.getElementById("priceSort").addEventListener("change",applyFilters)

/* MODAL */

function showDetails(p) {
        const modal = document.getElementById('productModal');
        const content = document.getElementById('modalContent');
        currentImgIndex = 0;
        const images = p.image_url ? p.image_url.split(',') : ['placeholder.jpg'];
        const slidesHTML = images.map(url => `<img src="${url.trim()}">`).join('');
        const dotsHTML = images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`).join('');

        content.innerHTML = `
            <div class="slider-container">
                <button onclick="closeModal()" style="position:absolute; top:15px; left:15px; background:white; border-radius:50%; width:35px; height:35px; border:none; font-weight:bold; z-index:20;">✕</button>
                ${images.length > 1 ? `
                    <button class="slider-btn prev-btn" onclick="moveSlide(-1, ${images.length})">❮</button>
                    <button class="slider-btn next-btn" onclick="moveSlide(1, ${images.length})">❯</button>
                    <div class="slider-dots">${dotsHTML}</div>
                ` : ''}
                <div class="slider-wrapper" id="sliderWrapper">${slidesHTML}</div>
            </div>
            <div class="modal-body">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1 style="font-size:24px;">₹${Math.floor(p.price)}</h1>
                    ${p.seller?.is_verified ? '<span class="verified-badge">Verified Student</span>' : ''}
                </div>
                <p style="font-size:16px; font-weight:500; margin-bottom:10px;">${p.title}</p>
                <div class="safety-tip">🛡️ Meet at public campus spots like the Library or Canteen.</div>
                <div style="margin-top:20px;">
                    <h4 style="font-size:14px; color:gray;">Description</h4>
                    <p style="margin-top:8px;">${p.description || 'No description provided.'}</p>
                </div>
                <div onclick="window.location.href='profile.html?id=${p.seller?.id}'" style="margin-top:20px; padding:15px; background:#f1f5f9; border-radius:12px; display:flex; align-items:center; gap:12px; cursor:pointer;">
                    <div style="width:45px; height:45px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; overflow:hidden;">
                        ${p.seller?.avatar_url ? `<img src="${p.seller.avatar_url}" style="width:100%;height:100%;object-fit:cover;">` : p.seller?.name?.charAt(0) || 'S'}
                    </div>
                    <div>
                        <div style="font-weight:600;">${p.seller?.name || 'Anonymous Seller'}</div>
                        <div style="font-size:12px; color:gray;">${p.seller?.college || 'Verified Campus'}</div>
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn" style="background:#e2e8f0;" onclick="window.location.href='chats.html?id=${p.seller_id}'">Message</button>
                <button class="btn btn-buy" onclick="alert('Redirecting...')">Buy Now</button>
            </div>
        `;
        modal.style.display = 'flex';
    }

    function moveSlide(direction, total) {
        const wrapper = document.getElementById('sliderWrapper');
        currentImgIndex = (currentImgIndex + direction + total) % total;
        wrapper.style.transform = `translateX(-${currentImgIndex * 100}%)`;
        document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentImgIndex));
    }


// Get seller id from URL
const urlParams = new URLSearchParams(window.location.search);
const sellerId = urlParams.get("id");

async function loadProfile() {

    if (!sellerId) return;

    // Fetch seller details
    const { data: user, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", sellerId)
        .single();

    if (error) {
        console.error(error);
        return;
    }

    // Set profile info
    document.getElementById("name").innerText = user.name || "Seller";
    document.getElementById("college").innerText = user.college || "";
    
    if (user.avatar_url) {
        document.getElementById("avatar").src = user.avatar_url;
    }

    // Fetch seller products
    const { data: products } = await supabaseClient
        .from("products")
        .select("*")
        .eq("seller_id", sellerId)
        .eq("status", "active");

    renderSellerProducts(products);
}

/* Render seller products */

function renderSellerProducts(products){

    const grid = document.getElementById("sellerProducts");
    grid.innerHTML = "";

    products.forEach(p => {

        const card = document.createElement("div");

        const img = p.image_url ? p.image_url.split(",")[0] : "placeholder.jpg";

        card.innerHTML = `
            <img src="${img}" style="width:100%;height:120px;object-fit:cover;">
            <div style="padding:8px;">
                <div>₹${p.price}</div>
                <div style="font-size:12px;color:gray;">${p.title}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

window.onload = loadProfile;
/* DARK MODE */

function applySavedTheme(){

const theme=localStorage.getItem("theme")

if(theme==="dark"){

document.body.classList.add("dark")

document.getElementById("themeBtn").innerText="☀️"

}

}

  
function toggleDarkMode(){

const isDark=document.body.classList.toggle("dark")

localStorage.setItem("theme",isDark?"dark":"light")

document.getElementById("themeBtn").innerText=isDark?"☀️":"🌙"

}

window.onload=init

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DormKart - Marketplace</title>
<link rel="stylesheet" href="app.css">

<style>
/* === YOUR ORIGINAL DASHBOARD STYLES (kept) === */
.hero-banner{border-radius:24px;overflow:hidden;margin-bottom:25px;box-shadow:0 10px 20px var(--shadow-color);position:relative}
.hero-banner img{width:100%;display:block}

.search-bar{background:white;border-radius:20px;padding:14px 20px;display:flex;align-items:center;box-shadow:0 8px 20px rgba(20,184,166,0.08);margin-bottom:20px;border:1px solid rgba(20,184,166,0.1)}
.search-bar input{border:none;outline:none;width:100%;font-size:1rem;color:#333;margin-left:10px;font-family:'Inter',sans-serif;background:transparent}

.category-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:15px;margin-bottom:15px;scrollbar-width:none}
.category-scroll::-webkit-scrollbar{display:none}

.cat-chip{background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);padding:10px 20px;border-radius:20px;font-size:.9rem;font-weight:600;white-space:nowrap;box-shadow:0 4px 10px rgba(0,0,0,.03);border:1px solid rgba(20,184,166,0.1);color:#4A5568;cursor:pointer}
.cat-chip.active{background:linear-gradient(45deg,var(--primary),var(--secondary));color:white;border:none;box-shadow:0 4px 15px rgba(20,184,166,0.3)}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}

.product-card{background:rgba(255,255,255,0.6);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.8);border-radius:24px;padding:15px;box-shadow:0 8px 20px var(--shadow-color);transition:transform .2s;position:relative}
.product-card:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(20,184,166,0.2)}

.card-actions{display:flex;gap:10px;margin-top:15px}
.action-icon-btn{flex:1;padding:8px;border-radius:12px;border:none;background:rgba(20,184,166,0.1);color:var(--primary);font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;transition:background .2s;text-decoration:none;text-align:center}
.action-icon-btn:hover{background:var(--primary);color:white}

.p-img{height:120px;background:rgba(255,255,255,0.8);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;margin-bottom:12px;box-shadow:inset 0 0 10px rgba(20,184,166,0.05)}
.p-title{font-family:'Outfit',sans-serif;font-weight:600;font-size:1rem;margin:0 0 4px 0;color:#2D3748}
.p-price{color:var(--primary);font-weight:700;font-size:1.15rem}

.floating-bubble{position:fixed;left:50%;bottom:90px;font-size:2rem;animation:bubbleFloat 2s forwards ease-out;pointer-events:none;z-index:100}
@keyframes bubbleFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-100px) scale(1.5);opacity:0}}

.wishlist-btn{position:absolute;top:10px;right:10px;background:white;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.filter-bar{display:flex;gap:10px;margin-bottom:10px}
.filter-bar select{padding:8px;border-radius:10px;border:1px solid #ddd}
.college-tag{font-size:12px;color:#718096;margin-top:3px}
.rating{font-size:12px;color:#F59E0B;margin-top:2px}
</style>
</head>

<body>
<div class="app-container">

<header class="app-header">
<h1 class="app-title">DormKart</h1>
<div class="header-action">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path></svg>
</div>
</header>

<main class="content-area">

<div class="search-bar">
<span>
<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="11" cy="11" r="8"></circle>
<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
</svg>
</span>
<input id="searchInput" type="text" placeholder="Search dorms, books, tech or college...">
</div>

<div class="filter-bar">
<select id="collegeFilter" onchange="fetchProducts()">
<option value="all">All Colleges</option>
<option value="mine">My College</option>
</select>

<select id="sortSelect" onchange="fetchProducts()">
<option value="popular">Popular</option>
<option value="new">Newest</option>
<option value="low">Price Low</option>
<option value="high">Price High</option>
<option value="college">College</option>
</select>
</div>

<div class="category-scroll">
<div class="cat-chip active">All items</div>
<div class="cat-chip">Electronics</div>
<div class="cat-chip">Books</div>
<div class="cat-chip">Dorm Essentials</div>
<div class="cat-chip">Services</div>
</div>

<div class="product-grid" id="productGrid"></div>

<button class="btn" style="margin-top:25px;" onclick="shuffleItems()">Shuffle Feed</button>

</main>

<nav class="bottom-nav">
<a href="dashboard.html" class="nav-item active"><span>Home</span></a>
<a href="chats.html" class="nav-item"><div id="messageNav"></div><span>Chats</span></a>
<a href="add_product.html" class="nav-item"><span>Sell</span></a>
<a href="profile.html" class="nav-item"><span>Profile</span></a>
</nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
let currentUser=null

window.onload=init

async function init(){
const {data:{session}}=await supabaseClient.auth.getSession()
if(!session){location="login-signup.html";return}
currentUser=session.user
loadChatBadge()
fetchProducts()
listenRealtime()
}

async function fetchProducts(){

const {data:userData}=await supabaseClient.from("users").select("college").eq("id",currentUser.id).single()

let query=supabaseClient
.from("products")
.select("*,users(college)")
.eq("status","active")
.eq("is_sold",false)

const filter=document.getElementById("collegeFilter").value
if(filter==="mine") query=query.eq("users.college",userData.college)

const sort=document.getElementById("sortSelect").value
if(sort==="new") query=query.order("created_at",{ascending:false})
if(sort==="low") query=query.order("price",{ascending:true})
if(sort==="high") query=query.order("price",{ascending:false})

const {data}=await query

data.sort((a,b)=>{
const scoreA=(a.likes||0)*2+(a.views||0)
const scoreB=(b.likes||0)*2+(b.views||0)
return scoreB-scoreA
})

renderProducts(data)
}

async function renderProducts(data){

const grid=document.getElementById("productGrid")
grid.innerHTML=""

for(const item of data){

const rating=await getSellerRating(item.seller_id)

let img=`<div class="p-img">📦</div>`
if(item.image_url){
const first=item.image_url.split(",")[0]
img=`<img src="${first}" style="width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:12px;">`
}

const card=document.createElement("div")
card.className="product-card"

card.innerHTML=`
<button class="wishlist-btn" onclick="toggleWishlist('${item.id}',this)">❤️</button>
${img}
<p class="p-title">${item.title}</p>
<div class="p-price">₹${Number(item.price).toFixed(2)}</div>
<div class="college-tag">🎓 ${item.users?.college||""}</div>
<div class="rating">⭐ ${rating}</div>
<div class="card-actions">
<a href="product_detail.html?id=${item.id}" class="action-icon-btn">View Details</a>
<button onclick="startChat('${item.id}','${item.seller_id}')" class="action-icon-btn">Chat</button>
</div>
`

grid.appendChild(card)
}
}

async function toggleWishlist(productId,btn){

const {data:existing}=await supabaseClient
.from("wishlist")
.select("*")
.eq("user_id",currentUser.id)
.eq("product_id",productId)
.single()

if(existing){
await supabaseClient.from("wishlist").delete().eq("user_id",currentUser.id).eq("product_id",productId)
btn.innerHTML="🤍"
}else{
await supabaseClient.from("wishlist").insert({user_id:currentUser.id,product_id:productId})
btn.innerHTML="❤️"
spawnFloatingNotif("❤️")
}
}

async function getSellerRating(sellerId){

const {data}=await supabaseClient.from("reviews").select("rating").eq("seller_id",sellerId)

if(!data||data.length===0) return "New"

let total=0
data.forEach(r=>total+=r.rating)

return (total/data.length).toFixed(1)
}

function startChat(productId,sellerId){
location=`chat_room.html?user=${sellerId}`
}

function shuffleItems(){
const grid=document.getElementById("productGrid")
const cards=[...grid.children]
for(let i=cards.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
;[cards[i],cards[j]]=[cards[j],cards[i]]
}
grid.innerHTML=""
cards.forEach(c=>grid.appendChild(c))
}

function spawnFloatingNotif(e){
const bubble=document.createElement("div")
bubble.className="floating-bubble"
bubble.innerHTML=e
document.body.appendChild(bubble)
setTimeout(()=>bubble.remove(),2000)
}

async function loadChatBadge(){
const {count}=await supabaseClient
.from("messages")
.select("*",{count:"exact",head:true})
.eq("receiver_id",currentUser.id)
.eq("is_read",false)

if(count>0){
document.getElementById("messageNav").innerHTML=`🔔 ${count}`
}
}

function listenRealtime(){
supabaseClient.channel("products")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"products"},payload=>{
spawnFloatingNotif("🆕")
fetchProducts()
}).subscribe()
}

document.getElementById("searchInput").addEventListener("input",async function(){

const term=this.value

const {data}=await supabaseClient
.from("products")
.select("*,users(college)")
.or(`title.ilike.%${term}%,users.college.ilike.%${term}%`)
.eq("status","active")

renderProducts(data)

})
</script>
</body>
</html>

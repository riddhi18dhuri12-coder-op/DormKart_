<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>DormKart • Campus Trade & Marketplace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00e676;
      --primary-dark: #00c853;
      --primary-glow: rgba(0, 230, 118, 0.18);
      --trade: #7c3aed;
      --trade-light: #ede9fe;
      --text: #0d1117;
      --text-light: #5a6476;
      --bg: #f0f4f0;
      --card-bg: #ffffff;
      --border: #e3e9e3;
      --nav-height: 72px;
      --radius: 18px;
    }
    body.dark {
      --text: #e8f0e8;
      --text-light: #7a8c7a;
      --bg: #0a0f0a;
      --card-bg: #111811;
      --border: #1e2a1e;
      --primary-glow: rgba(0, 230, 118, 0.10);
      --trade-light: #2e1a4a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      padding-bottom: calc(var(--nav-height) + 20px);
    }

    /* HEADER */
    .app-header {
      background: var(--card-bg);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(120deg, var(--primary-dark), #00b8a9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .theme-btn, .notification-badge {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--bg); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .notification-badge { position: relative; }
    .badge-dot { position: absolute; top: 6px; right: 6px; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; border: 2px solid var(--card-bg); }

    /* HERO */
    .hero { padding: 20px 16px 8px; }
    .hero-label { font-family: 'Syne',sans-serif; font-size: 12px; font-weight: 700; color: var(--primary-dark); letter-spacing: 0.1em; text-transform: uppercase; }
    .hero-title { font-family: 'Syne',sans-serif; font-size: 28px; font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
    .hero-title em { color: var(--primary-dark); font-style: normal; }
    .stats-row { display: flex; gap: 16px; margin: 10px 0 6px; }
    .stat-chip { background: var(--card-bg); border: 1px solid var(--border); border-radius: 40px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }

    /* SEARCH & FILTER */
    .search-wrap { position: relative; margin-top: 8px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; stroke: var(--text-light); fill: none; }
    .search-wrap input { width: 100%; padding: 14px 14px 14px 44px; border-radius: 18px; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .search-wrap input:focus { border-color: var(--primary-dark); box-shadow: 0 0 0 4px var(--primary-glow); }
    .filter-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; white-space: nowrap; }
    .filter-item { padding: 8px 18px; border: 1.5px solid var(--border); border-radius: 40px; background: var(--card-bg); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; appearance: none; }
    .filter-item.active { background: var(--primary-dark); border-color: var(--primary-dark); color: white; }

    /* GRID */
    .product-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; padding: 0 16px 16px; }
    @media (min-width: 500px) { .product-grid { grid-template-columns: repeat(3,1fr); } }
    .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: all 0.18s; position: relative; }
    .p-img-container { aspect-ratio: 1/1; background: var(--bg); overflow: hidden; position: relative; }
    .p-img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .trade-badge { position: absolute; top: 8px; right: 8px; background: var(--trade); color: white; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 30px; font-family: 'Syne'; z-index: 2; }
    .p-info { padding: 10px 12px 12px; }
    .p-price { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 800; }
    .p-title { font-size: 13px; color: var(--text-light); margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* MODAL */
    #productModal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 3000; align-items: flex-end; backdrop-filter: blur(4px); }
    .modal-content { background: var(--card-bg); width: 100%; border-radius: 28px 28px 0 0; max-height: 92vh; overflow-y: auto; animation: slideUp 0.3s; }
    .slider-container { position: relative; height: 300px; background: var(--bg); margin-top: 8px; overflow: hidden; }
    .slider-wrapper { display: flex; transition: transform 0.35s; height: 100%; }
    .slider-wrapper img { min-width: 100%; object-fit: contain; }
    .trade-offer-box { background: var(--trade-light); border-radius: 20px; padding: 16px; margin: 12px 0; border: 1px dashed var(--trade); }
    .btn-row { display: flex; flex-wrap: wrap; gap: 10px; padding: 16px 20px 20px; background: var(--card-bg); border-top: 1px solid var(--border); position: sticky; bottom: 0; }
    .btn { padding: 14px 10px; border-radius: 18px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }
    .btn-primary { background: var(--primary-dark); color: white; }
    .btn-trade { background: var(--trade); color: white; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); flex: 1; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height); background: var(--card-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); text-decoration: none; font-size: 10px; font-weight: 600; gap: 3px; }
    .nav-item.active { color: var(--primary-dark); }
    .nav-sell { background: var(--primary-dark); width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -30px; border: 4px solid var(--bg); color: white !important; box-shadow: 0 4px 12px rgba(0,220,83,0.3); }
  </style>
</head>
<body>

<header class="app-header">
  <div class="logo">DormKart</div>
  <div class="header-actions">
    <button onclick="toggleDarkMode()" id="themeBtn" class="theme-btn">🌙</button>
  </div>
</header>

<div class="hero">
  <div class="hero-label">⚡ Campus Marketplace</div>
  <div class="hero-title">Swap, buy & <em>trade smarter</em></div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" placeholder="Search items...">
  </div>
</div>

<div class="filter-bar">
  <select id="categoryFilter" class="filter-item"><option value="">All Categories</option><option value="Electronics">Electronics</option><option value="Books">Books</option><option value="Dorm Essentials">Dorm Essentials</option></select>
  <div class="filter-item" id="tradeFilterBtn" onclick="toggleTradeFilter()">🔄 Trades only</div>
</div>

<main>
  <div class="product-grid" id="productGrid">
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div></div>
  </div>
</main>

<div id="productModal"><div class="modal-content" id="modalContent"></div></div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">Home</a>
  <a href="chats.html" class="nav-item">Chats</a>
  <a href="add_product.html" class="nav-item nav-sell">+</a>
  <a href="my-ads.html" class="nav-item">My Ads</a>
  <a href="profile.html" class="nav-item">Profile</a>
</nav>

<script>
  let allProducts = [];
  let currentImgIndex = 0;
  let tradeOnly = false;
  let activeProductId = null;

  async function init() {
    applySavedTheme();
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { location.href = 'login-signup.html'; return; }
    await fetchProducts();
  }

  async function fetchProducts() {
    const { data, error } = await supabaseClient
      .from('products')
      .select(`*, seller:users(id, name, college, upi_id, is_verified)`)
      .eq('status', 'active');
    if (error) return console.error(error);
    allProducts = data || [];
    applyFilters();
  }

  function applyFilters() {
    let filtered = allProducts.filter(p => {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const matchesSearch = p.title.toLowerCase().includes(search);
      const matchesCat = !cat || p.category === cat;
      const matchesTrade = !tradeOnly || p.swap_enabled;
      return matchesSearch && matchesCat && matchesTrade;
    });
    renderGrid(filtered);
  }

  function renderGrid(products) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="showDetails('${p.id}')">
        <div class="p-img-container">
          <img src="${p.image_url?.split(',')[0] || 'placeholder.jpg'}">
          ${p.swap_enabled ? '<div class="trade-badge">🔄 TRADE</div>' : ''}
        </div>
        <div class="p-info">
          <div class="p-price">₹${p.price}</div>
          <div class="p-title">${p.title}</div>
        </div>
      </div>
    `).join('');
  }

  function showDetails(id) {
    const p = allProducts.find(x => x.id === id);
    activeProductId = id;
    const modal = document.getElementById('productModal');
    const content = document.getElementById('modalContent');
    const images = p.image_url?.split(',') || [];
    
    content.innerHTML = `
      <div class="slider-container">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="slider-wrapper" id="sliderWrapper">
          ${images.map(img => `<img src="${img.trim()}">`).join('')}
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-price-row">
          <div class="modal-price">₹${p.price}</div>
        </div>
        <div class="modal-title" style="font-weight:700; font-size:20px;">${p.title}</div>
        ${p.swap_enabled ? `
          <div class="trade-offer-box">
            <p><strong>Seller wants:</strong> ${p.swap_item || 'Any offer'}</p>
            <input type="text" id="tradeOfferInput" placeholder="What is your offer?" style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">
            <button class="btn btn-trade" onclick="sendTradeProposal()">Propose Trade</button>
          </div>
        ` : ''}
        <p style="margin-top:15px; color:var(--text-light);">${p.description || ''}</p>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="alert('Proceeding to UPI...')">⚡ Buy Now</button>
        <button class="btn btn-outline" onclick="closeModal()">Close</button>
      </div>
    `;
    modal.style.display = 'flex';
  }

  async function sendTradeProposal() {
    const offer = document.getElementById('tradeOfferInput').value;
    if (!offer) return alert("Please enter an offer");
    const p = allProducts.find(x => x.id === activeProductId);
    
    const { data: { session } } = await supabaseClient.auth.getSession();
    const { error } = await supabaseClient.from('chats').insert({
      sender_id: session.user.id,
      receiver_id: p.seller_id,
      message: `🔄 TRADE OFFER for ${p.title}: ${offer}`
    });

    if (!error) {
      alert("Trade proposal sent!");
      closeModal();
    }
  }

  function toggleTradeFilter() {
    tradeOnly = !tradeOnly;
    document.getElementById('tradeFilterBtn').classList.toggle('active');
    applyFilters();
  }

  function closeModal() { document.getElementById('productModal').style.display = 'none'; }
  function applySavedTheme() { if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark'); }
  function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }

  window.onload = init;
  document.getElementById('searchInput').oninput = applyFilters;
  document.getElementById('categoryFilter').onchange = applyFilters;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>DormKart • Campus Trade & Marketplace</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --primary: #00e676;
  --primary-dark: #00c853;
  --primary-glow: rgba(0,230,118,0.18);
  --text: #0d1117;
  --text-light: #5a6476;
  --bg: #f0f4f0;
  --card-bg: #ffffff;
  --border: #e3e9e3;
  --nav-height: 72px;
  --radius: 18px;
}
body.dark {
  --text: #e8f0e8;
  --text-light: #7a8c7a;
  --bg: #0a0f0a;
  --card-bg: #111811;
  --border: #1e2a1e;
  --primary-glow: rgba(0,230,118,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--text);
  padding-bottom: calc(var(--nav-height) + 24px);
}

/* HEADER */
.app-header {
  background: var(--card-bg);
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1000;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(120deg, var(--primary-dark), #00b8a9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.theme-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.theme-btn:hover { background: var(--primary-glow); }

/* HERO */
.hero { padding: 20px 16px 8px; }
.hero-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary-dark);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}
.hero-title em { font-style: normal; color: var(--primary-dark); }

/* SEARCH */
.search-wrap { position: relative; }
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  stroke: var(--text-light);
  fill: none;
}
.search-wrap input {
  width: 100%;
  padding: 14px 14px 14px 44px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--primary-dark);
  box-shadow: 0 0 0 4px var(--primary-glow);
}
.search-wrap input::placeholder { color: var(--text-light); }

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-item {
  padding: 8px 16px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  white-space: nowrap;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.2s, background 0.2s;
}
.filter-item:focus, .filter-item:hover {
  border-color: var(--primary-dark);
  background: var(--primary-glow);
}

/* SECTION LABEL */
.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 4px 16px 10px;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-label span {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--primary-dark);
  cursor: pointer;
}

/* PRODUCT GRID */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px 16px;
}
@media (min-width: 480px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 720px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

.product-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  position: relative;
}
.product-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.08);
}
.p-img-container {
  aspect-ratio: 1/1;
  background: var(--bg);
  overflow: hidden;
  position: relative;
}
.p-img-container img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.product-card:hover .p-img-container img { transform: scale(1.04); }
.p-badge {
  position: absolute;
  top: 8px; left: 8px;
  background: var(--primary-dark);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  font-family: 'Syne', sans-serif;
}
.p-info { padding: 10px 12px 12px; }
.p-price {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}
.p-title {
  font-size: 12px;
  color: var(--text-light);
  margin: 3px 0 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.p-meta { font-size: 11px; color: var(--text-light); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  grid-column: 1 / -1;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { color: var(--text-light); font-size: 15px; line-height: 1.6; }

/* SKELETON */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
.skeleton-card {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--card-bg);
}
.skeleton-img { aspect-ratio: 1/1; border-radius: 0; }
.skeleton-line { height: 14px; margin: 10px 12px 6px; }
.skeleton-line.short { width: 60%; height: 11px; margin-bottom: 12px; }

/* MODAL */
#productModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  z-index: 3000;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-content {
  background: var(--card-bg);
  width: 100%;
  border-radius: 28px 28px 0 0;
  max-height: 92vh;
  overflow-y: auto;
  scrollbar-width: none;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-content::-webkit-scrollbar { display: none; }
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-drag {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 12px auto 0;
}
.modal-body { padding: 16px 20px 0; }

/* SLIDER */
.slider-container {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
  background: var(--bg);
  margin-top: 8px;
}
.slider-wrapper {
  display: flex;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  height: 100%;
}
.slider-wrapper img { min-width: 100%; object-fit: contain; }
.slider-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: var(--card-bg);
  border: 1px solid var(--border);
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  z-index: 5;
  display: flex; align-items: center; justify-content: center;
}
.prev-btn { left: 12px; }
.next-btn { right: 12px; }
.slider-dots {
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 5px;
}
.dot {
  width: 6px; height: 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  transition: background 0.2s, width 0.2s;
}
.dot.active { background: white; width: 16px; border-radius: 4px; }
.close-btn {
  position: absolute;
  top: 14px; left: 14px;
  background: rgba(0,0,0,0.45);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  z-index: 20;
  display: flex; align-items: center; justify-content: center;
}

/* MODAL BODY */
.modal-price-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 14px 0 6px;
}
.modal-price {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.verified-badge {
  background: #dcfce7;
  color: #166534;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 100px;
  border: 1px solid #bbf7d0;
  font-family: 'Syne', sans-serif;
}
.modal-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}
.condition-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  color: var(--text-light);
  margin-bottom: 12px;
}
.safety-tip {
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border: 1px solid #bbf7d0;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  color: #166534;
  margin-bottom: 16px;
  font-weight: 500;
}
.desc-section h4 {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.desc-section p { font-size: 14px; line-height: 1.65; color: var(--text); }
.seller-card {
  margin: 16px 0;
  padding: 14px;
  background: var(--bg);
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.seller-card:hover { border-color: var(--primary-dark); }
.seller-avatar {
  width: 46px; height: 46px;
  background: var(--primary-dark);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 16px;
  overflow: hidden;
  flex-shrink: 0;
}
.seller-avatar img { width: 100%; height: 100%; object-fit: cover; }
.seller-name { font-weight: 600; font-size: 14px; }
.seller-college { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.seller-arrow { margin-left: auto; color: var(--text-light); font-size: 18px; }

/* BUTTON ROW */
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 20px 20px;
  position: sticky;
  bottom: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
}
.btn {
  padding: 14px 10px;
  border-radius: 14px;
  border: none;
  font-weight: 700;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn:active { transform: scale(0.97); }
.btn-buy {
  background: var(--primary-dark);
  color: white;
  width: 100%;
  font-size: 15px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 16px rgba(0,200,83,0.28);
}
.btn-buy:hover { background: #009624; }
.btn-secondary-row { display: flex; gap: 8px; width: 100%; }
.btn-cart  { flex:1; background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd; }
.btn-cart:hover  { background:#bae6fd; }
.btn-offer { flex:1; background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
.btn-offer:hover { background:#fde68a; }
.btn-wish  { flex:1; background:#ffe4e6; color:#9f1239; border:1px solid #fecdd3; }
.btn-wish:hover  { background:#fecdd3; }
.btn-message {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-message:hover { border-color: var(--primary-dark); background: var(--primary-glow); }

/* UPI MODAL */
#upiModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 4000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.upi-content {
  background: var(--card-bg);
  width: 100%;
  max-width: 320px;
  border-radius: 24px;
  padding: 28px 24px;
  text-align: center;
  border: 1px solid var(--border);
}
.upi-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}
#upiAmount {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 8px 0 16px;
}
#upiQR {
  width: 200px; height: 200px;
  margin: 0 auto 14px;
  display: block;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.upi-hint { font-size: 12px; color: var(--text-light); margin-bottom: 18px; }
.upi-btns { display: flex; gap: 10px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-height);
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 2000;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text-light);
  text-decoration: none;
  font-size: 10px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  gap: 3px;
  transition: color 0.2s;
}
.nav-item.active { color: var(--primary-dark); }
.nav-item svg { width: 22px; height: 22px; }
.nav-sell {
  background: var(--primary-dark);
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-top: -30px;
  border: 4px solid var(--bg);
  color: white !important;
  box-shadow: 0 4px 20px rgba(0,200,83,0.4);
  transition: transform 0.2s;
}
.nav-sell:hover { transform: scale(1.08); }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">DormKart</div>
  <div class="header-actions">
    <button onclick="toggleDarkMode()" id="themeBtn" class="theme-btn">🌙</button>
  </div>
</header>

<div class="hero">
  <div class="hero-label">⚡ Campus Marketplace</div>
  <div class="hero-title">Swap, buy & <em>trade smarter</em></div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" placeholder="Search items...">
  </div>
</div>

<div class="filter-bar">
  <select id="categoryFilter" class="filter-item"><option value="">All Categories</option><option value="Electronics">Electronics</option><option value="Books">Books</option><option value="Dorm Essentials">Dorm Essentials</option></select>
  <div class="filter-item" id="tradeFilterBtn" onclick="toggleTradeFilter()">🔄 Trades only</div>
</div>

<main>
  <div class="product-grid" id="productGrid">
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div></div>
  </div>
</main>

<div id="productModal"><div class="modal-content" id="modalContent"></div></div>

    <!-- BOTTOM NAVigation -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Home
  </a>
  <a href="chats.html" class="nav-item">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>

  <a href="add_product.html" class="nav-item nav-sell">

  </a>
</nav>

<script>
  let allProducts = [];
  let currentImgIndex = 0;
  let tradeOnly = false;
  let activeProductId = null;

  async function init() {
    applySavedTheme();
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { location.href = 'login-signup.html'; return; }
    await fetchProducts();
  }

  async function fetchProducts() {
    const { data, error } = await supabaseClient
      .from('products')
      .select(`*, seller:users(id, name, college, upi_id, is_verified)`)
      .eq('status', 'active');
    if (error) return console.error(error);
    allProducts = data || [];
    applyFilters();
  }

  function applyFilters() {
    let filtered = allProducts.filter(p => {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categoryFilter').value;
      const matchesSearch = p.title.toLowerCase().includes(search);
      const matchesCat = !cat || p.category === cat;
      const matchesTrade = !tradeOnly || p.swap_enabled;
      return matchesSearch && matchesCat && matchesTrade;
    });
    renderGrid(filtered);
  }

  function renderGrid(products) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="showDetails('${p.id}')">
        <div class="p-img-container">
          <img src="${p.image_url?.split(',')[0] || 'placeholder.jpg'}">
          ${p.swap_enabled ? '<div class="trade-badge">🔄 TRADE</div>' : ''}
        </div>
        <div class="p-info">
          <div class="p-price">₹${p.price}</div>
          <div class="p-title">${p.title}</div>
        </div>
      </div>
    `).join('');
  }

 function showDetails(p) {
  const modal = document.getElementById('productModal');
  const content = document.getElementById('modalContent');
  currentImgIndex = 0;
  
  const images = p.image_url ? p.image_url.split(',') : ['placeholder.jpg'];
  const slidesHTML = images.map(url => `<img src="${url.trim()}" onerror="this.src='placeholder.jpg'">`).join('');
  const dotsHTML = images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`).join('');

  // Define the Trade Section Logic
  let tradeSectionHTML = '';
  if (p.swap_enabled) {
    if (p.swap_item) {
      // Case: Seller wanted item specified
      tradeSectionHTML = `
        <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 13px; color: #166534;">
          <div style="font-weight: 800; margin-bottom: 4px;">🔄 SWAP AVAILABLE</div>
          <b>Seller wants:</b> ${p.swap_item}
        </div>`;
    } else {
      // Case: Open trade, show input for buyer
      tradeSectionHTML = `
        <div style="background: #f0f9ff; border: 1px solid #bae6fd; padding: 12px; border-radius: 12px; margin: 15px 0;">
          <div style="font-weight: 800; color: #0369a1; font-size: 13px; margin-bottom: 8px;">🔄 OPEN TRADE</div>
          <input type="text" id="buyerSwapOffer" placeholder="What would you swap for this?" 
                 style="width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid #bae6fd; font-size: 13px; outline: none;">
        </div>`;
    }
  }

  content.innerHTML = `
    <div class="modal-drag"></div>
    <div class="slider-container">
      <button class="close-btn" onclick="closeModal()">✕</button>
      ${images.length > 1 ? `
        <button class="slider-btn prev-btn" onclick="moveSlide(-1,${images.length})">❮</button>
        <button class="slider-btn next-btn" onclick="moveSlide(1,${images.length})">❯</button>
        <div class="slider-dots">${dotsHTML}</div>
      ` : ''}
      <div class="slider-wrapper" id="sliderWrapper">${slidesHTML}</div>
    </div>
    <div class="modal-body">
      <div class="modal-price-row">
        <div class="modal-price">₹${Math.floor(p.price).toLocaleString('en-IN')}</div>
        ${p.seller?.is_verified ? '<span class="verified-badge">✓ Verified Student</span>' : ''}
      </div>
      <div class="modal-title">${p.title}</div>
      ${p.condition ? `<div class="condition-chip">🏷️ ${p.condition}</div>` : ''}
      
      ${tradeSectionHTML}

      <div class="safety-tip">🛡️ Meet at public campus spots — Library, Canteen or Admin Block.</div>
      <div class="desc-section">
        <h4>Description</h4>
        <p>${p.description || 'No description provided.'}</p>
      </div>
      <div class="seller-card" onclick="window.location.href='profile.html?id=${p.seller_id}'">
        <div class="seller-avatar">
          ${p.seller?.avatar_url ? `<img src="${p.seller.avatar_url}">` : (p.seller?.name?.charAt(0)?.toUpperCase() || 'S')}
        </div>
        <div>
          <div class="seller-name">${p.seller?.name || 'Anonymous Seller'}</div>
          <div class="seller-college">${p.seller?.college || 'Verified Campus'}</div>
        </div>
        <div class="seller-arrow">›</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-buy" onclick="openUPI(${p.price}, '${p.seller?.upi_id || ''}')">⚡ Buy it Now</button>
      
      <div class="btn-secondary-row">
        ${p.swap_enabled ? `
          <button class="btn btn-offer" onclick="proposeTrade('${p.id}', '${p.seller_id}', '${p.swap_item || ''}')" 
                  style="background: #ede9fe; color: #6d28d9; border: 1px solid #ddd6fe;">
            🔄 Trade
          </button>` : ''}
        
        <button class="btn btn-cart" onclick="addToCart('${p.id}')">🛒 Cart</button>
        <button class="btn btn-wish" onclick="addToWishlist('${p.id}')">♡ Save</button>
      </div>
      
      <button class="btn btn-message" onclick="window.location.href='chats.html?id=${p.seller_id}'">Message Seller</button>
    </div>
  `;
  modal.style.display = 'flex';
}

// Function to handle the Trade Proposal
async function proposeTrade(productId, sellerId, sellerWantedItem) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return alert("Please login to propose a trade!");

  let buyerOffer = "";
  
  if (sellerWantedItem) {
    // If seller already specified what they want
    const confirmTrade = confirm(`Seller is looking for: "${sellerWantedItem}". Do you have this or something similar to trade?`);
    if (!confirmTrade) return;
    buyerOffer = `Interested in swapping for your requested item: ${sellerWantedItem}`;
  } else {
    // If trade is open, get the value from the input field
    const input = document.getElementById('buyerSwapOffer');
    buyerOffer = input ? input.value.trim() : "";
    if (!buyerOffer) return alert("Please enter what you want to offer for trade!");
  }

  const { error } = await supabaseClient.from('chats').insert({
    sender_id: session.user.id,
    receiver_id: sellerId,
    product_id: productId,
    message: `🔄 TRADE PROPOSAL: I'd like to trade. My offer: ${buyerOffer}`
  });

  if (error) {
    alert("Error sending trade proposal: " + error.message);
  } else {
    alert("Trade proposal sent via Chat! 🔄");
    window.location.href = `chats.html?id=${sellerId}&product=${productId}`;
  }
}

  async function sendTradeProposal() {
    const offer = document.getElementById('tradeOfferInput').value;
    if (!offer) return alert("Please enter an offer");
    const p = allProducts.find(x => x.id === activeProductId);
    
    const { data: { session } } = await supabaseClient.auth.getSession();
    const { error } = await supabaseClient.from('chats').insert({
      sender_id: session.user.id,
      receiver_id: p.seller_id,
      message: `🔄 TRADE OFFER for ${p.title}: ${offer}`
    });

    if (!error) {
      alert("Trade proposal sent!");
      closeModal();
    }
  }

  function toggleTradeFilter() {
    tradeOnly = !tradeOnly;
    document.getElementById('tradeFilterBtn').classList.toggle('active');
    applyFilters();
  }

  function closeModal() { document.getElementById('productModal').style.display = 'none'; }
  function applySavedTheme() { if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark'); }
  function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }

  window.onload = init;
  document.getElementById('searchInput').oninput = applyFilters;
  document.getElementById('categoryFilter').onchange = applyFilters;
</script>

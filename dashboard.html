<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DormKart - Marketplace</title>
    <link rel="stylesheet" href="app.css">
    <style>
        /* Dashboard Specific Styles */
        .hero-banner {
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px var(--shadow-color);
            position: relative;
        }
        
        .hero-banner img {
            width: 100%;
            display: block;
        }

        .search-bar {
            background: white;
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 20px rgba(20, 184, 166, 0.08);
            margin-bottom: 20px;
            border: 1px solid rgba(20, 184, 166, 0.1);
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 1rem;
            color: #333;
            margin-left: 10px;
            font-family: 'Inter', sans-serif;
            background: transparent;
        }

        .category-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none; /* Firefox */
        }
        
        .category-scroll::-webkit-scrollbar { display: none; } /* Chrome */

        .cat-chip {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(20, 184, 166, 0.1);
            color: #4A5568;
            cursor: pointer;
        }

        .cat-chip.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 15px;
            animation: float 4s ease-in-out infinite;
            box-shadow: 0 8px 20px var(--shadow-color);
            transition: transform 0.2s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(20, 184, 166, 0.2);
        }

        /* Prevent parent click when clicking buttons */
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-icon-btn {
            flex: 1;
            padding: 8px;
            border-radius: 12px;
            border: none;
            background: rgba(20, 184, 166, 0.1);
            color: var(--primary);
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            text-align: center;
        }
        
        .action-icon-btn:hover {
            background: var(--primary);
            color: white;
        }

        .product-card:nth-child(even) { animation-delay: 1.5s; }
        .product-card:nth-child(3n) { animation-delay: 0.5s; }
        
        .p-img {
            height: 120px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            margin-bottom: 12px;
            box-shadow: inset 0 0 10px rgba(20, 184, 166, 0.05);
        }

        .p-title { 
            font-family: 'Outfit', sans-serif;
            font-weight: 600; 
            font-size: 1rem; 
            margin: 0 0 4px 0; 
            color: #2D3748;
        }

        .p-price { 
            color: var(--primary); 
            font-weight: 700; 
            font-size: 1.15rem; 
        }
        
        /* Floating Notifications */
        @keyframes bubbleFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .floating-bubble {
            position: fixed;
            left: 50%;
            bottom: 90px;
            font-size: 2rem;
            animation: bubbleFloat 2s forwards ease-out;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 4px 10px rgba(99, 102, 241, 0.3));
        }
    </style>
</head>
<body>
    <div class="app-container">
    
        <header class="app-header">
            <h1 class="app-title">DormKart</h1>
            <div class="header-action"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></div>
        </header>

        <main class="content-area">
            
            <div class="search-bar">
                <span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" placeholder="Search dorms, books, tech...">
            </div>

            <div class="category-scroll">
                <div class="cat-chip active">All items</div>
                <div class="cat-chip">Electronics</div>
                <div class="cat-chip">Books</div>
                <div class="cat-chip">Dorm Essentials</div>
                <div class="cat-chip">Services</div>
            </div>


            <div class="product-grid" id="productGrid">
                <!-- Products dynamically loaded from Supabase here -->
                <div style="text-align: center; color: #718096; width: 100%; grid-column: 1 / -1; padding: 20px;">
                    Fetching market items...
                </div>
            </div>
            
            <button class="btn" style="margin-top:25px;" onclick="shuffleItems()">Shuffle Feed</button>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">
                <div class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div>
                <span>Home</span>
            </a>
            <a href="chats.html" class="nav-item">
                <div id="messageNav" class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
                <span>Chats</span>
            </a>
            <a href="add_product.html" class="nav-item">
                <div class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>
                <span>Sell</span>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
                <span>Profile</span>
            </a>
        </nav>
        
    </div>

    <!-- Supabase JS CDN and User Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <script>
        // Fetch logic
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login-signup.html';
                return;
            }
            await fetchProducts();
        };

        async function fetchProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .eq('status', 'active')
                .eq('is_sold', false)
                .order('created_at', { ascending: false });

            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            if (error) {
                grid.innerHTML = `<div style="color:red; grid-column:1/-1;">Error loading products: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                grid.innerHTML = `<div style="text-align:center; color:#718096; grid-column:1/-1;">Marketplace is empty. Be the first to float an item!</div>`;
                return;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.animationDelay = `${(index % 3) * 0.5}s`;

                // Handling images if present (parsing comma separated string)
                let imgHtml = `<div class="p-img"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg></div>`;
                if (item.image_url) {
                    const primaryImage = item.image_url.split(',')[0].trim();
                    imgHtml = `<img src="${primaryImage}" alt="${item.title}" style="width:100%; height:120px; object-fit:cover; border-radius:12px; margin-bottom:12px;">`;
                }

                // Add card HTML with action buttons
                card.innerHTML = `
                    ${imgHtml}
                    <p class="p-title">${item.title}</p>
                    <div class="p-price">₹${Number(item.price).toFixed(2)}</div>
                    <div class="card-actions">
                        <a href="product_detail.html?id=${item.id}" class="action-icon-btn">View Details</a>
                        <button onclick="startChat('${item.id}', '${item.seller_id}')" class="action-icon-btn">Chat</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function startChat(productId, sellerId) {
            window.location.href = `chat_room.html?user=${sellerId}`;
        }

        // Shuffle Logic (client-side visual shuffle for anti-gravity feel)
        function shuffleItems() {
            const grid = document.getElementById('productGrid');
            const cards = Array.from(grid.children);
            if(cards.length === 0) return;
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            grid.innerHTML = '';
            cards.forEach(card => {
                card.style.opacity = '0';
                grid.appendChild(card);
                setTimeout(() => {
                    card.style.transition = 'opacity 0.4s ease';
                    card.style.opacity = '1';
                }, 50);
            });
        }

        // Floating Notifications logic for hearts/likes
        function triggerSpawnNotif() {
            spawnFloatingNotif(`<svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`);
            setTimeout(() => spawnFloatingNotif(`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`), 200);
        }

        function spawnFloatingNotif(emoji) {
            const bubble = document.createElement("div");
            bubble.innerHTML = emoji;
            bubble.className = "floating-bubble";
            const offsetX = (Math.random() - 0.5) * 60;
            const leftOffset = (window.innerWidth > 480) ? (window.innerWidth/2 + offsetX) : (window.innerWidth/2 + offsetX);
            bubble.style.left = `${leftOffset}px`;
            
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 2000);
        }
    </script>
</body>
</html>

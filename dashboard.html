<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DormKart - Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
:root {
    --primary:#519755;
    --secondary:#A8DCAB;
    --accent-warm:#DBAAA7;
    --accent-cool:#BE91BE;
    --bg-light:#fdfaf9;
    --border:#dbdbdb;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
background-color:var(--bg-light);
font-family:-apple-system,sans-serif;
margin:0;
}

/* HEADER */

.app-header{
background:white;
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

.app-header h1{
font-size:18px;
font-weight:800;
color:var(--primary);
margin:0;
}

.notif-btn{
background:none;
border:none;
font-size:22px;
cursor:pointer;
position:relative;
padding:5px;
}

.notif-badge{
position:absolute;
top:5px;
right:2px;
width:10px;
height:10px;
background:#ef4444;
border-radius:50%;
border:2px solid white;
display:none;
}

/* GRID SMALLER (3 per row) */

.product-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:3px;
padding-bottom:100px;
}

.product-card{
background:white;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
}

.p-img-container{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
background:#f0f0f0;
}

.p-img-container img{
width:100%;
height:100%;
object-fit:cover;
}

.p-info{
padding:6px;
}

.p-price{
font-weight:800;
font-size:14px;
}

.p-title{
font-size:11px;
margin:3px 0;
display:-webkit-box;
-webkit-line-clamp:1;
-webkit-box-orient:vertical;
overflow:hidden;
}

/* views text */

.p-views{
font-size:10px;
color:#777;
}

/* ACTION BUTTONS */

.card-actions{
display:flex;
gap:4px;
margin-top:4px;
}

.action-btn{
flex:1;
padding:5px 0;
border-radius:4px;
border:1px solid var(--border);
font-size:10px;
font-weight:700;
text-transform:uppercase;
cursor:pointer;
}

.btn-offer{
background:var(--primary);
color:white;
border:none;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid var(--border);
z-index:1000;
}

.nav-item{
text-decoration:none;
color:#8e8e8e;
font-size:24px;
}

.nav-item.active{
color:var(--primary);
}

</style>
</head>

<body>

<header class="app-header">
<div style="width:32px;"></div>
<h1>DORMKART</h1>

<button class="notif-btn" onclick="location='notifications.html'">
🔔
<div id="notifBadge" class="notif-badge"></div>
</button>

</header>

<main>
<div class="product-grid" id="productGrid"></div>
</main>

<nav class="bottom-nav">

<a href="dashboard.html" class="nav-item active">⌂</a>
<a href="chats.html" class="nav-item">🗨</a>
<a href="add_product.html" class="nav-item">⊕</a>
<a href="profile.html" class="nav-item">👤</a>

</nav>

<script>

let currentUser

window.onload=init

async function init(){

const {data:{session}}=await supabaseClient.auth.getSession()

if(!session){
location="login-signup.html"
return
}

currentUser=session.user

fetchProducts()
checkNotifications()

supabaseClient
.channel('schema-db-changes')
.on('postgres_changes',{
event:'INSERT',
schema:'public',
table:'notifications',
filter:`user_id=eq.${currentUser.id}`
},()=>{
document.getElementById("notifBadge").style.display="block"
})
.subscribe()

}

/* TRENDING LOGIC: views must be >20 */

async function fetchProducts(){

const {data}=await supabaseClient
.from("products")
.select("*")
.eq("status","active")

renderProducts(data)

}

function renderProducts(data){

const grid=document.getElementById("productGrid")

grid.innerHTML=""

data?.forEach(item=>{

const imgUrl=item.image_url?item.image_url.split(",")[0]:null

const card=document.createElement("div")

card.className="product-card"

card.innerHTML=`

<div class="p-img-container">
<img src="${imgUrl || 'placeholder.png'}" loading="lazy">
</div>

<div class="p-info">

<div class="p-price">₹${Math.floor(item.price)}</div>

<p class="p-title">${item.title}</p>

<div class="p-views">👁 ${item.views || 0} views</div>

<div class="card-actions">

<button onclick="openProduct('${item.id}')" class="action-btn">View</button>

<button onclick="sendOffer('${item.seller_id}','${item.title}')" class="action-btn btn-offer">Offer</button>

</div>

</div>
`

grid.appendChild(card)

})

}

/* VIEW COUNT INCREMENT */

async function openProduct(productId){

const {data}=await supabaseClient
.from("products")
.select("views")
.eq("id",productId)
.single()

const newViews=(data.views || 0)+1

await supabaseClient
.from("products")
.update({views:newViews})
.eq("id",productId)

location=`product_detail.html?id=${productId}`

}

/* OFFER SYSTEM */

async function sendOffer(sellerId,productTitle){

if(sellerId===currentUser.id)
return alert("You can't offer on your own item!")

const offerPrice=prompt("Enter your offer price:")

if(!offerPrice || isNaN(offerPrice)) return

const {error}=await supabaseClient
.from("notifications")
.insert({
user_id:sellerId,
title:"New Offer Received",
message:`Someone offered ₹${offerPrice} for your ${productTitle}`,
type:"offer",
is_read:false
})

if(!error) alert("Offer sent to seller!")

}

/* NOTIFICATION CHECK */

async function checkNotifications(){

const {count}=await supabaseClient
.from("notifications")
.select("*",{count:'exact',head:true})
.eq("user_id",currentUser.id)
.eq("is_read",false)

if(count>0)
document.getElementById("notifBadge").style.display="block"

}

</script>

</body>
</html>

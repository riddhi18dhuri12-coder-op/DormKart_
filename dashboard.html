<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DormKart - Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
    :root {
        --primary: #519755;
        --secondary: #A8DCAB;
        --accent-warm: #DBAAA7;
        --accent-cool: #BE91BE;
        --bg-light: #fdfaf9;
        --text-dark: #2d3436;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body { 
        background-color: var(--bg-light); 
        font-family: 'Inter', -apple-system, sans-serif;
        color: var(--text-dark);
        margin: 0;
    }

    .app-header {
        background: white;
        color: var(--primary);
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #eee;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .search-bar { padding: 15px 15px 10px; }
    .search-bar input {
        width: 100%;
        padding: 12px 18px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        outline: none;
        font-size: 14px;
        background: white;
    }

    .filter-row {
        display: flex;
        gap: 8px;
        padding: 0 15px 15px;
    }

    select {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        background: white;
        font-size: 12px;
        color: var(--text-dark);
    }

    /* THE GRID FIX */
    .product-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 15px 100px;
    }

    /* THE CARD FIX */
    .product-card {
        background: white;
        border-radius: 16px;
        padding: 8px;
        box-shadow: var(--shadow);
        position: relative;
        display: flex;
        flex-direction: column;
        border: 1px solid #f1f5f9;
    }

    .wishlist-btn {
        position: absolute;
        top: 14px; right: 14px;
        background: rgba(255,255,255,0.9);
        border: none;
        color: var(--text-dark);
        border-radius: 50%;
        width: 28px; height: 28px;
        z-index: 5;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* ASPECT RATIO PREVENTS STRETCHING */
    .p-img-container {
        width: 100%;
        aspect-ratio: 1 / 1; 
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 8px;
        background: #f8fafc;
    }
    
    .p-img-container img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; /* This keeps the photo from squishing */
    }

    .p-info { padding: 2px 4px; }
    
    .p-title { 
        font-weight: 600; 
        font-size: 13px; 
        margin: 0; 
        color: #334155;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .p-price { 
        color: var(--primary); 
        font-weight: 800; 
        font-size: 15px; 
        margin: 4px 0; 
    }

    .college-tag { 
        font-size: 10px; 
        color: #94a3b8; 
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .card-actions { 
        display: flex; 
        gap: 6px; 
        margin-top: auto; 
    }

    .action-btn {
        flex: 1; 
        padding: 6px 0;
        border-radius: 6px; 
        border: none;
        font-size: 11px; 
        font-weight: 700;
        cursor: pointer;
    }
    
    .btn-view { background: #f1f5f9; color: #475569; }
    .btn-offer { background: var(--primary); color: white; }

    /* Bottom Nav */
    .bottom-nav {
        position: fixed; bottom: 0; width: 100%; height: 65px;
        background: white; display: flex; justify-content: space-around;
        align-items: center; border-top: 1px solid #eee;
        padding: 0 10px; z-index: 1000;
    }
    .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; color: #94a3b8; flex: 1; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; font-weight: 600; margin-top: 2px; }

</style>
</head>

<body>

<header class="app-header">
    <h1 style="margin:0; font-size: 18px; font-weight: 800;">DormKart</h1>
</header>

<main>
    <div class="search-bar">
        <input id="searchInput" placeholder="What are you looking for?">
    </div>

    <div class="filter-row">
        <select id="collegeFilter" onchange="fetchProducts()">
            <option value="all">All Campuses</option>
            <option value="mine">My Campus</option>
        </select>
        <select id="sortSelect" onchange="fetchProducts()">
            <option value="new">Newest First</option>
            <option value="priceLow">Price: Low</option>
            <option value="priceHigh">Price: High</option>
        </select>
    </div>

    <div class="product-grid" id="productGrid">
        </div>
</main>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
    </a>
    <a href="chats.html" class="nav-item">
        <span class="nav-icon">🗨</span>
        <span class="nav-label">Chats</span>
    </a>
    <a href="add_product.html" class="nav-item">
        <span class="nav-icon">⊕</span>
        <span class="nav-label">Sell</span>
    </a>
    <a href="profile.html" class="nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
    </a>
</nav>

<script>
let currentUser;

window.onload = init;

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { location = "login-signup.html"; return; }
    currentUser = session.user;
    fetchProducts();
}

async function fetchProducts() {
    const grid = document.getElementById("productGrid");
    grid.innerHTML = ""; // Clear grid

    let query = supabaseClient
        .from("products").select("*, users(college)").eq("status", "active");

    const sort = document.getElementById("sortSelect").value;
    if (sort === "new") query = query.order("created_at", { ascending: false });
    if (sort === "priceLow") query = query.order("price", { ascending: true });
    if (sort === "priceHigh") query = query.order("price", { ascending: false });

    const { data } = await query;
    renderProducts(data);
}

function renderProducts(data) {
    const grid = document.getElementById("productGrid");
    if (!data || data.length === 0) {
        grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No items found.</p>";
        return;
    }

    data.forEach(item => {
        const imgUrl = item.image_url ? item.image_url.split(",")[0] : null;
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
            <button class="wishlist-btn" onclick="this.innerHTML='❤️'">🤍</button>
            <div class="p-img-container">
                ${imgUrl ? `<img src="${imgUrl}" loading="lazy">` : `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#cbd5e1;">No Image</div>`}
            </div>
            <div class="p-info">
                <p class="p-title">${item.title}</p>
                <div class="p-price">₹${Math.floor(item.price)}</div>
                <div class="college-tag">📍 ${item.users?.college || "Global"}</div>
                <div class="card-actions">
                    <button onclick="location='product_detail.html?id=${item.id}'" class="action-btn btn-view">View</button>
                    <button onclick="makeOffer('${item.id}', ${item.price})" class="action-btn btn-offer">Offer</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

async function makeOffer(id, price) {
    const amt = prompt(`Asking: ₹${price}. Your offer?`);
    if(amt) alert("Offer sent!");
}
</script>
</body>
</html>

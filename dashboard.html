<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DormKart • Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --text: #0f172a;
            --text-light: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --header-height: 100px; /* Adjusted to fit the search bar */
            --nav-height: 70px;
        }

        html.dark {
            --text: #f1f5f9; --text-light: #94a3b8; --bg: #0f172a; --card-bg: #1e2937; --border: #334155;
        }

        * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            padding-top: var(--header-height); /* Ensure main content is visible below the fixed header */
            padding-bottom: calc(var(--nav-height) + 20px);
        }

        /* --- Updated Header with Search Bar --- */
        .app-header {
            background: var(--card-bg); height: var(--header-height); 
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 16px; border-bottom: 1px solid var(--border); position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, var(--primary), #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-icons span { font-size: 20px; cursor: pointer; margin-left: 12px; position: relative; }

        .search-container {
            width: 100%; display: flex; border: 1px solid var(--border); border-radius: 99px;
            overflow: hidden; background: var(--bg);
        }
        .search-input {
            flex: 1; padding: 10px 16px; border: none; background: transparent; color: var(--text); font-size: 14px;
        }
        .search-input:focus { outline: none; }
        .search-btn {
            background: transparent; border: none; padding: 10px 16px; color: var(--text-light); cursor: pointer;
        }

        /* --- Updated Product Grid with Smaller Sizes --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns, now smaller on mobile */
            gap: 12px;
            padding: 12px 16px; /* Reduced padding from 16px */
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 10px; /* Reduced from 12px */
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .p-img-container { aspect-ratio: 1/1; position: relative; background: #eee; }
        .p-img-container img { width:100%; height:100%; object-fit: cover; }
        
        .p-info { padding: 8px; } /* Reduced from 10px */
        .p-price { font-size: 16px; font-weight: 800; color: var(--text); } /* Reduced from 18px */
        .p-title { font-size: 12px; color: var(--text-light); margin: 2px 0 4px; display: -webkit-box; -webkit-line-clamp: 1; overflow: hidden; } /* Reduced from 13px */
        .p-location { font-size: 10px; color: var(--text-light); display: flex; align-items: center; gap: 4px; text-transform: capitalize; } /* Reduced from 11px */

        /* Safety Notification for Chat Flow */
        .safety-banner {
            background: #fffbeb; border: 1px solid #fef3c7; color: #b45309;
            padding: 10px 16px; font-size: 12px; font-weight: 600; border-radius: 8px; margin: 0 16px 12px;
        }

        /* Bottom Nav (same as previous) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
            background: var(--card-bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-light); text-decoration: none; font-size: 10px; font-weight: 600; gap: 4px;
        }
        .nav-item.active { color: var(--primary-dark); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-sell {
            background: var(--primary); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: -35px; border: 4px solid var(--bg);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
            color: white !important;
        }

    </style>
</head>
<body>

<header class="app-header">
    <div class="header-top">
        <div class="logo">DormKart</div>
        <div class="header-icons">
            <span onclick="toggleDarkMode()">🌓</span>
            <span onclick="location.href='notifications.html'">
                🔔<div id="notifBadge" style="display:none; position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:red; border-radius:50%;"></div>
            </span>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search textbooks, dorm decor...">
        <button class="search-btn">🔍</button>
    </div>
</header>

<main id="app-content">
    
    <div class="safety-banner">
        🛡️ Meet in public campus spots for safe transactions.
    </div>

    <div class="product-grid" id="productGrid">
        </div>
</main>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.97 2.59a1.5 1.5 0 00-1.94 0l-9.5 8.13a.75.75 0 10.97 1.15l1.01-.86v9.19c0 1.1.9 2 2 2h3.5a.75.75 0 00.75-.75v-5.5c0-.14.11-.25.25-.25h3a.25.25 0 01.25.25v5.5c0 .41.34.75.75.75h3.5c1.1 0 2-.9 2-2v-9.19l1.01.86a.75.75 0 10.97-1.15l-9.5-8.13z"/></svg>
        Home
    </a>
    <a href="chats.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 17.1V20a1 1 0 001 1h14a1 1 0 001-1v-2.9a8.97 8.97 0 003-6.1c0-5-4-9-9-9S4 6.1 4 11.1c0 2.4.9 4.6 2.4 6.1.1.1.2.2.3.2.1 0 .2.1.2.2L6 20c.1.1.3.1.4.1.2 0 .3-.1.4-.2l.6-.6c.1-.1.2-.2.3-.3.1-.1.2-.2.3-.2zM12 4.1c3.8 0 7 3.1 7 7 0 3.1-2.1 5.8-5 6.7v-2c0-.5-.4-.9-.9-.9h-2.2c-.5 0-.9.4-.9.9v2C7.1 16.9 5 14.2 5 11.1 5 7.2 8.1 4.1 12 4.1z"/></svg>
        Chats
    </a>
    <a href="sell.html" class="nav-item nav-sell">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    </a>
    <a href="my-ads.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 1h-2a2 2 0 00-2 2v2H9V3a2 2 0 00-2-2H5a2 2 0 00-2 2v18a2 2 0 002 2h2a2 2 0 002-2v-2h6v2a2 2 0 002 2h2a2 2 0 002-2V3a2 2 0 00-2-2zM7 19H5v-2h2v2zm0-4H5v-2h2v2zm0-4H5V9h2v2zm0-4H5V5h2v2zm12 12h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2z"/></svg>
        My Ads
    </a>
    <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 11a4 4 0 100-8 4 4 0 000 8zm0 2c-4.4 0-8 3.6-8 8v1h16v-1c0-4.4-3.6-8-8-8z"/></svg>
        Profile
    </a>
</nav>

<script>
 

    // Store products in a global variable for smart search
    let productsList = [];
    let userCollege = "";

    async function init() {
        console.log("Initializing DormKart Dashboard...");
        
        // 1. Auth Check
        const { data: { session }, error: authError } = await supabase.auth.getSession();
        
        if (authError || !session) {
            console.log("No active session, redirecting to login...");
            window.location.href = "login-signup.html";
            return;
        }

        // 2. Get User Profile for Smart Search
        try {
            const { data: userProfile } = await supabase
                .from('users')
                .select('college')
                .eq('id', session.user.id)
                .single();
            
            userCollege = userProfile?.college || "";
        } catch (err) {
            console.warn("Could not fetch user college profile:", err);
        }

        // 3. Load Products
        fetchProducts();
        setupRealtime();
    }

    async function fetchProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px;">Fetching campus deals...</div>';

        // Note: Using a simpler join to ensure items show even if seller data is missing
        const { data, error } = await supabase
            .from('products')
            .select(`*, seller:users(college)`)
            .eq('status', 'active')
            .eq('is_sold', false);

        if (error) {
            console.error("Supabase Fetch Error:", error);
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:red;">Error loading products. Check console.</div>';
            return;
        }

        console.log("Products Loaded:", data);
        productsList = data || [];

        // Smart Sort: Display user's college items first
        productsList.sort((a, b) => {
            const aCollege = a.seller?.college || "";
            const bCollege = b.seller?.college || "";
            if (aCollege === userCollege && bCollege !== userCollege) return -1;
            if (aCollege !== userCollege && bCollege === userCollege) return 1;
            return 0;
        });

        renderProductsList(productsList);
    }

    function renderProductsList(products) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        if (products.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px;">No deals found.</div>';
            return;
        }

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => window.location.href = `product-view.html?id=${product.id}`;
            
            const firstImage = product.image_url ? product.image_url.split(',')[0] : 'https://via.placeholder.com/150';

            card.innerHTML = `
                <div class="p-img-container">
                    <img src="${firstImage}" loading="lazy" onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <div class="p-info">
                    <div class="p-price">₹${Math.floor(product.price)}</div>
                    <div class="p-title">${product.title}</div>
                    <div class="p-location">
                        📍 ${product.seller?.college || 'Campus'}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Search Logic
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function(e) {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
            renderProductsList(productsList);
            return;
        }
        const filtered = productsList.filter(p => 
            p.title.toLowerCase().includes(query) || 
            (p.seller?.college || '').toLowerCase().includes(query)
        );
        renderProductsList(filtered);
    });

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

    function setupRealtime() {}

    window.onload = init;
</script>
</body>
</html>

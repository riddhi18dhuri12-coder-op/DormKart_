<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart • Campus Marketplace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #00e676;
  --primary-dark: #00c853;
  --primary-glow: rgba(0,230,118,0.18);
  --text: #0d1117;
  --text-light: #5a6476;
  --bg: #f0f4f0;
  --card-bg: #ffffff;
  --border: #e3e9e3;
  --nav-height: 72px;
  --radius: 18px;
}
body.dark {
  --text: #e8f0e8;
  --text-light: #7a8c7a;
  --bg: #0a0f0a;
  --card-bg: #111811;
  --border: #1e2a1e;
  --primary-glow: rgba(0,230,118,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--text);
  padding-bottom: calc(var(--nav-height) + 24px);
}

/* HEADER */
.app-header {
  background: var(--card-bg);
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1000;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(120deg, var(--primary-dark), #00b8a9);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.theme-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.theme-btn:hover { background: var(--primary-glow); }

/* HERO */
.hero { padding: 20px 16px 8px; }
.hero-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary-dark);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}
.hero-title em { font-style: normal; color: var(--primary-dark); }

/* SEARCH */
.search-wrap { position: relative; }
.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  stroke: var(--text-light);
  fill: none;
}
.search-wrap input {
  width: 100%;
  padding: 14px 14px 14px 44px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--primary-dark);
  box-shadow: 0 0 0 4px var(--primary-glow);
}
.search-wrap input::placeholder { color: var(--text-light); }

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-item {
  padding: 8px 16px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  white-space: nowrap;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.2s, background 0.2s;
}
.filter-item:focus, .filter-item:hover {
  border-color: var(--primary-dark);
  background: var(--primary-glow);
}

/* SECTION LABEL */
.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 4px 16px 10px;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-label span {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--primary-dark);
  cursor: pointer;
}

/* PRODUCT GRID */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px 16px;
}
@media (min-width: 480px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 720px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

.product-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  position: relative;
}
.product-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.08);
}
.p-img-container {
  aspect-ratio: 1/1;
  background: var(--bg);
  overflow: hidden;
  position: relative;
}
.p-img-container img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.product-card:hover .p-img-container img { transform: scale(1.04); }
.p-badge {
  position: absolute;
  top: 8px; left: 8px;
  background: var(--primary-dark);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 100px;
  font-family: 'Syne', sans-serif;
}
.p-info { padding: 10px 12px 12px; }
.p-price {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}
.p-title {
  font-size: 12px;
  color: var(--text-light);
  margin: 3px 0 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.p-meta { font-size: 11px; color: var(--text-light); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  grid-column: 1 / -1;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { color: var(--text-light); font-size: 15px; line-height: 1.6; }

/* SKELETON */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
.skeleton-card {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--card-bg);
}
.skeleton-img { aspect-ratio: 1/1; border-radius: 0; }
.skeleton-line { height: 14px; margin: 10px 12px 6px; }
.skeleton-line.short { width: 60%; height: 11px; margin-bottom: 12px; }

/* MODAL */
#productModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  z-index: 3000;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal-content {
  background: var(--card-bg);
  width: 100%;
  border-radius: 28px 28px 0 0;
  max-height: 92vh;
  overflow-y: auto;
  scrollbar-width: none;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-content::-webkit-scrollbar { display: none; }
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-drag {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin: 12px auto 0;
}
.modal-body { padding: 16px 20px 0; }

/* SLIDER */
.slider-container {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
  background: var(--bg);
  margin-top: 8px;
}
.slider-wrapper {
  display: flex;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  height: 100%;
}
.slider-wrapper img { min-width: 100%; object-fit: contain; }
.slider-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: var(--card-bg);
  border: 1px solid var(--border);
  width: 34px; height: 34px;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  z-index: 5;
  display: flex; align-items: center; justify-content: center;
}
.prev-btn { left: 12px; }
.next-btn { right: 12px; }
.slider-dots {
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 5px;
}
.dot {
  width: 6px; height: 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  transition: background 0.2s, width 0.2s;
}
.dot.active { background: white; width: 16px; border-radius: 4px; }
.close-btn {
  position: absolute;
  top: 14px; left: 14px;
  background: rgba(0,0,0,0.45);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  z-index: 20;
  display: flex; align-items: center; justify-content: center;
}

/* MODAL BODY */
.modal-price-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 14px 0 6px;
}
.modal-price {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.verified-badge {
  background: #dcfce7;
  color: #166534;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 100px;
  border: 1px solid #bbf7d0;
  font-family: 'Syne', sans-serif;
}
.modal-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.4;
}
.condition-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  color: var(--text-light);
  margin-bottom: 12px;
}
.safety-tip {
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border: 1px solid #bbf7d0;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  color: #166534;
  margin-bottom: 16px;
  font-weight: 500;
}
.desc-section h4 {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.desc-section p { font-size: 14px; line-height: 1.65; color: var(--text); }
.seller-card {
  margin: 16px 0;
  padding: 14px;
  background: var(--bg);
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.seller-card:hover { border-color: var(--primary-dark); }
.seller-avatar {
  width: 46px; height: 46px;
  background: var(--primary-dark);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 16px;
  overflow: hidden;
  flex-shrink: 0;
}
.seller-avatar img { width: 100%; height: 100%; object-fit: cover; }
.seller-name { font-weight: 600; font-size: 14px; }
.seller-college { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.seller-arrow { margin-left: auto; color: var(--text-light); font-size: 18px; }

/* BUTTON ROW */
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 20px 20px;
  position: sticky;
  bottom: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
}
.btn {
  padding: 14px 10px;
  border-radius: 14px;
  border: none;
  font-weight: 700;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn:active { transform: scale(0.97); }
.btn-buy {
  background: var(--primary-dark);
  color: white;
  width: 100%;
  font-size: 15px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.02em;
  box-shadow: 0 4px 16px rgba(0,200,83,0.28);
}
.btn-buy:hover { background: #009624; }
.btn-secondary-row { display: flex; gap: 8px; width: 100%; }
.btn-cart  { flex:1; background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd; }
.btn-cart:hover  { background:#bae6fd; }
.btn-offer { flex:1; background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
.btn-offer:hover { background:#fde68a; }
.btn-wish  { flex:1; background:#ffe4e6; color:#9f1239; border:1px solid #fecdd3; }
.btn-wish:hover  { background:#fecdd3; }
.btn-message {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-message:hover { border-color: var(--primary-dark); background: var(--primary-glow); }

/* UPI MODAL */
#upiModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 4000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.upi-content {
  background: var(--card-bg);
  width: 100%;
  max-width: 320px;
  border-radius: 24px;
  padding: 28px 24px;
  text-align: center;
  border: 1px solid var(--border);
}
.upi-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}
#upiAmount {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 8px 0 16px;
}
#upiQR {
  width: 200px; height: 200px;
  margin: 0 auto 14px;
  display: block;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.upi-hint { font-size: 12px; color: var(--text-light); margin-bottom: 18px; }
.upi-btns { display: flex; gap: 10px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-height);
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 2000;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text-light);
  text-decoration: none;
  font-size: 10px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  gap: 3px;
  transition: color 0.2s;
}
.nav-item.active { color: var(--primary-dark); }
.nav-item svg { width: 22px; height: 22px; }
.nav-sell {
  background: var(--primary-dark);
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-top: -30px;
  border: 4px solid var(--bg);
  color: white !important;
  box-shadow: 0 4px 20px rgba(0,200,83,0.4);
  transition: transform 0.2s;
}
.nav-sell:hover { transform: scale(1.08); }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">DormKart</div>
  <button onclick="toggleDarkMode()" id="themeBtn" class="theme-btn">🌙</button>
</header>

<div class="hero">
  <div class="hero-label">Campus Marketplace</div>
  <div class="hero-title">Find deals from<br><em>students near you</em></div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" placeholder="Search books, electronics, dorm stuff...">
  </div>
</div>

<div class="filter-bar">
  <select id="categoryFilter" class="filter-item">
    <option value="">All Categories</option>

    <option value="Dorm Essentials">Dorm Essentials</option>
    <option value="Fashion">Fashion</option>

  <select id="priceSort" class="filter-item">
    <option value="">Sort: Price</option>

  </select>
</div>

<div class="section-label">
  Latest Listings <span>See all →</span>
</div>

<main>
  <div class="product-grid" id="productGrid">
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>

<div id="productModal">
  <div class="modal-content" id="modalContent"></div>
</div>

    <div id="upiAmount"></div>

    <div class="upi-btns">
      <a id="upiLink" href="#" class="btn btn-buy" style="flex:1; text-decoration:none;">Open UPI App</a>

    </div>
  </div>
</div>

<nav class="bottom-nav">

    Home

  <a href="chats.html" class="nav-item">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
    Chats

<script>
let allProducts = [];
let currentImgIndex = 0;

async function init() {
  applySavedTheme();
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { location.href = 'login-signup.html'; return; }
  fetchProducts();
}

async function fetchProducts() {
  const { data, error } = await supabaseClient
    .from('products')
    .select(`*, seller:users(id, name, college, is_verified, avatar_url, upi_id)`)
    .eq('status', 'active')
    .order('created_at', { ascending: false });
  if (error) return console.error(error);
  allProducts = data;
  renderGrid(data);
}

function renderGrid(products) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  if (!products.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🛍️</div><p>No listings found.<br>Try a different search.</p></div>`;
    return;
  }
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    const img = p.image_url ? p.image_url.split(',')[0] : 'placeholder.jpg';
    card.innerHTML = `
      <div class="p-img-container">
        <img src="${img}" loading="lazy" onerror="this.src='placeholder.jpg'">
        ${p.condition ? `<div class="p-badge">${p.condition}</div>` : ''}
      </div>
      <div class="p-info">
        <div class="p-price">₹${Math.floor(p.price).toLocaleString('en-IN')}</div>
        <div class="p-title">${p.title}</div>
        <div class="p-meta">📍 ${p.seller?.college || 'Campus'}</div>
      </div>
    `;
    card.onclick = () => showDetails(p);
    grid.appendChild(card);
  });
}

function applyFilters() {
  let f = [...allProducts];
  const s = document.getElementById('searchInput').value.toLowerCase();
  const c = document.getElementById('categoryFilter').value;
  const sort = document.getElementById('priceSort').value;
  if (s) f = f.filter(p => p.title.toLowerCase().includes(s) || (p.description || '').toLowerCase().includes(s));
  if (c) f = f.filter(p => p.category === c);
  if (sort === 'low') f.sort((a, b) => a.price - b.price);
  if (sort === 'high') f.sort((a, b) => b.price - a.price);
  renderGrid(f);
}
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('priceSort').addEventListener('change', applyFilters);

function showDetails(p) {
  const modal = document.getElementById('productModal');
  const content = document.getElementById('modalContent');
  currentImgIndex = 0;
  const images = p.image_url ? p.image_url.split(',') : ['placeholder.jpg'];
  const slidesHTML = images.map(url => `<img src="${url.trim()}" onerror="this.src='placeholder.jpg'">`).join('');
  const dotsHTML = images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`).join('');

  content.innerHTML = `
    <div class="modal-drag"></div>
    <div class="slider-container">
      <button class="close-btn" onclick="closeModal()">✕</button>
      ${images.length > 1 ? `
        <button class="slider-btn prev-btn" onclick="moveSlide(-1,${images.length})">❮</button>
        <button class="slider-btn next-btn" onclick="moveSlide(1,${images.length})">❯</button>
        <div class="slider-dots">${dotsHTML}</div>
      ` : ''}
      <div class="slider-wrapper" id="sliderWrapper">${slidesHTML}</div>
    </div>
    <div class="modal-body">
      <div class="modal-price-row">
        <div class="modal-price">₹${Math.floor(p.price).toLocaleString('en-IN')}</div>
        ${p.seller?.is_verified ? '<span class="verified-badge">✓ Verified Student</span>' : ''}
      </div>
      <div class="modal-title">${p.title}</div>
      ${p.condition ? `<div class="condition-chip">🏷️ ${p.condition}</div>` : ''}
      <div class="safety-tip">🛡️ Meet at public campus spots — Library, Canteen or Admin Block.</div>
      <div class="desc-section">
        <h4>Description</h4>
        <p>${p.description || 'No description provided.'}</p>
      </div>
      <div class="seller-card" onclick="window.location.href='profile.html?id=${p.seller_id}'">
        <div class="seller-avatar">
          ${p.seller?.avatar_url ? `<img src="${p.seller.avatar_url}">` : (p.seller?.name?.charAt(0)?.toUpperCase() || 'S')}
        </div>
        <div>
          <div class="seller-name">${p.seller?.name || 'Anonymous Seller'}</div>
          <div class="seller-college">${p.seller?.college || 'Verified Campus'}</div>
        </div>
        <div class="seller-arrow">›</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-buy" onclick="openUPI(${p.price}, '${p.seller?.upi_id || ''}')">⚡ Buy it Now</button>
      <div id="tradeSection" style="display:none;margin-top:14px;">

    <div id="tradeWanted" style="font-size:13px;color:#475569;margin-bottom:8px;"></div>

    <input 
        type="text"
        id="buyerTradeItem"
        placeholder="Enter item you want to trade"
        style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:10px;margin-top:6px;"
    >
</div>
      <div class="btn-secondary-row">
        <button class="btn btn-cart"  onclick="addToCart('${p.id}')">🛒 Cart</button>
        <button class="btn btn-offer" onclick="makeOffer('${p.id}', '${p.seller_id}')">💬 Offer</button>
        <button class="btn btn-wish"  onclick="addToWishlist('${p.id}')">♡ Save</button>
      </div>
      <button class="btn btn-message" onclick="window.location.href='chats.html?id=${p.seller_id}'">Message Seller</button>
    </div>
  `;
  modal.style.display = 'flex';
  const tradeSection = document.getElementById("tradeSection");
const tradeWanted = document.getElementById("tradeWanted");
const tradeInput = document.getElementById("buyerTradeItem");

tradeSection.style.display = "none";

if(product.swap_enabled){

    tradeSection.style.display = "block";

    if(product.swap_item){
        tradeWanted.innerHTML = "🔁 Seller wants: <b>" + product.swap_item + "</b>";
        tradeInput.style.display = "none";
    }
    else{
        tradeWanted.innerHTML = "🔁 Seller is open to trade offers";
        tradeInput.style.display = "block";
    }

}
}

function closeModal() {
  document.getElementById('productModal').style.display = 'none';
}
document.getElementById('productModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function moveSlide(direction, total) {
  const wrapper = document.getElementById('sliderWrapper');
  currentImgIndex = (currentImgIndex + direction + total) % total;
  wrapper.style.transform = `translateX(-${currentImgIndex * 100}%)`;
  document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentImgIndex));
}

function openUPI(price, upiId) {
  if (!upiId) { alert('Seller has not added a UPI ID yet.'); return; }
  const upiLink = `upi://pay?pa=${upiId}&pn=DormKart&am=${price}&cu=INR`;
  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
  document.getElementById('upiAmount').innerText = '₹' + Math.floor(price).toLocaleString('en-IN');
  document.getElementById('upiQR').src = qr;
  document.getElementById('upiLink').href = upiLink;
  document.getElementById('upiModal').style.display = 'flex';
}

async function addToWishlist(productId) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const userId = session.user.id;
  const { data: existing } = await supabaseClient.from('wishlist').select('id').eq('user_id', userId).eq('product_id', productId).single();
  if (existing) { alert('Already in your wishlist!'); return; }
  const { error } = await supabaseClient.from('wishlist').insert({ user_id: userId, product_id: productId });
  if (error) { alert('Could not add to wishlist: ' + error.message); return; }
  await supabaseClient.rpc('increment_likes', { product_id: productId });
  alert('Added to wishlist! ♡');
}

async function addToCart(productId) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const userId = session.user.id;
  const { data: existing } = await supabaseClient.from('orders').select('id').eq('buyer_id', userId).eq('product_id', productId).eq('payment_status', 'in_cart').single();
  if (existing) { alert('Already in your cart!'); return; }
  const { data: product, error: pErr } = await supabaseClient.from('products').select('seller_id, price').eq('id', productId).single();
  if (pErr || !product) { alert('Could not fetch product details.'); return; }
  const { error } = await supabaseClient.from('orders').insert({
    buyer_id: userId, product_id: productId,
    seller_id: product.seller_id, amount: product.price,
    payment_method: 'UPI', payment_status: 'in_cart'
  });
  if (error) { alert('Could not add to cart: ' + error.message); return; }
  alert('Added to cart! 🛒');
}

async function makeOffer(productId, sellerId) {
  const amount = prompt('Enter your offer price (₹):');
  if (!amount || isNaN(amount) || Number(amount) <= 0) return;
  const { data: { session } } = await supabaseClient.auth.getSession();
  const userId = session.user.id;
  const { error } = await supabaseClient.from('chats').insert({
    sender_id: userId, receiver_id: sellerId,
    product_id: productId,
    message: `💬 Offer: I'd like to buy this for ₹${amount}`
  });
  if (error) { alert('Could not send offer: ' + error.message); return; }
  await supabaseClient.from('notifications').insert({
    user_id: sellerId,
    title: 'New Offer Received',
    message: `Someone made an offer of ₹${amount} on your listing.`,
    type: 'offer'
  });
  window.location.href = `chats.html?id=${sellerId}&product=${productId}`;
}

function applySavedTheme() {
  const theme = localStorage.getItem('theme');
  if (theme === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').innerText = '☀️';
  }
}
function toggleDarkMode() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
}

window.onload = init;
</script>

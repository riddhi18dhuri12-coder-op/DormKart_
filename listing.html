<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>DormKart | Chat Room</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sky-blue: #bae1ff;
            --mint-green: #baffc9;
            --text-dark: #0f172a;
            --bg-light: #f8fafc;
            --white: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-light); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header */
        .chat-header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e2e8f0;
            z-index: 10;
        }
        .back-btn { font-size: 20px; color: var(--text-dark); text-decoration: none; }
        .user-avatar { width: 40px; height: 40px; background: var(--sky-blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        /* Messages Area */
        #messageDisplay {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--sky-blue); color: var(--text-dark); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--white); border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .time { font-size: 9px; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }

        /* Input Area */
        .input-box {
            background: var(--white);
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
        }
        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border-radius: 15px;
            border: 2px solid var(--bg-light);
            outline: none;
            background: var(--bg-light);
            transition: 0.2s;
        }
        #messageInput:focus { border-color: var(--sky-blue); background: var(--white); }
        .send-btn {
            background: var(--text-dark);
            color: var(--white);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); background: #000; }
    </style>
</head>
<body>

    <header class="chat-header">
        <a href="chats.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="user-avatar" id="headerAvatar">?</div>
        <div>
            <h4 id="headerName" style="font-weight: 800;">Loading...</h4>
            <p style="font-size: 11px; color: #64748b;">Active now</p>
        </div>
    </header>

    <main id="messageDisplay"></main>

    <div class="input-box">
        <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        let currentUserId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const receiverId = urlParams.get('user');
        const productId = urlParams.get('product');

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = 'index.html';
            currentUserId = session.user.id;

            // Load Recipient Info
            const { data: user } = await supabaseClient.from('users').select('name').eq('id', receiverId).single();
            if (user) {
                document.getElementById('headerName').innerText = user.name;
                document.getElementById('headerAvatar').innerText = user.name.charAt(0);
            }

            fetchMessages();
            
            // Realtime subscription for live chat
            supabaseClient
                .channel('chat-room')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, () => {
                    fetchMessages();
                })
                .subscribe();
        };

        async function fetchMessages() {
            const { data, error } = await supabaseClient
                .from('chats')
                .select('*')
                .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${currentUserId})`)
                .order('created_at', { ascending: true });

            if (error) return console.error(error);

            const container = document.getElementById('messageDisplay');
            container.innerHTML = data.map(msg => `
                <div class="msg ${msg.sender_id === currentUserId ? 'sent' : 'received'}">
                    ${msg.message}
                    <span class="time">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !receiverId) return;

            const { error } = await supabaseClient.from('chats').insert([
                {
                    sender_id: currentUserId,
                    receiver_id: receiverId,
                    product_id: productId || null,
                    message: text
                }
            ]);

            if (error) alert("Error: " + error.message);
            else {
                input.value = '';
                fetchMessages();
            }
        }
    </script>
</body>
</html>

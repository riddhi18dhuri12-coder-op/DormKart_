<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#F0FDFA">

<div style="background:white;padding:40px;border-radius:15px;width:350px">

<h2>Set New Password</h2>

<input type="password" id="newPassword" placeholder="New Password" style="width:100%;padding:10px;margin-top:15px">

<button onclick="updatePassword()" style="margin-top:15px;width:100%;padding:12px;background:#059669;color:white;border:none;border-radius:8px">
Update Password
</button>

<p id="msg"></p>

</div>

<script>

async function updatePassword(){

const password = document.getElementById("newPassword").value
const msg = document.getElementById("msg")

const { error } = await supabaseClient.auth.updateUser({
password: password
})

if(error){
msg.innerText = error.message
msg.style.color="red"
return
}

msg.innerText = "Password updated! Redirecting to login..."

setTimeout(()=>{
window.location="login.html"
},1500)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | DormKart</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --sky-blue: #bae1ff; --text-main: #1e293b; --bg-canvas: #f8faff; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-canvas);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .auth-container {
            width: 100%; max-width: 400px; background: white; padding: 40px;
            border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--sky-blue); text-align: center;
        }
        input {
            width: 100%; padding: 14px; margin: 20px 0; border-radius: 14px;
            border: 1.5px solid #f1f5f9; background: #f8fafc; outline: none;
        }
        .btn-auth {
            width: 100%; padding: 16px; background: var(--sky-blue);
            color: var(--text-main); border: none; border-radius: 14px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-auth:hover { transform: translateY(-2px); }
        .success { color: #10b981; font-size: 13px; font-weight: 600; margin-top: 15px; }
        .error { color: #ef4444; font-size: 13px; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 style="font-weight: 800; margin-bottom: 10px;">Set New Password</h2>
        <p style="color: #64748b; font-size: 14px;">Please choose a secure new password.</p>
        <input type="password" id="newPass" placeholder="New Password (min 6 chars)">
        <button class="btn-auth" onclick="handleUpdate()">Update Password</button>
        <div id="statusMessage"></div>
    </div>

    <script>
        async function handleUpdate() {
            const pass = document.getElementById('newPass').value;
            const status = document.getElementById('statusMessage');

            if(pass.length < 6) {
                status.innerText = "Minimum 6 characters required.";
                status.className = "error";
                return;
            }

            // Supabase uses the token from the URL automatically
            const { error } = await supabaseClient.auth.updateUser({ password: pass });

            if (error) {
                status.innerText = error.message;
                status.className = "error";
            } else {
                status.innerText = "Password updated! Redirecting...";
                status.className = "success";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            }
        }
    </script>
</body>
</html>

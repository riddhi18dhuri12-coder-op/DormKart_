<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DormKart - Chat Room</title>
    <link rel="stylesheet" href="app.css">
    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #059669;
            --text: #0f172a;
            --text-light: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 1. Lush Emerald Header */
        .room-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 20px;
            display: flex;
            align-items: center;
            color: white;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
            z-index: 10;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px;
            color: white;
            display: flex;
            align-items: center;
            margin-right: 15px;
            text-decoration: none;
            transition: 0.2s;
        }

        .back-btn:active { transform: scale(0.9); }

        .chat-user-info { display: flex; align-items: center; gap: 12px; }

        .chat-avatar {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            overflow: hidden;
        }

        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.3px; }

        /* 2. Message Area */
        .message-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .message-received {
            background: white;
            color: var(--text);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid var(--border);
        }

        .message-sent {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 5px;
            display: block;
            text-align: right;
        }

        /* 3. Input Area */
        .chat-input-area {
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
            background: white;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .chat-input:focus {
            background: white;
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .send-btn {
            background: var(--primary-dark);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
            transition: 0.2s;
        }

        .send-btn:active { transform: scale(0.9); }
        
        .typing-indicator {
            font-size: 0.75rem;
            color: var(--text-light);
            padding: 5px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="room-header">
            <a href="chats.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <div class="chat-user-info">
                <div class="chat-avatar" id="avatarDiv">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="chat-name" id="roomUserName">Loading...</div>
            </div>
        </div>

        <div class="message-area" id="messageArea">
            <div style="text-align: center; color: #94a3b8; padding: 20px; font-size: 0.9rem;">Fetching campus conversation...</div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator" style="display: none;">Buyer is typing...</div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="messageInput" class="chat-input" placeholder="Message..." autocomplete="off" required>
            <button type="submit" class="send-btn" id="sendBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        let currentUserId = null;
        let otherUserId = null;
        let channel = null;

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login-signup.html';
                return;
            }
            currentUserId = session.user.id;
            
            const params = new URLSearchParams(window.location.search);
            otherUserId = params.get('user');
            
            if (!otherUserId) {
                window.location.href = 'chats.html';
                return;
            }

            await loadOtherUser();
            await fetchHistory();
            setupRealtime();

            document.getElementById('chatForm').addEventListener('submit', sendMessage);
        };

        async function loadOtherUser() {
            const { data } = await supabaseClient
                .from('users')
                .select('name, avatar_url')
                .eq('id', otherUserId)
                .single();
            
            if (data) {
                document.getElementById('roomUserName').innerText = data.name || 'User';
                if(data.avatar_url) {
                    document.getElementById('avatarDiv').innerHTML = `<img src="${data.avatar_url}">`;
                }
            }
        }

        async function fetchHistory() {
            const container = document.getElementById('messageArea');
            const { data, error } = await supabaseClient
                .from('chats')
                .select('*')
                .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${currentUserId})`)
                .order('created_at', { ascending: true });

            container.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach(msg => appendMessage(msg, false));
                scrollToBottom();
            } else {
                container.innerHTML = `<div style="text-align:center; color:#94a3b8; margin-top:20px; font-size: 0.9rem;">No messages yet. Send a wave! 👋</div>`;
            }
        }

        function appendMessage(msg, smoothScroll = true) {
            const container = document.getElementById('messageArea');
            if (container.querySelector('div[style*="text-align:center"]')) container.innerHTML = '';

            const isMine = msg.sender_id === currentUserId;
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isMine ? 'message-sent' : 'message-received'}`;
            
            const d = new Date(msg.created_at);
            const timeString = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            bubble.innerHTML = `
                <div>${msg.message}</div>
                <span class="message-time">${timeString}</span>
            `;
            container.appendChild(bubble);
            if(smoothScroll) scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('messageArea');
            container.scrollTop = container.scrollHeight;
        }

        function setupRealtime() {
            channel = supabaseClient.channel('chat_room_inserts')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, (payload) => {
                    const msg = payload.new;
                    const isRelevant = (msg.sender_id === currentUserId && msg.receiver_id === otherUserId) ||
                                       (msg.sender_id === otherUserId && msg.receiver_id === currentUserId);
                    if (isRelevant) appendMessage(msg, true);
                }).subscribe();
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text) return;
            input.value = '';

            const { error } = await supabaseClient.from('chats').insert([{
                sender_id: currentUserId, 
                receiver_id: otherUserId,
                message: text,
                is_read: false
            }]);
            if (error) { alert("Error: " + error.message); input.value = text; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>DormKart</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Lush Emerald Colors */
            --emerald-light: #10b981;
            --emerald-dark: #059669;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Enhanced Emerald Gradient */
            background: linear-gradient(135deg, var(--emerald-light) 0%, var(--emerald-dark) 100%);
            color: white;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Splash Animation Enhancements */
        .logo-container {
            text-align: center;
            animation: fadeInScale 1.2s ease-out forwards;
        }

        .icon-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            animation: pulseEmerald 2.5s infinite ease-in-out;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pulseEmerald {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
            50% { transform: scale(1.08); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .loading-text {
            margin-top: 15px;
            font-weight: 500;
            opacity: 0.85;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Subtle Loading Indicator */
        .dot-loader {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot-loader:nth-child(1) { animation-delay: -0.32s; }
        .dot-loader:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>

<body>

    <div class="logo-container">

        <div class="icon-box">
            <i class="material-icons" style="font-size:80px; display: block;">storefront</i>
        </div>

        <h1>DormKart</h1>

        <div class="loading-text">
            Loading your campus
            <div class="dot-loader"></div>
            <div class="dot-loader"></div>
            <div class="dot-loader"></div>
        </div>

    </div>

    <script>
        // Kept your original logic
        setTimeout(function () {
            window.location.href = "login-signup.html"
        }, 5000)
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DormKart • Product Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #059669;
            --text: #0f172a;
            --text-light: #64748b;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); }

        /* Lush Emerald Header */
        .header-emerald {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 20px; color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            display: flex; align-items: center; gap: 15px;
        }
        .back-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 12px; padding: 8px; color: white; cursor: pointer; }

        /* Modal Content Styling */
        .modal-content { background: white; min-height: 100vh; position: relative; }
        .slider-container { position: relative; width: 100%; height: 350px; background: #000; overflow: hidden; }
        .slider-wrapper { display: flex; height: 100%; transition: transform 0.4s ease-out; }
        .slide { min-width: 100%; height: 100%; object-fit: contain; }
        
        .close-btn { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; }
        
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3); color: white; border: none; padding: 10px; cursor: pointer; z-index: 5; }
        .prev-btn { left: 10px; } .next-btn { right: 10px; }
        .slider-dots { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: white; width: 20px; border-radius: 4px; }

        .modal-body { padding: 20px; }
        .modal-price-row { display: flex; justify-content: space-between; align-items: center; }
        .modal-price { font-size: 32px; font-weight: 800; color: var(--primary-dark); }
        .verified-badge { background: #dcfce7; color: #166534; font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 700; }
        
        .modal-title { font-size: 20px; font-weight: 700; margin: 10px 0; }
        .condition-chip { display: inline-block; background: #f1f5f9; padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
        .safety-tip { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; padding: 12px; border-radius: 12px; font-size: 13px; margin: 15px 0; }
        
        .seller-card { display: flex; align-items: center; gap: 12px; padding: 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; cursor: pointer; margin-top: 20px; }
        .seller-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; overflow: hidden; }
        .seller-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .seller-name { font-weight: 700; font-size: 15px; }
        .seller-college { font-size: 12px; color: var(--text-light); }
        .seller-arrow { margin-left: auto; font-size: 24px; color: var(--text-light); }

        /* Buttons */
        .btn-row { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { border: none; border-radius: 15px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-buy { background: var(--primary-dark); color: white; }
        .btn-secondary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-cart, .btn-offer, .btn-wish { background: #f1f5f9; color: var(--text); font-size: 13px; padding: 12px 5px; }
        .btn-message { background: #0f172a; color: white; }
        .btn:active { transform: scale(0.96); }

        /* UPI Modal */
        #upiModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .upi-content { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; }
        .upi-title { font-weight: 800; font-size: 20px; margin-bottom: 10px; }
        #upiQR { width: 200px; height: 200px; margin: 15px auto; border: 8px solid #f1f5f9; border-radius: 15px; }
        .upi-btns { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="productModal">
    <div class="modal-content" id="modalContent">
        <div style="padding:50px; text-align:center;">Loading product...</div>
    </div>
</div>

<div id="upiModal">
    <div class="upi-content">
        <div class="upi-title">Pay via UPI</div>
        <div id="upiAmount" style="font-size: 24px; font-weight: 800; color: var(--primary-dark);"></div>
        <img id="upiQR" src="" alt="Scan to pay">
        <p class="upi-hint" style="font-size: 12px; color: gray;">Scan with GPay, PhonePe, Paytm or any UPI app</p>
        <div class="upi-btns">
            <a id="upiLink" href="#" class="btn btn-buy" style="flex:1; text-decoration:none; display:flex; align-items:center; justify-content:center;">Open App</a>
            <button onclick="document.getElementById('upiModal').style.display='none'" class="btn btn-cart" style="flex:1;">Close</button>
        </div>
    </div>
</div>

<script>
    let slideIndex = 0;

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        if (productId) fetchProductDetails(productId);
    };

    async function fetchProductDetails(id) {
        const { data: p, error } = await supabaseClient
            .from('products')
            .select('*, seller:users(*)')
            .eq('id', id)
            .single();

        if (error || !p) {
            document.getElementById('modalContent').innerHTML = "<p style='padding:50px; text-align:center;'>Product not found.</p>";
            return;
        }

        const images = p.image_url ? p.image_url.split(',') : ['placeholder.png'];
        const slidesHTML = images.map(img => `<img src="${img.trim()}" class="slide">`).join('');
        const dotsHTML = images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');

        const content = document.getElementById('modalContent');
        content.innerHTML = `
            <div class="slider-container">
                <button class="close-btn" onclick="history.back()">✕</button>
                ${images.length > 1 ? `
                    <button class="slider-btn prev-btn" onclick="moveSlide(-1,${images.length})">❮</button>
                    <button class="slider-btn next-btn" onclick="moveSlide(1,${images.length})">❯</button>
                    <div class="slider-dots">${dotsHTML}</div>
                ` : ''}
                <div class="slider-wrapper" id="sliderWrapper">${slidesHTML}</div>
            </div>
            <div class="modal-body">
                <div class="modal-price-row">
                    <div class="modal-price">₹${Math.floor(p.price).toLocaleString('en-IN')}</div>
                    ${p.seller?.is_verified ? '<span class="verified-badge">✓ Verified Student</span>' : ''}
                </div>
                <div class="modal-title">${p.title}</div>
                ${p.condition ? `<div class="condition-chip">🏷️ ${p.condition}</div>` : ''}
                <div class="safety-tip">🛡️ Meet at public campus spots — Library, Canteen or Admin Block.</div>
                <div class="desc-section">
                    <h4 style="margin-bottom:8px;">Description</h4>
                    <p style="color:var(--text-light); line-height:1.5; margin:0;">${p.description || 'No description provided.'}</p>
                </div>
                <div class="seller-card" onclick="window.location.href='seller_profile.html?id=${p.seller_id}'">
                    <div class="seller-avatar">
                        ${p.seller?.avatar_url ? `<img src="${p.seller.avatar_url}">` : (p.seller?.name?.charAt(0)?.toUpperCase() || 'S')}
                    </div>
                    <div>
                        <div class="seller-name">${p.seller?.name || 'Anonymous Seller'}</div>
                        <div class="seller-college">${p.seller?.college || 'Verified Campus'}</div>
                    </div>
                    <div class="seller-arrow">›</div>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-buy" onclick="openUPI(${p.price}, '${p.seller?.upi_id || ''}', '${p.seller?.name || 'Seller'}')">⚡ Buy it Now</button>
                <div class="btn-secondary-row">
                    <button class="btn btn-cart" onclick="alert('Added to Cart')">🛒 Cart</button>
                    <button class="btn btn-offer" onclick="location.href='chats.html?new=${p.seller_id}'">💬 Offer</button>
                    <button class="btn btn-wish" onclick="alert('Saved to Wishlist')">♡ Save</button>
                </div>
                <button class="btn btn-message" onclick="window.location.href='chat_room.html?user=${p.seller_id}'">Message Seller</button>
            </div>
        `;
    }

    function moveSlide(step, total) {
        const wrapper = document.getElementById('sliderWrapper');
        const dots = document.querySelectorAll('.dot');
        slideIndex = (slideIndex + step + total) % total;
        wrapper.style.transform = `translateX(-${slideIndex * 100}%)`;
        dots.forEach((dot, i) => dot.classList.toggle('active', i === slideIndex));
    }

    function openUPI(amount, upiId, name) {
        if (!upiId) {
            alert("Seller hasn't added a UPI ID yet. Use 'Message Seller' to discuss payment.");
            return;
        }
        const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR`;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;
        
        document.getElementById('upiAmount').innerText = `₹${amount}`;
        document.getElementById('upiQR').src = qrUrl;
        document.getElementById('upiLink').href = upiLink;
        document.getElementById('upiModal').style.display = 'flex';
    }
</script>

</body>
</html>

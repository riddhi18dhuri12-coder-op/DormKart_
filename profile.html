<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DormKart Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f6f7fb;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.profile-header{
text-align:center;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#14b8a6;
margin:auto;
overflow:hidden;
cursor:pointer;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.stat{
text-align:center;
}

.stat h2{
margin:0;
color:#14b8a6;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#14b8a6;
color:white;
font-weight:bold;
}

input,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

.product{
border:1px solid #eee;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- PROFILE HEADER -->

<div class="card profile-header">

<div class="avatar" onclick="avatarUpload.click()" id="avatarBox">
Upload
</div>

<input type="file" id="avatarUpload" hidden>

<h2 id="displayName">Loading...</h2>
<p id="collegeText"></p>

<button id="editBtn" onclick="enableEdit()">Edit Profile</button>

</div>

<!-- ANALYTICS -->

<div class="card">

<h3>Seller Analytics</h3>

<div class="stats">

<div class="stat">
<h2 id="statSales">0</h2>
<p>Sales</p>
</div>

<div class="stat">
<h2 id="statProducts">0</h2>
<p>Products</p>
</div>

<div class="stat">
<h2 id="statViews">0</h2>
<p>Views</p>
</div>

<div class="stat">
<h2 id="statWishlist">0</h2>
<p>Wishlist</p>
</div>

</div>

</div>

<!-- PROFILE EDIT -->

<div class="card">

<h3>Profile Info</h3>

<label>Name</label>
<input id="nameInput" disabled>

<label>College</label>
<input id="collegeInput" disabled>

<label>Bio</label>
<textarea id="bioInput" disabled></textarea>

<label>UPI</label>
<input id="upiInput" disabled>

<button id="saveBtn" style="display:none" onclick="saveProfile()">Save</button>

</div>

<!-- ACTIVE LISTINGS -->

<div class="card">

<h3>My Listings</h3>

<div id="listingGrid" class="grid"></div>

</div>

<!-- SAVED ITEMS -->

<div class="card">

<h3>Saved Items</h3>

<div id="wishlistGrid" class="grid"></div>

</div>

<!-- TRANSACTIONS -->

<div class="card">

<h3>Transactions</h3>

<div id="transactionsBox"></div>

</div>

<button onclick="logout()">Logout</button>

</div>

<script>

let currentUser

window.onload=init

async function init(){

const {data:{session}}=await supabaseClient.auth.getSession()

if(!session){
location="login-signup.html"
return
}

currentUser=session.user

loadProfile()

loadListings()

loadWishlist()

loadTransactions()

}

async function loadProfile(){

const {data}=await supabaseClient
.from("users")
.select("*")
.eq("id",currentUser.id)
.single()

if(!data)return

displayName.innerText=data.name || currentUser.email
collegeText.innerText=data.college || ""

nameInput.value=data.name || ""
collegeInput.value=data.college || ""
bioInput.value=data.bio || ""
upiInput.value=data.upi_id || ""

statSales.innerText=data.total_sales || 0
statProducts.innerText=data.total_products || 0

if(data.avatar_url){
avatarBox.innerHTML=`<img src="${data.avatar_url}">`
}

}

function enableEdit(){

nameInput.disabled=false
collegeInput.disabled=false
bioInput.disabled=false
upiInput.disabled=false

saveBtn.style.display="block"
editBtn.style.display="none"

}

async function saveProfile(){

await supabaseClient
.from("users")
.update({
name:nameInput.value,
college:collegeInput.value,
bio:bioInput.value,
upi_id:upiInput.value
})
.eq("id",currentUser.id)

alert("Profile Saved")

location.reload()

}

async function loadListings(){

const {data}=await supabaseClient
.from("products")
.select("*")
.eq("seller_id",currentUser.id)
.limit(6)

listingGrid.innerHTML=""

data?.forEach(p=>{

listingGrid.innerHTML+=`
<div class="product">
<b>${p.title}</b>
<br>
₹${p.price}
</div>
`

})

}

async function loadWishlist(){

const {data}=await supabaseClient
.from("wishlist")
.select("products(*)")
.eq("user_id",currentUser.id)

wishlistGrid.innerHTML=""

data?.forEach(w=>{

const p=w.products

wishlistGrid.innerHTML+=`
<div class="product">
<b>${p.title}</b>
<br>
₹${p.price}
</div>
`

})

}

async function loadTransactions(){

const {data}=await supabaseClient
.from("transactions")
.select("*")
.or(`buyer_id.eq.${currentUser.id},seller_id.eq.${currentUser.id}`)
.limit(5)

transactionsBox.innerHTML=""

data?.forEach(t=>{

transactionsBox.innerHTML+=`
<p>₹${t.amount} - ${t.status}</p>
`

})

}

async function logout(){

await supabaseClient.auth.signOut()

location="index.html"

}

</script>

</body>
</html>

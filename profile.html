<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DormKart • Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sky-blue: #bae1ff;
            --mint-green: #baffc9;
            --pale-yellow: #ffffba;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 100px;
        }

        /* --- STARTUP HEADER --- */
        .profile-hero {
            background: linear-gradient(135deg, var(--sky-blue) 0%, var(--mint-green) 100%);
            height: 180px;
            position: relative;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .hero-nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            align-items: center;
        }

        .icon-circle {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-dark);
        }

        /* --- AVATAR & IDENTITY --- */
        .profile-main {
            text-align: center;
            margin-top: -60px;
            padding: 0 20px;
        }

        .avatar-wrap {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 35px; /* Startup squircle style */
            background: white;
            padding: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .verify-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #3b82f6;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            font-size: 12px;
        }

        .user-name { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .user-college { font-size: 14px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* --- WALLET FEATURE (Startup Value) --- */
        .wallet-card {
            background: var(--text-dark);
            color: white;
            margin: 25px 20px;
            padding: 20px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7z' fill='%23ffffff' fill-opacity='0.05'/%3E%3C/svg%3E");
        }

        .balance-label { font-size: 12px; opacity: 0.7; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amt { font-size: 28px; font-weight: 800; margin-top: 4px; }
        .withdraw-btn {
            background: var(--mint-green);
            color: var(--text-dark);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            border: none;
            cursor: pointer;
        }

        /* --- STATS GRID --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1.5px solid var(--border);
        }

        .stat-val { display: block; font-size: 18px; font-weight: 800; color: var(--text-dark); }
        .stat-lab { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        /* --- LISTINGS & ACTIONS --- */
        .section-box { margin: 30px 20px 0; }
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-text { color: #3b82f6; font-size: 13px; font-weight: 700; cursor: pointer; }

        .action-list {
            background: white;
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .action-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .action-item:last-child { border-bottom: none; }
        .action-item:active { background: var(--bg); }
        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .action-label { flex: 1; font-weight: 700; font-size: 15px; }
        .action-item i.fa-chevron-right { font-size: 12px; color: var(--text-muted); }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; background: var(--text-dark);
            height: 70px; border-radius: 25px; display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .nav-link { color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-link.active { color: var(--mint-green); }
        .nav-link i { font-size: 20px; }

        /* --- UTILITY --- */
        .hidden { display: none; }
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--text-dark); color: white; padding: 12px 25px;
            border-radius: 100px; font-size: 14px; font-weight: 600;
            z-index: 9999; display: none;
        }
    </style>
</head>
<body>

<div id="toast">Message here</div>

<header class="profile-hero">
    <div class="hero-nav">
        <div class="icon-circle" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <div style="font-weight: 800; font-size: 16px;">My Account</div>
        <div class="icon-circle" onclick="toggleEditMode()"><i class="fa-solid fa-gear"></i></div>
    </div>
</header>

<main class="profile-main">
    <div class="avatar-wrap">
        <img id="profileImg" src="https://ui-avatars.com/api/?name=User&background=bae1ff&color=0f172a" class="avatar-img">
        <div class="verify-badge" title="Verified Student"><i class="fa-solid fa-check"></i></div>
    </div>
    <h1 class="user-name" id="userName">Student Name</h1>
    <p class="user-college" id="userCollege"><i class="fa-solid fa-building-columns"></i> College Not Set</p>
</main>

<section class="wallet-card">
    <div>
        <span class="balance-label">DormKart Balance</span>
        <div class="balance-amt" id="walletBalance">₹0</div>
    </div>
    <button class="withdraw-btn" onclick="showToast('Withdrawals open on Friday!')">Withdraw</button>
</section>

<section class="stats-row">
    <div class="stat-item">
        <span class="stat-val" id="statItems">0</span>
        <span class="stat-lab">Listings</span>
    </div>
    <div class="stat-item">
        <span class="stat-val" id="statSold">0</span>
        <span class="stat-lab">Sold</span>
    </div>
    <div class="stat-item">
        <span class="stat-val">4.9</span>
        <span class="stat-lab">Rating</span>
    </div>
</section>

<section class="section-box">
    <div class="section-title">Account Actions</div>
    <div class="action-list">
        <div class="action-item" onclick="location.href='my-ads.html'">
            <div class="action-icon" style="background: var(--sky-blue);"><i class="fa-solid fa-box"></i></div>
            <span class="action-label">Manage My Ads</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>
        <div class="action-item" onclick="location.href='wishlist.html'">
            <div class="action-icon" style="background: #fff1f2; color: #f43f5e;"><i class="fa-solid fa-heart"></i></div>
            <span class="action-label">My Wishlist</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>
        <div class="action-item" onclick="location.href='chats.html'">
            <div class="action-icon" style="background: var(--mint-green);"><i class="fa-solid fa-message"></i></div>
            <span class="action-label">Messages</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>
        <div class="action-item" onclick="shareProfile()">
            <div class="action-icon" style="background: var(--pale-yellow);"><i class="fa-solid fa-share-nodes"></i></div>
            <span class="action-label">Share Profile</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>
    </div>
</section>

<section class="section-box" style="margin-top: 20px;">
    <button onclick="logout()" style="width: 100%; padding: 18px; border-radius: 20px; border: 1.5px solid #fee2e2; background: #fff1f2; color: #e11d48; font-weight: 800; cursor: pointer;">
        Sign Out
    </button>
</section>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="chats.html" class="nav-link"><i class="fa-solid fa-comment"></i><span>Chats</span></a>
    <a href="add_product.html" class="nav-link" style="color: var(--mint-green);"><i class="fa-solid fa-circle-plus" style="font-size: 30px;"></i></a>
    <a href="my-ads.html" class="nav-link"><i class="fa-solid fa-layer-group"></i><span>My Ads</span></a>
    <a href="profile.html" class="nav-link active"><i class="fa-solid fa-user"></i><span>Profile</span></a>
</nav>

<script>
let currentUser = null;

async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return location.href = "login-signup.html";
    currentUser = session.user;
    
    loadProfileData();
}

async function loadProfileData() {
    // Load User info
    const { data: profile } = await supabaseClient.from("users").select("*").eq("id", currentUser.id).single();
    if (profile) {
        document.getElementById('userName').innerText = profile.name || "DormKart User";
        document.getElementById('userCollege').innerHTML = `<i class="fa-solid fa-building-columns"></i> ${profile.college || "College not set"}`;
        if(profile.avatar_url) document.getElementById('profileImg').src = profile.avatar_url;
    }

    // Load Stats
    const { count: totalAds } = await supabaseClient.from("products").select('*', { count: 'exact', head: true }).eq('seller_id', currentUser.id);
    const { count: soldAds } = await supabaseClient.from("products").select('*', { count: 'exact', head: true }).eq('seller_id', currentUser.id).eq('status', 'sold');
    
    document.getElementById('statItems').innerText = totalAds || 0;
    document.getElementById('statSold').innerText = soldAds || 0;

    // Load Earnings (Startup wallet feel)
    const { data: sales } = await supabaseClient.from("orders").select("amount").eq("seller_id", currentUser.id).eq("payment_status", "completed");
    const totalEarnings = (sales || []).reduce((acc, curr) => acc + (curr.amount || 0), 0);
    document.getElementById('walletBalance').innerText = `₹${totalEarnings.toLocaleString('en-IN')}`;
}

function shareProfile() {
    const url = window.location.origin + "/profile.html?uid=" + currentUser.id;
    if (navigator.share) {
        navigator.share({ title: 'My DormKart Shop', url: url });
    } else {
        navigator.clipboard.writeText(url);
        showToast("Profile link copied!");
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

async function logout() {
    await supabaseClient.auth.signOut();
    location.href = "login-signup.html";
}

window.onload = init;
</script>
</body>
</html>

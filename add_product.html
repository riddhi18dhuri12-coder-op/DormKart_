<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>DormKart - Sell</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #22c55e;
            --green-light: #4ade80;
            --green-pale: #f0fdf4;
            --green-glow: rgba(34, 197, 94, 0.15);
            --text: #0a0f1e;
            --text-mid: #475569;
            --text-light: #94a3b8;
            --bg: #f6f8fb;
            --card: #ffffff;
            --border: #e8edf5;
            --nav-h: 68px;
            --radius: 18px;        
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: calc(var(--nav-h) + 32px); min-height: 100vh; }
        .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 19px; color: var(--green); letter-spacing: -0.5px; }
        .header-sub { font-size: 12px; font-weight: 500; color: var(--text-light); background: var(--green-pale); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(34,197,94,0.2); }
        .container { max-width: 520px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .card-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-light); margin-bottom: 14px; }
        .upload-area { border: 2px dashed var(--border); border-radius: 14px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; background: var(--green-pale); }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .image-previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .preview-thumb { width: 68px; height: 68px; border-radius: 10px; object-fit: cover; border: 2px solid var(--border); }
        .field { display: flex; flex-direction: column; gap: 7px; }
        .field + .field { margin-top: 16px; }
        .field label { font-size: 12px; font-weight: 600; color: var(--text-mid); }
        .field input, .field textarea, .field select { width: 100%; padding: 13px 15px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: #fafbfc; outline: none; appearance: none; }
        .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); background: white; }
        .price-wrap { position: relative; }
        .price-wrap .currency { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-weight: 700; font-size: 15px; pointer-events: none; }
        .price-wrap input { padding-left: 28px; font-weight: 700; font-size: 18px; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .condition-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .pill-input { display: none; }
        .pill-label { padding: 8px 16px; border-radius: 30px; border: 1.5px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.15s; }
        .pill-input:checked + .pill-label { background: var(--green); border-color: var(--green); color: white; }

        /* ── NEW SWAP SECTION ── */
        .swap-card { border: 2px dashed rgba(34, 197, 94, 0.4); background: var(--green-pale); }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .toggle-switch { width: 44px; height: 24px; background: #cbd5e1; border-radius: 20px; position: relative; transition: 0.3s; }
        .toggle-switch::before { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        #allowSwap:checked + .toggle-switch { background: var(--green); }
        #allowSwap:checked + .toggle-switch::before { left: 23px; }

        .submit-btn { width: 100%; padding: 17px; background: var(--green); color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); text-decoration: none; font-size: 10px; font-weight: 600; gap: 4px; }
        .nav-item.active { color: var(--green); }
        .nav-sell-btn { width: 50px; height: 50px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -30px; border: 4px solid var(--bg); color: white !important; }
        .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: #0a0f1e; color: white; padding: 12px 20px; border-radius: 30px; font-size: 13px; opacity: 0; transition: all 0.3s ease; z-index: 999; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <header class="header">
        <span class="header-logo">DormKart</span>
        <span class="header-sub">List an Item</span>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-label">Photos</div>
            <div class="upload-area">
                <input type="file" id="imageFile" accept="image/*" multiple onchange="previewFiles()">
                <div style="font-size: 24px; margin-bottom: 8px;">📷</div>
                <div class="upload-title" id="uploadTitle">Upload Photos</div>
                <div class="upload-sub">Max 5 images</div>
            </div>
            <div class="image-previews" id="previews"></div>
        </div>

        <div class="card">
            <div class="card-label">Item Details</div>
            <div class="field"><label>Title</label><input type="text" id="title" placeholder="e.g. Scientific Calculator" required></div>
            <div class="two-col">
                <div class="field"><label>Category</label><select id="category" required><option value="">Select</option><option value="Electronics">Electronics</option><option value="Books">Books</option><option value="Dorm Essentials">Dorm Essentials</option></select></div>
                <div class="field"><label>Price (₹)</label><div class="price-wrap"><span class="currency">₹</span><input type="number" id="price" placeholder="0" required></div></div>
            </div>
            <div class="field"><label>Description</label><textarea id="description" placeholder="Describe age, specs..."></textarea></div>
        </div>

        <div class="card swap-card">
            <div class="card-label" style="color: var(--green);">Trade / Swap Option</div>
            <label class="toggle-row">
                <span style="font-size: 14px; font-weight: 600;">Enable Swapping</span>
                <input type="checkbox" id="allowSwapInput" style="display:none;" onchange="toggleSwapDetails()">
                <div class="toggle-switch"></div>
            </label>
            <div id="swapDetailsArea" style="display:none; margin-top:15px;">
                <div class="field">
                    <label>What do you want in exchange?</label>
                    <input type="text" id="swapWith" placeholder="e.g. Any DBMS book, calculator...">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-label">Condition</div>
            <div class="condition-pills">
                <input class="pill-input" type="radio" name="condition" id="cNew" value="New" checked><label class="pill-label" for="cNew">✨ New</label>
                <input class="pill-input" type="radio" name="condition" id="cLikeNew" value="Like New"><label class="pill-label" for="cLikeNew">👌 Like New</label>
                <input class="pill-input" type="radio" name="condition" id="cGood" value="Good"><label class="pill-label" for="cGood">👍 Good</label>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="handleFormSubmit()">Post Ad</button>
    </div>

    <div class="toast" id="toast"></div>
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="chats.html" class="nav-item">Chats</a>
        <a href="add_product.html" class="nav-item nav-sell-btn active">Post</a>
        <a href="my-ads.html" class="nav-item">Ads</a>
        <a href="profile.html" class="nav-item">Profile</a>
    </nav>

    <script>
        let currentSession = null;
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'login-signup.html'; return; }
            currentSession = session;
        };

        function toggleSwapDetails() {
            const isChecked = document.getElementById('allowSwapInput').checked;
            document.getElementById('swapDetailsArea').style.display = isChecked ? 'block' : 'none';
        }

        function previewFiles() {
            const input = document.getElementById('imageFile');
            const container = document.getElementById('previews');
            container.innerHTML = '';
            for (let file of input.files) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-thumb';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        }

        async function handleFormSubmit() {
            const btn = document.getElementById('submitBtn');
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const category = document.getElementById('category').value;

            btn.innerHTML = '<div class="spinner"></div> Posting...';
            btn.disabled = true;

            try {
                let publicUrls = [];
                const files = document.getElementById('imageFile').files;
                for (let file of Array.from(files).slice(0, 5)) {
                    const path = `${currentSession.user.id}/${Date.now()}-${file.name}`;
                    await supabaseClient.storage.from('product-images').upload(path, file);
                    const { data } = supabaseClient.storage.from('product-images').getPublicUrl(path);
                    publicUrls.push(data.publicUrl);
                }

                const { error } = await supabaseClient.from('products').insert([{
                    seller_id: currentSession.user.id,
                    title, price: parseFloat(price), category,
                    description: document.getElementById('description').value,
                    condition: document.querySelector('input[name="condition"]:checked').value,
                    image_url: publicUrls.join(','),
                    allow_swap: document.getElementById('allowSwapInput').checked,
                    swap_with: document.getElementById('swapWith').value,
                    status: 'active'
                }]);

                if (error) throw error;
                alert('Success!');
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert(err.message);
                btn.innerHTML = 'Post Ad';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

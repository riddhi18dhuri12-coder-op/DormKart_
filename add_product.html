<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DormKart - Sell</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Arial;
background:#f6f8fb;
padding:30px;
}

.container{
max-width:520px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h2{
margin-bottom:20px;
}

.field{
margin-bottom:15px;
display:flex;
flex-direction:column;
}

.field label{
font-size:13px;
margin-bottom:5px;
font-weight:600;
}

input,select,textarea{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#22c55e;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
width:100%;
}

button:hover{
background:#16a34a;
}

.image-previews{
display:flex;
gap:8px;
margin-top:10px;
flex-wrap:wrap;
}

.preview-thumb{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h2>Post Product</h2>

<div class="field">
<label>Title</label>
<input type="text" id="title">
</div>

<div class="field">
<label>Branch</label>
<select id="branch" onchange="updateCategories()">
<option value="">Select Branch</option>
<option value="CSE">CSE / IT</option>
<option value="Mechanical">Mechanical</option>
<option value="Civil">Civil</option>
<option value="Electrical">Electrical</option>
<option value="Common">Common</option>
</select>
</div>

<div class="field">
<label>Semester</label>
<select id="semester">

<option value="">Select Semester</option>
<option value="1">Semester 1</option>
<option value="2">Semester 2</option>
<option value="3">Semester 3</option>
<option value="4">Semester 4</option>
<option value="5">Semester 5</option>
<option value="6">Semester 6</option>
<option value="7">Semester 7</option>
<option value="8">Semester 8</option>

</select>
</div>

<div class="field">
<label>Category</label>
<select id="category">
<option value="">Select Category</option>
</select>
</div>

<div class="field">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="field">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="field">
<label>Condition</label>

<select id="condition">
<option>New</option>
<option>Like New</option>
<option>Good</option>
<option>Fair</option>
</select>

</div>

<div class="field">
<label>Images</label>
<input type="file" id="imageFile" multiple onchange="previewFiles()">
<div class="image-previews" id="previews"></div>
</div>

<div class="field">
<label>
<input type="checkbox" id="enableSwap">
Enable Swap
</label>
</div>

<div class="field">
<label>Swap Item</label>
<input type="text" id="swapItem">
</div>

<button onclick="handleFormSubmit()">Post Product</button>

</div>

<script>

function updateCategories(){

const branch=document.getElementById("branch").value
const category=document.getElementById("category")

const data={

CSE:[
"Programming Books",
"DSA Books",
"DBMS Books",
"Electronics Gadgets"
],

Mechanical:[
"Engineering Drawing",
"Mechanical Tools",
"Workshop Equipment"
],

Civil:[
"Survey Tools",
"Civil Drawing Tools",
"Civil Books"
],

Electrical:[
"Electrical Machines Books",
"Circuit Tools",
"Electrical Instruments"
],

Common:[
"Calculator",
"Stationery",
"Hostel Essentials",
"Fashion"
]

}

category.innerHTML='<option value="">Select Category</option>'

if(data[branch]){

data[branch].forEach(c=>{

category.innerHTML+=`<option value="${c}">${c}</option>`

})

}

}

function previewFiles(){

const input=document.getElementById("imageFile")
const preview=document.getElementById("previews")

preview.innerHTML=""

Array.from(input.files).slice(0,5).forEach(file=>{

const reader=new FileReader()

reader.onload=e=>{

const img=document.createElement("img")
img.src=e.target.result
img.className="preview-thumb"

preview.appendChild(img)

}

reader.readAsDataURL(file)

})

}

async function handleFormSubmit(){

const title=document.getElementById("title").value.trim()
const price=document.getElementById("price").value
const branch=document.getElementById("branch").value
const semester=document.getElementById("semester").value
const category=document.getElementById("category").value
const description=document.getElementById("description").value
const condition=document.getElementById("condition").value

const swapEnabled=document.getElementById("enableSwap").checked
let swapItem=document.getElementById("swapItem").value.trim()

if(!swapEnabled) swapItem=null

if(!title || !price || !branch || !semester || !category){

alert("Fill required fields")
return

}

const {data:{session}}=await supabaseClient.auth.getSession()

const files=document.getElementById("imageFile").files

let imageUrls=[]

for(const file of Array.from(files).slice(0,5)){

const path=`${session.user.id}/${Date.now()}-${file.name}`

const {error}=await supabaseClient
.storage
.from("product-images")
.upload(path,file)

if(error){

alert(error.message)
return

}

const {data}=supabaseClient
.storage
.from("product-images")
.getPublicUrl(path)

imageUrls.push(data.publicUrl)

}

const productData={

seller_id:session.user.id,
title,
price:parseFloat(price),
branch,
semester,
category,
condition,
description,
image_url:imageUrls.join(","),
swap_enabled:swapEnabled,
swap_item:swapItem,
status:"active"

}

const {error}=await supabaseClient
.from("products")
.insert([productData])

if(error){

alert(error.message)
return

}

alert("Product posted successfully")

window.location="dashboard.html"

}

</script>

</body>
</html>

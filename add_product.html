<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DormKart - Sell</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'DM Sans',sans-serif;
}

body{
background:#f6f8fb;
color:#0a0f1e;
padding-bottom:80px;
}

.container{
max-width:540px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

/* CARD */

.card{
background:white;
border-radius:16px;
padding:22px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
border:1px solid #e8edf5;
}

.card-label{
font-size:12px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
color:#94a3b8;
margin-bottom:12px;
}

/* HEADER */

.header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:white;
border-bottom:1px solid #e8edf5;
position:sticky;
top:0;
z-index:100;
}

.header-logo{
font-weight:800;
font-size:20px;
color:#22c55e;
}

.header-sub{
font-size:12px;
color:#64748b;
background:#ecfdf5;
padding:4px 10px;
border-radius:20px;
}

/* FORM */

.field{
display:flex;
flex-direction:column;
gap:6px;
}

.field label{
font-size:13px;
font-weight:600;
color:#475569;
}

.field input,
.field textarea,
.field select{
padding:13px 14px;
border-radius:10px;
border:1px solid #e2e8f0;
background:#fafafa;
font-size:14px;
transition:0.2s;
}

.field input:focus,
.field textarea:focus,
.field select:focus{
outline:none;
border-color:#22c55e;
box-shadow:0 0 0 3px rgba(34,197,94,0.15);
background:white;
}

textarea{
resize:none;
height:90px;
}

/* GRID */

.two-col{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* IMAGE UPLOAD */

.upload-area{
border:2px dashed #dbe3ef;
border-radius:14px;
padding:30px;
text-align:center;
background:#f0fdf4;
cursor:pointer;
transition:0.2s;
position:relative;
}

.upload-area:hover{
border-color:#22c55e;
background:#ecfdf5;
}

.upload-area input{
position:absolute;
inset:0;
opacity:0;
cursor:pointer;
}

.upload-icon{
font-size:26px;
margin-bottom:8px;
}

.upload-title{
font-weight:700;
font-size:14px;
margin-bottom:4px;
}

.upload-sub{
font-size:12px;
color:#94a3b8;
}

.image-previews{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.preview-thumb{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
border:2px solid #e2e8f0;
}

/* CONDITION PILLS */

.condition-pills{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.pill-input{
display:none;
}

.pill-label{
padding:8px 14px;
border-radius:30px;
border:1px solid #e2e8f0;
font-size:13px;
cursor:pointer;
}

.pill-input:checked + .pill-label{
background:#22c55e;
border-color:#22c55e;
color:white;
}

/* SWAP SWITCH */

.switch{
position:relative;
width:42px;
height:24px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
inset:0;
background:#cbd5e1;
border-radius:30px;
transition:0.2s;
}

.slider:before{
content:"";
position:absolute;
width:18px;
height:18px;
left:3px;
top:3px;
background:white;
border-radius:50%;
transition:0.2s;
}

.switch input:checked + .slider{
background:#22c55e;
}

.switch input:checked + .slider:before{
transform:translateX(18px);
}

/* SUBMIT BUTTON */

.submit-btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
box-shadow:0 6px 18px rgba(34,197,94,0.35);
transition:0.2s;
}

.submit-btn:hover{
transform:translateY(-1px);
box-shadow:0 8px 22px rgba(34,197,94,0.4);
}

/* TOAST */

.toast{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:#0a0f1e;
color:white;
padding:12px 20px;
border-radius:30px;
font-size:13px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

.toast.error{
background:#ef4444;
}
  </style>

</head>

<body>

<div class="container">

<h2>Post Product</h2>

<div class="field">
<label>Title</label>
<input type="text" id="title">
</div>

<div class="field">
<label>Branch</label>
<select id="branch" onchange="updateCategories()">
<option value="">Select Branch</option>
<option value="CSE">CSE / IT</option>
<option value="Mechanical">Mechanical</option>
<option value="Civil">Civil</option>
<option value="Electrical">Electrical</option>
<option value="Common">Common</option>
</select>
</div>

<div class="field">
<label>Semester</label>
<select id="semester">

<option value="">Select Semester</option>
<option value="1">Semester 1</option>
<option value="2">Semester 2</option>
<option value="3">Semester 3</option>
<option value="4">Semester 4</option>
<option value="5">Semester 5</option>
<option value="6">Semester 6</option>
<option value="7">Semester 7</option>
<option value="8">Semester 8</option>

</select>
</div>

<div class="field">
<label>Category</label>
<select id="category">
<option value="">Select Category</option>
</select>
</div>

<div class="field">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="field">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="field">
<label>Condition</label>

<select id="condition">
<option>New</option>
<option>Like New</option>
<option>Good</option>
<option>Fair</option>
</select>

</div>

<div class="field">
<label>Images</label>
<input type="file" id="imageFile" multiple onchange="previewFiles()">
<div class="image-previews" id="previews"></div>
</div>

<div class="field">
<label>
<input type="checkbox" id="enableSwap">
Enable Swap
</label>
</div>

<div class="field">
<label>Swap Item</label>
<input type="text" id="swapItem">
</div>

<button onclick="handleFormSubmit()">Post Product</button>

</div>

<script>

function updateCategories(){

const branch=document.getElementById("branch").value
const category=document.getElementById("category")

const data={

CSE:[
"Programming Books",
"DSA Books",
"DBMS Books",
"Electronics Gadgets"
],

Mechanical:[
"Engineering Drawing",
"Mechanical Tools",
"Workshop Equipment"
],

Civil:[
"Survey Tools",
"Civil Drawing Tools",
"Civil Books"
],

Electrical:[
"Electrical Machines Books",
"Circuit Tools",
"Electrical Instruments"
],

Common:[
"Calculator",
"Stationery",
"Hostel Essentials",
"Fashion"
]

}

category.innerHTML='<option value="">Select Category</option>'

if(data[branch]){

data[branch].forEach(c=>{

category.innerHTML+=`<option value="${c}">${c}</option>`

})

}

}

function previewFiles(){

const input=document.getElementById("imageFile")
const preview=document.getElementById("previews")

preview.innerHTML=""

Array.from(input.files).slice(0,5).forEach(file=>{

const reader=new FileReader()

reader.onload=e=>{

const img=document.createElement("img")
img.src=e.target.result
img.className="preview-thumb"

preview.appendChild(img)

}

reader.readAsDataURL(file)

})

}

async function handleFormSubmit(){

const title=document.getElementById("title").value.trim()
const price=document.getElementById("price").value
const branch=document.getElementById("branch").value
const semester=document.getElementById("semester").value
const category=document.getElementById("category").value
const description=document.getElementById("description").value
const condition=document.getElementById("condition").value

const swapEnabled=document.getElementById("enableSwap").checked
let swapItem=document.getElementById("swapItem").value.trim()

if(!swapEnabled) swapItem=null

if(!title || !price || !branch || !semester || !category){

alert("Fill required fields")
return

}

const {data:{session}}=await supabaseClient.auth.getSession()

const files=document.getElementById("imageFile").files

let imageUrls=[]

for(const file of Array.from(files).slice(0,5)){

const path=`${session.user.id}/${Date.now()}-${file.name}`

const {error}=await supabaseClient
.storage
.from("product-images")
.upload(path,file)

if(error){

alert(error.message)
return

}

const {data}=supabaseClient
.storage
.from("product-images")
.getPublicUrl(path)

imageUrls.push(data.publicUrl)

}

const productData={

seller_id:session.user.id,
title,
price:parseFloat(price),
branch,
semester,
category,
condition,
description,
image_url:imageUrls.join(","),
swap_enabled:swapEnabled,
swap_item:swapItem,
status:"active"

}

const {error}=await supabaseClient
.from("products")
.insert([productData])

if(error){

alert(error.message)
return

}

alert("Product posted successfully")

window.location="dashboard.html"

}

</script>

</body>
</html>

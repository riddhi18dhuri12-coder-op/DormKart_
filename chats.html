<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DormKart • Messages</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --sky-blue: #bae1ff;
            --mint-green: #baffc9;
            --pale-yellow: #ffffba;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --danger: #ffb3ba; /* Baby Pink */
            --startup-blue: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding-bottom: 110px; user-select: none; }

        /* --- STARTUP FLOATING HEADER --- */
        .header-box {
            background: var(--sky-blue);
            padding: 40px 24px 70px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-box h1 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        .header-box p { font-size: 14px; font-weight: 600; opacity: 0.7; margin-top: 4px; }

        /* --- SEARCH & UTILITY --- */
        .search-area { padding: 0 24px; margin-top: -30px; position: relative; z-index: 1001; }
        .search-bar {
            background: var(--white);
            padding: 14px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid var(--mint-green);
            box-shadow: 0 10px 30px rgba(186, 255, 201, 0.2);
        }
        .search-bar input { border: none; outline: none; flex: 1; font-size: 15px; font-weight: 600; background: transparent; }
        .search-bar i { color: var(--text-muted); }

        /* --- CHAT LIST --- */
        .chat-container { padding: 25px 20px; display: flex; flex-direction: column; gap: 12px; }

        .chat-card {
            background: var(--white);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #f1f5f9;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .chat-card:active { transform: scale(0.97); }
        .chat-card.selected { 
            border-color: var(--danger); 
            background: #fff5f6;
            box-shadow: 0 0 0 2px var(--danger);
        }

        .avatar-wrap {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            background: var(--pale-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-text { font-weight: 800; color: var(--text-dark); font-size: 20px; }

        .chat-info { flex: 1; overflow: hidden; }
        .chat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .user-name { font-weight: 800; font-size: 16px; }
        .msg-time { font-size: 11px; color: var(--text-muted); font-weight: 600; }

        .preview-row { display: flex; align-items: center; justify-content: space-between; }
        .preview-text {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            flex: 1;
        }

        .unread-dot {
            width: 10px;
            height: 10px;
            background: var(--startup-blue);
            border-radius: 50%;
            margin-left: 8px;
            flex-shrink: 0;
        }

        /* --- DELETE FAB --- */
        #deleteFab {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--text-dark); color: white; border: none;
            padding: 16px 30px; border-radius: 20px; font-weight: 800;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            display: none; z-index: 2001; cursor: pointer;
            font-size: 14px;
        }
        #deleteFab i { color: var(--danger); margin-right: 8px; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--text-dark);
            height: 70px; border-radius: 25px; display: flex;
            justify-content: space-around; align-items: center; z-index: 2000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-link.active { color: var(--mint-green); }
        .nav-link i { font-size: 20px; }

        .nav-center-btn {
            background: var(--sky-blue); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-top: -35px;
            border: 5px solid var(--bg-light); color: var(--text-dark) !important;
        }

        .empty-state { text-align: center; padding: 100px 40px; color: var(--text-muted); }
        .empty-state i { font-size: 50px; margin-bottom: 20px; opacity: 0.2; }
    </style>
</head>
<body>

    <header class="header-box">
        <h1>Messages</h1>
        <p>Your campus network is active</p>
    </header>

    <div class="search-area">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search students..." oninput="filterChats()">
        </div>
    </div>

    <button id="deleteFab" onclick="deleteSelectedChats()">
        <i class="fa-solid fa-trash"></i> Delete Selected
    </button>

    <main class="chat-container" id="chatList">
        <div style="text-align: center; padding: 50px;">
            <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--startup-blue); font-size: 24px;"></i>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="chats.html" class="nav-link active"><i class="fa-solid fa-message"></i><span>Chats</span></a>
        <a href="add_product.html" class="nav-link nav-center-btn"><i class="fa-solid fa-plus"></i></a>
        <a href="my-ads.html" class="nav-link"><i class="fa-solid fa-layer-group"></i><span>My Ads</span></a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    </nav>

    <script>
        let currentUserId = null;
        let allChats = [];
        let selectedUserIds = new Set();
        let lastTap = 0;

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = 'login-signup.html';
            currentUserId = session.user.id;
            await fetchChats();
        };

        async function fetchChats() {
            const { data, error } = await supabaseClient
                .from('chats')
                .select('*')
                .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
                .order('created_at', { ascending: false });

            if (error) return;

            const convos = new Map();
            const userIds = new Set();
            
            data.forEach(msg => {
                const otherId = msg.sender_id === currentUserId ? msg.receiver_id : msg.sender_id;
                if (!convos.has(otherId)) convos.set(otherId, msg);
                userIds.add(otherId);
            });

            if (userIds.size === 0) {
                document.getElementById('chatList').innerHTML = `<div class="empty-state"><i class="fa-solid fa-comments"></i><p>No messages yet</p></div>`;
                return;
            }

            const { data: usersData } = await supabaseClient.from('users').select('id, name, avatar_url').in('id', Array.from(userIds));
            const userMap = {};
            usersData.forEach(u => userMap[u.id] = u);

            allChats = Array.from(convos).map(([otherId, msg]) => ({
                otherId,
                lastMsg: msg,
                user: userMap[otherId] || { name: 'Student', avatar_url: null }
            }));

            renderChats(allChats);
        }

        function renderChats(chats) {
            const container = document.getElementById('chatList');
            container.innerHTML = '';

            chats.forEach(chat => {
                const card = document.createElement('div');
                const isSentByMe = chat.lastMsg.sender_id === currentUserId;
                const date = new Date(chat.lastMsg.created_at);
                const timeStr = formatChatTime(date);

                card.className = `chat-card ${selectedUserIds.has(chat.otherId) ? 'selected' : ''}`;
                
                // Double tap logic for Startup batch selection
                card.addEventListener('click', (e) => {
                    const now = Date.now();
                    if (now - lastTap < 300) {
                        toggleSelection(chat.otherId);
                        e.preventDefault();
                    } else {
                        if (selectedUserIds.size > 0) toggleSelection(chat.otherId);
                        else setTimeout(() => { if (Date.now() - now >= 300) window.location.href = `chat_room.html?user=${chat.otherId}`; }, 300);
                    }
                    lastTap = now;
                });

                card.innerHTML = `
                    <div class="avatar-wrap">
                        ${chat.user.avatar_url ? `<img src="${chat.user.avatar_url}">` : `<span class="avatar-text">${chat.user.name.charAt(0)}</span>`}
                    </div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="user-name">${chat.user.name}</span>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                        <div class="preview-row">
                            <span class="preview-text">${isSentByMe ? 'You: ' : ''}${chat.lastMsg.message}</span>
                            ${(!isSentByMe && !chat.lastMsg.is_read) ? '<div class="unread-dot"></div>' : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatChatTime(date) {
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            return isToday ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Yesterday';
        }

        function toggleSelection(userId) {
            if (selectedUserIds.has(userId)) selectedUserIds.delete(userId);
            else selectedUserIds.add(userId);
            
            const fab = document.getElementById('deleteFab');
            fab.style.display = selectedUserIds.size > 0 ? 'block' : 'none';
            fab.innerHTML = `<i class="fa-solid fa-trash"></i> Delete (${selectedUserIds.size}) Chats`;
            renderChats(allChats);
        }

        async function deleteSelectedChats() {
            if (!confirm("Remove these conversations?")) return;
            for (const id of selectedUserIds) {
                await supabaseClient.from('chats').delete().or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${id}),and(sender_id.eq.${id},receiver_id.eq.${currentUserId})`);
            }
            selectedUserIds.clear();
            document.getElementById('deleteFab').style.display = 'none';
            fetchChats();
        }

        function filterChats() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderChats(allChats.filter(c => c.user.name.toLowerCase().includes(term)));
        }
    </script>
</body>
</html>

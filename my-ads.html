<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DormKart • My Ads</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --pale-yellow: #ffffba;
            --mint-green: #baffc9;
            --sky-blue: #bae1ff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg: #f8faff;
            --card: #ffffff;
            --border: #e2e8f0;
            --startup-blue: #3b82f6;
            --danger: #ffb3ba;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 120px;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* --- PREMIUM GRADIENT HEADER --- */
        .header-box {
            background: linear-gradient(135deg, var(--sky-blue) 0%, #a5d8ff 100%);
            padding: 60px 24px 90px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 10px 30px rgba(186, 225, 255, 0.4);
        }

        .header-box h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1.5px;
            color: var(--text-main);
        }

        /* --- GLASSMORPHIC QUICK STATS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: -45px 24px 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 10px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .stat-card strong { display: block; font-size: 22px; font-weight: 800; color: var(--text-main); }
        .stat-card span { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- REFINED ADS LIST --- */
        .ads-container { padding: 0 24px; display: flex; flex-direction: column; gap: 18px; }

        .ad-card {
            background: var(--card);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .ad-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            border-color: var(--sky-blue);
            transform: translateY(-2px);
        }

        .ad-card.sold { opacity: 0.8; filter: grayscale(0.5); }

        .ad-img-wrap { position: relative; flex-shrink: 0; }
        .ad-img { width: 115px; height: 115px; border-radius: 20px; object-fit: cover; background: #f1f5f9; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }
        
        .status-pill {
            position: absolute; top: -8px; left: -8px;
            font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 12px;
            white-space: nowrap; border: 2.5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .pill-active { background: var(--mint-green); color: #065f46; }
        .pill-sold { background: #fee2e2; color: #991b1b; }

        .ad-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .ad-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
        .ad-price { font-weight: 800; font-size: 20px; color: var(--startup-blue); }
        
        /* --- ACTION BUTTONS --- */
        .ad-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-act { 
            flex: 1; padding: 12px; border-radius: 16px; font-size: 13px; font-weight: 800; 
            cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-edit { background: #f1f5f9; color: var(--text-main); }
        .btn-edit:hover { background: var(--pale-yellow); }
        .btn-sold { background: var(--text-main); color: white; }
        .btn-sold:hover { background: #000; }

        /* --- PREMIUM MODAL --- */
        #editModal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: none; align-items: flex-end; justify-content: center; z-index: 5000;
        }
        .modal-sheet {
            background: white; padding: 40px 24px; border-radius: 40px 40px 0 0;
            width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.15);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); margin: 0 0 8px 4px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea {
            width: 100%; padding: 16px; border-radius: 18px; border: 2px solid #f1f5f9;
            background: #f8fafc; font-size: 15px; font-weight: 600; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--sky-blue); background: white; }

        .btn-save { background: var(--text-main); color: white; width: 100%; padding: 20px; border: none; border-radius: 20px; font-weight: 800; font-size: 16px; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- NAV BAR --- */
        .bottom-nav {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px; background: #0f172a;
            height: 76px; border-radius: 28px; display: flex;
            justify-content: space-around; align-items: center; z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 0 10px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; gap: 5px; transition: 0.2s; }
        .nav-item.active { color: var(--mint-green); }
        .nav-item i { font-size: 22px; }

        .nav-plus {
            background: var(--mint-green); width: 56px; height: 56px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin-top: -40px;
            border: 6px solid #f8faff; color: #0f172a !important; transform: rotate(45deg);
        }
        .nav-plus i { transform: rotate(-45deg); }
    </style>
</head>
<body>

<div class="header-box">
    <h1>Manage Listings</h1>
    <p style="font-size: 14px; opacity: 0.8; margin-top: 5px; font-weight: 600;">Inventory Tracking System</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <strong id="statTotal">0</strong>
        <span>Total</span>
    </div>
    <div class="stat-card" style="border-bottom: 4px solid var(--mint-green);">
        <strong id="statActive">0</strong>
        <span>Active</span>
    </div>
    <div class="stat-card" style="border-bottom: 4px solid var(--danger);">
        <strong id="statSold">0</strong>
        <span>Sold</span>
    </div>
</div>

<div class="ads-container" id="adsList">
    <div style="text-align:center; padding:100px 0;">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 32px; color: var(--startup-blue);"></i>
    </div>
</div>

<div id="editModal">
    <div class="modal-sheet">
        <div style="width: 50px; height: 6px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 30px;"></div>
        <h2 style="font-family: Syne; font-size: 26px; margin-bottom: 10px;">Edit Details</h2>

        <input type="hidden" id="editId">

        <div class="input-group">
            <label>Product Title</label>
            <input type="text" id="editTitle">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1.2;">
                <label>Category</label>
                <select id="editCategory">
                    <option value="Books">Books</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Hostel">Hostel</option>
                    <option value="Fashion">Fashion</option>
                </select>
            </div>
            <div class="input-group" style="flex: 0.8;">
                <label>Price (₹)</label>
                <input type="number" id="editPrice">
            </div>
        </div>

        <div class="input-group">
            <label>Item Description</label>
            <textarea id="editDescription" rows="4"></textarea>
        </div>

        <div class="input-group">
            <label>Trading Option</label>
            <select id="editSwap">
                <option value="false">Cash Purchase Only</option>
                <option value="true">Open to Swapping</option>
            </select>
        </div>

        <button onclick="updateAd()" class="btn-save">Save Changes</button>
        
        <button onclick="deleteAd()" style="width:100%; margin-top:25px; color:#ef4444; background:rgba(239, 68, 68, 0.05); padding: 15px; border-radius: 15px; border:none; font-weight:800; cursor:pointer;">
            <i class="fa-solid fa-trash-can" style="margin-right: 6px;"></i> Delete Listing
        </button>
        
        <button onclick="closeEditModal()" style="width:100%; margin-top:10px; color:var(--text-muted); background:none; border:none; font-weight:700; cursor:pointer; padding: 10px;">
            Dismiss
        </button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="chats.html" class="nav-item"><i class="fa-solid fa-message"></i><span>Chats</span></a>
    <a href="add_product.html" class="nav-item nav-plus"><i class="fa-solid fa-plus"></i></a>
    <a href="my-ads.html" class="nav-item active"><i class="fa-solid fa-layer-group"></i><span>My Ads</span></a>
    <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
</nav>

<script>
    let currentUserId = null;
    let myAdsData = [];

    async function init() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return location.href = 'login-signup.html';
        currentUserId = session.user.id;
        fetchMyAds();
    }

    async function fetchMyAds() {
        const { data, error } = await supabaseClient
            .from('products').select('*').eq('seller_id', currentUserId).order('created_at', { ascending: false });

        if (error) return;
        myAdsData = data;
        
        document.getElementById('statTotal').innerText = data.length;
        document.getElementById('statActive').innerText = data.filter(a => a.status === 'active').length;
        document.getElementById('statSold').innerText = data.filter(a => a.status === 'sold').length;

        const container = document.getElementById('adsList');
        container.innerHTML = data.length ? '' : '<div style="text-align:center; padding:100px 0; color:var(--text-muted); font-weight:600;">No listings found.</div>';

        data.forEach(product => {
            const isSold = product.status === 'sold';
            const img = product.image_url ? product.image_url.split(',')[0] : 'placeholder.png';
            const div = document.createElement('div');
            div.className = `ad-card ${isSold ? 'sold' : ''}`;
            div.innerHTML = `
                <div class="ad-img-wrap">
                    <img src="${img}" class="ad-img">
                    <div class="status-pill ${isSold ? 'pill-sold' : 'pill-active'}">
                        ${isSold ? '<i class="fa-solid fa-lock"></i> SOLD' : '<i class="fa-solid fa-bolt"></i> ACTIVE'}
                    </div>
                </div>
                <div class="ad-info">
                    <div>
                        <div class="ad-title">${product.title}</div>
                        <div class="ad-price">₹${product.price}</div>
                    </div>
                    <div class="ad-actions">
                        <button onclick="openEditModal('${product.id}')" class="btn-act btn-edit"><i class="fa-solid fa-pen"></i> Edit</button>
                        ${!isSold ? `<button onclick="markAsSold('${product.id}')" class="btn-act btn-sold"><i class="fa-solid fa-check"></i> Sold</button>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openEditModal(id) {
        const ad = myAdsData.find(a => a.id == id);
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = ad.title;
        document.getElementById('editPrice').value = ad.price;
        document.getElementById('editCategory').value = ad.category;
        document.getElementById('editDescription').value = ad.description;
        document.getElementById('editSwap').value = ad.swap_enabled.toString();
        document.getElementById('editModal').style.display = "flex";
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function updateAd() {
        const id = document.getElementById('editId').value;
        const updates = {
            title: document.getElementById('editTitle').value,
            price: document.getElementById('editPrice').value,
            category: document.getElementById('editCategory').value,
            description: document.getElementById('editDescription').value,
            swap_enabled: document.getElementById('editSwap').value === "true"
        };

        const { error } = await supabaseClient.from("products").update(updates).eq("id", id);
        if(!error) {
            closeEditModal();
            fetchMyAds();
        }
    }

    async function markAsSold(id) {
        if (!confirm("Mark this item as sold?")) return;
        await supabaseClient.from('products').update({ status: 'sold' }).eq('id', id);
        fetchMyAds();
    }

    async function deleteAd() {
        if (!confirm("Are you sure you want to delete this listing?")) return;
        const id = document.getElementById('editId').value;
        await supabaseClient.from('products').delete().eq('id', id);
        closeEditModal();
        fetchMyAds();
    }

    window.onload = init;
</script>
</body>
</html>

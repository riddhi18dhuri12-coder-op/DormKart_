<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DormKart • My Ads</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --pale-yellow: #ffffba;
            --mint-green: #baffc9;
            --sky-blue: #bae1ff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 110px;
            color: var(--text-main);
        }

        /* --- STARTUP HEADER (Solid Sky Blue) --- */
        .header-box {
            background: var(--sky-blue);
            padding: 40px 24px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .header-box h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            margin: 0;
            letter-spacing: -1px;
        }

        /* --- QUICK STATS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: -30px 24px 20px;
        }

        .stat-card {
            background: white;
            padding: 15px 10px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1.5px solid var(--border);
        }

        .stat-card strong { display: block; font-size: 18px; font-weight: 800; }
        .stat-card span { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        /* --- ADS LIST --- */
        .ads-container { padding: 0 24px; display: flex; flex-direction: column; gap: 15px; }

        .ad-card {
            background: white; border-radius: 24px; padding: 16px;
            border: 1px solid var(--border); display: flex; gap: 16px;
            transition: 0.3s;
        }

        .ad-card.sold { opacity: 0.7; }

        .ad-img-wrap { position: relative; }
        .ad-img { width: 100px; height: 100px; border-radius: 18px; object-fit: cover; background: var(--bg); }
        
        .status-pill {
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 100px;
            white-space: nowrap; border: 2px solid white;
        }
        .pill-active { background: var(--mint-green); color: #065f46; }
        .pill-sold { background: #fee2e2; color: #991b1b; }

        .ad-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .ad-title { font-size: 15px; font-weight: 700; margin: 0 0 5px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .ad-price { font-weight: 800; font-size: 18px; color: var(--text-main); }
        
        .ad-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-act { flex: 1; padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .btn-edit { background: var(--pale-yellow); color: var(--text-main); }
        .btn-sold { background: var(--text-main); color: white; }

        /* --- EDIT MODAL --- */
        #editModal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px); display: none; align-items: flex-end;
            justify-content: center; z-index: 5000;
        }
        .modal-sheet {
            background: white; padding: 30px 24px; border-radius: 35px 35px 0 0;
            width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin: 15px 0 6px 4px; text-transform: uppercase; }
        input, select, textarea {
            width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border);
            background: #f8fafc; font-family: inherit; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--sky-blue); }

        .btn-save { background: var(--mint-green); color: var(--text-main); width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: 800; margin-top: 20px; cursor: pointer; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; background: #1e293b;
            height: 70px; border-radius: 25px; display: flex;
            justify-content: space-around; align-items: center; z-index: 2000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 700; gap: 4px; }
        .nav-item.active { color: var(--mint-green); }
        .nav-item i { font-size: 20px; }

        .nav-plus {
            background: var(--mint-green); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-top: -30px;
            border: 4px solid #1e293b; color: #1e293b !important;
        }
    </style>
</head>
<body>

<div class="header-box">
    <h1>Manage Listings</h1>
    <p style="font-size: 14px; opacity: 0.8; margin-top: 5px;">Tracking your campus shop</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <strong id="statTotal">0</strong>
        <span>Total</span>
    </div>
    <div class="stat-card" style="background: #f0fdf4;">
        <strong id="statActive">0</strong>
        <span>Active</span>
    </div>
    <div class="stat-card" style="background: #fff1f2;">
        <strong id="statSold">0</strong>
        <span>Sold</span>
    </div>
</div>

<div class="ads-container" id="adsList">
    <div style="text-align:center; padding:100px 0;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; color: var(--sky-blue);"></i>
    </div>
</div>

<div id="editModal">
    <div class="modal-sheet">
        <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 20px;"></div>
        <h2 style="font-family: Syne; letter-spacing: -0.5px;">Edit Listing</h2>

        <input type="hidden" id="editId">

        <label>Item Title</label>
        <input type="text" id="editTitle">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Category</label>
                <select id="editCategory">
                    <option value="Books">Books</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Hostel">Hostel</option>
                    <option value="Fashion">Fashion</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Price (₹)</label>
                <input type="number" id="editPrice">
            </div>
        </div>

        <label>Description</label>
        <textarea id="editDescription" rows="3"></textarea>

        <label>Swap/Trade Enabled?</label>
        <select id="editSwap">
            <option value="false">No, Cash Only</option>
            <option value="true">Yes, Swapping Allowed</option>
        </select>

        <button onclick="updateAd()" class="btn-save">Update Listing</button>
        
        <button onclick="deleteAd()" style="width:100%; margin-top:15px; color:#ef4444; background:none; border:none; font-weight:700; cursor:pointer;">
            <i class="fa-solid fa-trash-can"></i> Delete Permanently
        </button>
        
        <button onclick="closeEditModal()" style="width:100%; margin-top:10px; color:var(--text-muted); background:none; border:none; font-weight:700; cursor:pointer;">
            Cancel
        </button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="chats.html" class="nav-item"><i class="fa-solid fa-comment"></i><span>Chats</span></a>
    <a href="add_product.html" class="nav-item nav-plus"><i class="fa-solid fa-plus"></i></a>
    <a href="my-ads.html" class="nav-item active"><i class="fa-solid fa-layer-group"></i><span>My Ads</span></a>
    <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
</nav>

<script>
    let currentUserId = null;
    let myAdsData = [];

    async function init() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return location.href = 'login-signup.html';
        currentUserId = session.user.id;
        fetchMyAds();
    }

    async function fetchMyAds() {
        const { data, error } = await supabaseClient
            .from('products').select('*').eq('seller_id', currentUserId).order('created_at', { ascending: false });

        if (error) return;
        myAdsData = data;
        
        // Update Stats
        document.getElementById('statTotal').innerText = data.length;
        document.getElementById('statActive').innerText = data.filter(a => a.status === 'active').length;
        document.getElementById('statSold').innerText = data.filter(a => a.status === 'sold').length;

        const container = document.getElementById('adsList');
        container.innerHTML = data.length ? '' : '<div style="text-align:center; padding:100px 0; color:gray;">You haven\'t posted any ads yet.</div>';

        data.forEach(product => {
            const isSold = product.status === 'sold';
            const img = product.image_url ? product.image_url.split(',')[0] : 'placeholder.png';
            const div = document.createElement('div');
            div.className = `ad-card ${isSold ? 'sold' : ''}`;
            div.innerHTML = `
                <div class="ad-img-wrap">
                    <img src="${img}" class="ad-img">
                    <div class="status-pill ${isSold ? 'pill-sold' : 'pill-active'}">
                        ${isSold ? 'SOLD' : 'ACTIVE'}
                    </div>
                </div>
                <div class="ad-info">
                    <div>
                        <div class="ad-title">${product.title}</div>
                        <div class="ad-price">₹${product.price}</div>
                    </div>
                    <div class="ad-actions">
                        <button onclick="openEditModal('${product.id}')" class="btn-act btn-edit">Edit</button>
                        ${!isSold ? `<button onclick="markAsSold('${product.id}')" class="btn-act btn-sold">Mark Sold</button>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openEditModal(id) {
        const ad = myAdsData.find(a => a.id == id);
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = ad.title;
        document.getElementById('editPrice').value = ad.price;
        document.getElementById('editCategory').value = ad.category;
        document.getElementById('editDescription').value = ad.description;
        document.getElementById('editSwap').value = ad.swap_enabled.toString();
        document.getElementById('editModal').style.display = "flex";
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function updateAd() {
        const id = document.getElementById('editId').value;
        const updates = {
            title: document.getElementById('editTitle').value,
            price: document.getElementById('editPrice').value,
            category: document.getElementById('editCategory').value,
            description: document.getElementById('editDescription').value,
            swap_enabled: document.getElementById('editSwap').value === "true"
        };

        const { error } = await supabaseClient.from("products").update(updates).eq("id", id);
        if(!error) {
            closeEditModal();
            fetchMyAds();
        }
    }

    async function markAsSold(id) {
        if (!confirm("Is this item sold? This will hide it from the marketplace.")) return;
        await supabaseClient.from('products').update({ status: 'sold' }).eq('id', id);
        fetchMyAds();
    }

    async function deleteAd() {
        if (!confirm("Are you sure you want to delete this listing forever?")) return;
        const id = document.getElementById('editId').value;
        await supabaseClient.from('products').delete().eq('id', id);
        closeEditModal();
        fetchMyAds();
    }

    window.onload = init;
</script>
</body>
</html>
